<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل البروفايل - ملك الشات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }
        .rank-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: #444;
            color: white;
        }
        .btn-save {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .btn-save:hover {
            background-color: #e67e22;
        }
        .preview-bg {
            width: 100%;
            height: 100px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 15px;
            background-image: url('https://via.placeholder.com/350x100');
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="rank-icon">🏆</div>
    <h2>تعديل بروفايل الملك</h2>
    
    <div id="bgPreview" class="preview-bg"></div>

    <input type="text" id="userName" placeholder="الاسم الجديد...">
    <input type="text" id="bgUrl" placeholder="رابط صورة الخلفية...">
    <input type="text" id="musicUrl" placeholder="رابط ملف الموسيقى (mp3)...">
    
    <button class="btn-save" onclick="saveProfile()">حفظ التعديلات ✨</button>
    
    <div id="status" style="margin-top: 15px; font-size: 14px; color: #f39c12;"></div>
</div>

<script>
    function saveProfile() {
        const name = document.getElementById('userName').value;
        const bg = document.getElementById('bgUrl').value;
        const music = document.getElementById('musicUrl').value;
        
        // تحديث المعاينة
        if(bg) {
            document.getElementById('bgPreview').style.backgroundImage = `url('${bg}')`;
        }
        
        // محاكاة حفظ البيانات
        document.getElementById('status').innerText = "تم حفظ التعديلات بنجاح يا ملك! 🏆";
        
        console.log("بيانات البروفايل المحدثة:", {
            الاسم: name,
            الخلفية: bg,
            الموسيقى: music,
            الرتبة: "كأس 🏆"
        });
    }
</script>

</body>
</html>
