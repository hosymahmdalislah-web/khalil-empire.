<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات الملكية - المطور خليل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; overflow: hidden; position: fixed; width: 100%; }

        /* Login Overlay */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #222, #000); z-index: 100000; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .login-card { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; border: 4px solid var(--gold); text-align: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
        .login-tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--king-grad); color: #000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .login-form { display: none; } .login-form.active { display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1.5px solid #ddd; text-align: center; font-size: 14px; }

        /* Main App Layout */
        #chatApp { display: none; height: 100vh; flex-direction: column; background: url('https://wallpaperaccess.com/full/1161063.jpg') center/cover; position: relative; }
        
        .top-nav { height: 70px; background: rgba(0,0,0,0.9); display: flex; align-items: center; border-bottom: 2px solid var(--gold); z-index: 1000; padding: 0 5px; }
        .nav-btn { color: var(--gold); text-align: center; font-size: 11px; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.9); }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 3px; }

        .chat-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        
        /* Message Bubbles */
        .msg-bubble { align-self: flex-start; max-width: 85%; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .header-icon { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; background: #000; }
        .header-icon img { width:100%; height:100%; object-fit:cover; }
        .name-tag { background: #000; color: var(--gold); padding: 2px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid var(--gold); }

        .msg-text { background: rgba(255,255,255,0.95); padding: 12px 16px; border-radius: 0 18px 18px 18px; font-size: 14px; color: #000; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); line-height: 1.4; }

        /* Fixed Bottom Panel */
        .bottom-panel { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; padding: 12px; gap: 12px; border-top: 2px solid var(--gold); z-index: 2000; }
        .msg-input { flex: 1; height: 45px; border-radius: 25px; border: 1.5px solid var(--gold); padding: 0 15px; background: #fff; font-size: 15px; }
        .icon-btn { font-size: 26px; color: var(--gold); cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { color: #fff; }

        /* Lists & Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: #fff; width: 92%; max-width: 420px; border-radius: 20px; border: 3px solid var(--gold); overflow: hidden; max-height: 80vh; display: flex; flex-direction: column; }
        .m-header { background: #000; color: var(--gold); padding: 15px; text-align: center; font-weight: bold; font-size: 18px; border-bottom: 2px solid var(--gold); }
        .m-body { padding: 20px; overflow-y: auto; flex: 1; }
        
        .list-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; }
        .list-item img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--gold); }
        
        .admin-btn { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; color: #fff; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <div id="appLogo" onclick="changeAppIcon()">
            <i class="fas fa-crown" style="font-size: 50px; color: gold; cursor: pointer;" id="mainIcon"></i>
        </div>
        <h2 style="margin: 10px 0;">إمبراطورية الشات</h2>
        
        <div class="login-tabs">
            <button class="tab-btn active" onclick="switchTab('visitor', this)">زائر</button>
            <button class="tab-btn" onclick="switchTab('member', this)">عضو</button>
            <button class="tab-btn" onclick="switchTab('register', this)">جديد</button>
        </div>

        <div id="visitor" class="login-form active">
            <input type="text" id="vName" placeholder="اسم الزائر المستعار">
            <button class="tab-btn active" style="width:100%" onclick="login('visitor')">دخول سريع</button>
        </div>

        <div id="member" class="login-form">
            <input type="text" id="mEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="mPass" placeholder="كلمة المرور">
            <button class="tab-btn active" style="width:100%" onclick="login('member')">دخول العضوية</button>
        </div>

        <div id="register" class="login-form">
            <input type="text" id="regName" placeholder="الاسم الملكي">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <button class="tab-btn active" style="width:100%" onclick="register()">إنشاء حساب ملكي</button>
        </div>
    </div>
</div>

<div id="chatApp">
    <nav class="top-nav">
        <div class="nav-btn" onclick="openProfile()"><i class="fas fa-user-shield"></i>بروفايلي</div>
        <div class="nav-btn" onclick="openPrivate()"><i class="fas fa-comment-dots"></i>الخاص</div>
        <div class="nav-btn" onclick="openRankList('أثرياء الإمبراطورية')"><i class="fas fa-gem"></i>الأثرياء</div>
        <div class="nav-btn" onclick="openRankList('كبار الشخصيات')"><i class="fas fa-star"></i>الكبار</div>
        <div class="nav-btn" onclick="openAdminPanel()"><i class="fas fa-tools"></i>التحكم</div>
        <div class="nav-btn" onclick="logout()" style="color: #ff4757;"><i class="fas fa-power-off"></i>خروج</div>
    </nav>

    <div class="chat-view" id="chatBox"></div>

    <div class="bottom-panel">
        <i class="fas fa-plus-circle icon-btn" onclick="document.getElementById('fileInp').click()"></i>
        <input type="file" id="fileInp" hidden onchange="handleFile(this)">
        <i class="fab fa-youtube icon-btn" onclick="searchYoutube()"></i>
        <input type="text" id="msgInput" class="msg-input" placeholder="اكتب رسالتك يا ملك...">
        <i class="fas fa-paper-plane icon-btn" onclick="sendMsg()"></i>
    </div>
</div>

<div id="globalModal" class="modal">
    <div class="modal-box">
        <div class="m-header" id="modalTitle"></div>
        <div class="m-body" id="modalBody"></div>
        <button onclick="closeModal()" style="padding:15px; border:none; background:#eee; font-weight:bold; cursor:pointer;">إغلاق النافذة</button>
    </div>
</div>

<script>
    // --- المحرك البرمجي ---
    let currentUser = JSON.parse(localStorage.getItem('imp_active')) || null;
    let accounts = JSON.parse(localStorage.getItem('imp_accounts')) || [];
    let messages = JSON.parse(localStorage.getItem('imp_chat_log')) || [];

    window.onload = () => { if(currentUser) startApp(); };

    function switchTab(id, btn) {
        document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function register() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        if(!name || !email || !pass) return alert("اكمل البيانات!");
        
        const newUser = { name, email, pass, role: 'عضو ملكي', roses: 0, likes: 0, avatar: `https://i.pravatar.cc/150?u=${name}` };
        accounts.push(newUser);
        localStorage.setItem('imp_accounts', JSON.stringify(accounts));
        alert("تم التسجيل بنجاح! يمكنك الآن تسجيل الدخول.");
        switchTab('member', document.querySelectorAll('.tab-btn')[1]);
    }

    function login(type) {
        if(type === 'visitor') {
            const name = document.getElementById('vName').value || "زائر مجهول";
            currentUser = { name, role: 'زائر', avatar: "https://cdn-icons-png.flaticon.com/512/149/149071.png" };
        } else {
            const email = document.getElementById('mEmail').value;
            const pass = document.getElementById('mPass').value;
            const found = accounts.find(a => a.email === email && a.pass === pass);
            if(!found) return alert("البيانات خاطئة!");
            currentUser = found;
        }
        localStorage.setItem('imp_active', JSON.stringify(currentUser));
        startApp();
    }

    function startApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        renderChat();
    }

    function sendMsg() {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        const msg = { sender: currentUser.name, avatar: currentUser.avatar, text, time: new Date().toLocaleTimeString('ar-EG') };
        messages.push(msg);
        localStorage.setItem('imp_chat_log', JSON.stringify(messages));
        renderMsg(msg);
        document.getElementById('msgInput').value = "";
    }

    function renderMsg(msg) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = 'msg-bubble';
        div.innerHTML = `
            <div class="msg-header">
                <div class="header-icon"><img src="${msg.avatar}"></div>
                <div class="name-tag">${msg.sender}</div>
            </div>
            <div class="msg-text">${msg.text}</div>
        `;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function renderChat() {
        document.getElementById('chatBox').innerHTML = "";
        messages.forEach(renderMsg);
    }

    // --- ميزات متقدمة ---
    function searchYoutube() {
        const song = prompt("ابحث عن فيديو يوتيوب:");
        if(song) {
            const videoHtml = `<div style="margin-top:10px;"><iframe width="100%" height="180" src="https://www.youtube.com/embed?listType=search&list=${song}" frameborder="0" allowfullscreen></iframe></div>`;
            sendMsg(`الملك ${currentUser.name} يشغل الآن: ${song} ${videoHtml}`);
        }
    }

    function openRankList(title) {
        let listHtml = accounts.map(a => `
            <div class="list-item">
                <img src="${a.avatar}">
                <div>
                    <b>${a.name}</b><br>
                    <small style="color:gray;">${a.role}</small>
                </div>
                <i class="fas fa-crown" style="margin-right:auto; color:gold;"></i>
            </div>
        `).join('') || "<p>لا يوجد أعضاء في هذه القائمة حالياً</p>";
        showModal(title, listHtml);
    }

    function openAdminPanel() {
        if(currentUser.role === 'زائر') return alert("هذه اللوحة للملوك فقط!");
        showModal("لوحة التحكم الإمبراطورية", `
            <button class="admin-btn" style="background:#2ecc71;" onclick="alert('تعديل صلاحيات الأعضاء مفتوح')">إدارة الأعضاء</button>
            <button class="admin-btn" style="background:#e67e22;" onclick="changeBg()">تغيير الخلفية الملكية</button>
            <button class="admin-btn" style="background:#e74c3c;" onclick="clearAll()">تصفير الشات</button>
        `);
    }

    function changeAppIcon() {
        const icon = document.getElementById('mainIcon');
        const newIcon = prompt("أدخل كود أيقونة FontAwesome (مثلاً: fa-gem, fa-heart):", "fa-user-ninja");
        if(newIcon) icon.className = `fas ${newIcon}`;
    }

    function logout() { localStorage.removeItem('imp_active'); location.reload(); }
    function showModal(t, c) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerHTML = c; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; }
</script>
</body>
                </html>
