<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - التحكم الكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: #fff; overflow: hidden; }

        /* الشريط العلوي */
        .top-nav { position: fixed; top: 0; width: 100%; height: 75px; background: #000; display: flex; border-bottom: 2px solid var(--gold); align-items: center; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--gold); font-size: 10px; cursor: pointer; }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 3px; }

        /* منطقة الشات */
        .chat-view { height: calc(100vh - 210px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; margin-top: 80px; }
        .msg-box { align-self: flex-start; max-width: 90%; }
        .u-header { display: flex; align-items: center; gap: 10px; position: relative; }
        .u-img-wrap { position: relative; cursor: pointer; }
        .u-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #000; position: absolute; bottom: 5px; right: 0; }
        .online { background: #2ecc71; } .offline { background: #e74c3c; }
        .u-name-tag { border: 1px solid var(--gold); padding: 2px 10px; border-radius: 12px; font-size: 12px; background: #111; font-weight: bold; }
        .u-msg-bubble { background: #fff; color: #000; padding: 12px; border-radius: 0 18px 18px 18px; margin-right: 55px; box-shadow: 0 2px 5px rgba(255,215,0,0.2); }

        /* الفوتر */
        .footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--gold); padding: 10px; z-index: 1000; }
        .inp-group { display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; background: #000; border: 1px solid var(--gold); color: #fff; height: 45px; border-radius: 25px; padding: 0 15px; }
        .post-btn { background: var(--king-grad); border: none; padding: 10px 25px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* المودالات واللوحات */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #111; width: 100%; max-width: 400px; border: 2px solid var(--gold); border-radius: 20px; padding: 25px; text-align: center; }
        .card-btn { width: 100%; padding: 12px; margin: 8px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .card-btn:hover { background: var(--gold); color: #000; }
        .edit-inp { width: 100%; background: #000; border: 1px solid var(--gold); color: #fff; padding: 10px; margin: 5px 0; border-radius: 8px; text-align: center; }

        /* إعلان عام */
        #global-msg { position: fixed; top: 80px; width: 90%; left: 5%; background: var(--king-grad); color: #000; padding: 8px; border-radius: 10px; font-weight: bold; display: none; z-index: 2000; text-align: center; animation: slideDown 0.5s; }
        @keyframes slideDown { from { transform: translateY(-100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div id="global-msg">📢 إعلان من الإمبراطور: مرحباً بكم في شات خليل!</div>

<div class="top-nav">
    <div class="nav-item" onclick="openAdmin()"><i class="fas fa-crown"></i>إدارة الإمبراطور</div>
    <div class="nav-item" onclick="showRooms()"><i class="fas fa-door-open"></i>الغرف</div>
    <div class="nav-item" onclick="showWallet()"><i class="fas fa-coins"></i>خزنتي</div>
    <div class="nav-item" style="color:red" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>خروج</div>
</div>

<div class="chat-view" id="mainChat"></div>

<div class="footer">
    <div class="inp-group">
        <i class="fas fa-camera" style="color:var(--gold); font-size:25px;" onclick="document.getElementById('fileInput').click()"></i>
        <input type="text" id="msgText" class="chat-input" placeholder="اكتب رسالتك يا بطل...">
        <button class="post-btn" onclick="send()">نشر</button>
    </div>
</div>

<input type="file" id="fileInput" hidden onchange="updateProfileImg(this)">

<div id="modal" class="overlay"><div class="card" id="modalBody"></div></div>

<script>
    // بيانات المستخدم (تُحفظ في المتصفح)
    let user = JSON.parse(localStorage.getItem('khalil_user')) || {
        name: "خليل ابراهيم",
        age: "25",
        status: "الإمبراطور",
        info: "مؤسس الموقع",
        gold: 100,
        points: 0,
        img: "https://i.pravatar.cc/150?u=khalil",
        rank: "صاحب الموقع",
        isOnline: true
    };

    window.onload = () => {
        save();
        addMsg("حسين (المساعد)", "أهلاً بك يا سيدي خليل! كل شيء تحت سيطرتك الآن، من الرتب حتى الأرباح.", "https://cdn-icons-png.flaticon.com/512/4712/4712035.png", "مساعد آلي", true);
    };

    function save() { localStorage.setItem('khalil_user', JSON.stringify(user)); }

    function send() {
        let t = document.getElementById('msgText').value;
        if(!t) return;
        addMsg(user.name, t, user.img, user.rank, true);
        document.getElementById('msgText').value = "";
        user.gold += 10; // ربح 10 ذهب
        user.points += 5; // ربح نقاط
        save();
    }

    function addMsg(name, text, img, rank, online) {
        let div = document.createElement('div');
        div.className = 'msg-box';
        div.innerHTML = `
            <div class="u-header">
                <div class="u-img-wrap" onclick="showProfileMenu('${name}')">
                    <img src="${img}" class="u-img">
                    <div class="status-dot ${online ? 'online' : 'offline'}"></div>
                </div>
                <i class="fas fa-trophy" style="color:gold"></i>
                <span class="u-name-tag">${name} [${rank}]</span>
            </div>
            <div class="u-msg-bubble">${text}</div>
            <div style="font-size:9px; color:#666; margin-right:60px;">${new Date().toLocaleTimeString()}</div>
        `;
        document.getElementById('mainChat').appendChild(div);
        document.getElementById('mainChat').scrollTop = document.getElementById('mainChat').scrollHeight;
    }

    function showProfileMenu(targetName) {
        let isMe = (targetName === user.name);
        let h = `<h3 style="color:gold">ملف: ${targetName}</h3>`;
        h += `<button class="card-btn" onclick="viewFullProfile('${targetName}')">👁️ عرض البروفايل</button>`;
        if(isMe || user.rank === "صاحب الموقع") {
            h += `<button class="card-btn" onclick="editProfile()">✏️ تعديل البروفايل</button>`;
        }
        h += `<button class="card-btn" style="color:red" onclick="closeM()">إغلاق</button>`;
        document.getElementById('modalBody').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function editProfile() {
        let h = `
            <h3 style="color:gold">تعديل ملفك الملكي</h3>
            <input type="text" id="eName" class="edit-inp" value="${user.name}" placeholder="الاسم">
            <input type="text" id="eStatus" class="edit-inp" value="${user.status}" placeholder="الحالة">
            <input type="text" id="eAge" class="edit-inp" value="${user.age}" placeholder="العمر">
            <textarea id="eInfo" class="edit-inp" placeholder="المعلومات">${user.info}</textarea>
            <button class="card-btn" onclick="saveNewProfile()">حفظ ✅</button>
            <button class="card-btn" onclick="document.getElementById('fileInput').click()">🖼️ تغيير الصورة</button>
            <button class="card-btn" onclick="closeM()">إلغاء</button>
        `;
        document.getElementById('modalBody').innerHTML = h;
    }

    function saveNewProfile() {
        user.name = document.getElementById('eName').value;
        user.status = document.getElementById('eStatus').value;
        user.age = document.getElementById('eAge').value;
        user.info = document.getElementById('eInfo').value;
        save();
        alert("تم تحديث ملفك!");
        closeM();
    }

    function updateProfileImg(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = (e) => {
                user.img = e.target.result;
                save();
                alert("تم تغيير الصورة بنجاح!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function openAdmin() {
        let h = `
            <h3 style="color:gold">لوحة تحكم الإمبراطور</h3>
            <button class="card-btn" onclick="sendGlobal()">📢 إرسال إعلان عام</button>
            <button class="card-btn" onclick="alert('تمت إضافة الغرفة بنجاح')">➕ إضافة غرفة جديدة</button>
            <button class="card-btn" onclick="alert('توزيع رتب مفعل')">⭐ توزيع الرتب والنقاط</button>
            <button class="card-btn" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('modalBody').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function sendGlobal() {
        let msg = prompt("اكتب الإعلان العام:");
        if(msg) {
            let banner = document.getElementById('global-msg');
            banner.innerText = "📢 " + msg;
            banner.style.display = 'block';
            setTimeout(() => banner.style.display = 'none', 5000);
            closeM();
        }
    }

    function showWallet() {
        let h = `
            <h3 style="color:gold">خزنة الإمبراطور 💰</h3>
            <div style="font-size:25px; color:#2ecc71;">رصيدك: ${user.gold} ذهب</div>
            <div style="font-size:18px;">النقاط: ${user.points}</div>
            <hr border="1" color="gold">
            <button class="card-btn" style="background:green" onclick="alert('تم تحويل الأرباح لمحفظتك الرئيسية!')">💸 استلام الأرباح</button>
            <button class="card-btn" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('modalBody').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
                                    </html>
