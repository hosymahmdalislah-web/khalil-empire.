<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Empire - النسخة النهائية</title>
    <style>
        :root {
            --bg-color: #0d0d0d; /* نفس خلفية الصورة */
            --panel-bg: #1c1c1c;
            --main-accent: #ffcc00; /* لون الذهب للكأس */
            --green-active: #2ecc71;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; /* لمنع السكرول الخارجي */
        }

        /* --- واجهة الدخول المدمجة --- */
        #login-screen {
            display: flex;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }

        .login-box {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #555;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            color: var(--main-accent);
            border-bottom: 2px solid var(--main-accent);
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            box-sizing: border-box;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--main-accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- واجهة الشات الرئيسية (نفس المضهر) --- */
        #chat-interface {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* الهيدر العلوي */
        .header {
            background: #000;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }

        .user-top {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-icons {
            display: flex;
            gap: 15px;
            font-size: 20px;
            color: #fff;
        }

        /* الاسم المزخرف وتنسيقه */
        .name-wrapper {
            background: rgba(45, 45, 45, 0.9);
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid #555;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .rank-tag {
            color: var(--main-accent);
            font-size: 14px;
            font-weight: bold;
        }

        .styled-name {
            font-size: 15px;
            font-weight: bold;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--green-active); /* الإطار الأخضر للمتصل */
        }

        /* منطقة رسائل الشات */
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: var(--bg-color);
        }

        /* حقل الإدخال السفلي (كما في الصورة) */
        .input-area {
            display: flex;
            background: #000;
            padding: 15px 10px;
            border-top: 1px solid #222;
            align-items: center;
            gap: 10px;
            position: fixed;
            bottom: 60px; /* فوق البار السفلي */
            width: 100%;
            box-sizing: border-box;
        }

        .btn-action { font-size: 20px; color: #aaa; cursor: pointer; }

        .message-input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #444;
            background: #1c1c1c;
            color: #fff;
        }

        .btn-send {
            font-size: 24px;
            color: #2ecc71; /* لون أخضر للإرسال */
            cursor: pointer;
        }

        /* الشريط السفلي الرئيسي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #333;
            z-index: 10;
        }

        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 11px;
            flex: 1;
        }

        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: #fff; }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="tabs">
                <button class="tab-btn" onclick="switchLogin('visitor')">زائر</button>
                <button class="tab-btn active" onclick="switchLogin('member')">عضوية</button>
                <button class="tab-btn" onclick="switchLogin('new')">تسجيل جديد</button>
            </div>
            
            <div id="login-form">
                <div class="input-group">
                    <input type="text" id="user" placeholder="الاسم المستعار أو البريد">
                </div>
                <div class="input-group">
                    <input type="password" id="pass" placeholder="كلمة المرور">
                </div>
                <button class="btn-main" onclick="enterChat()">دخول الآن</button>
            </div>
        </div>
    </div>

    <div id="chat-interface">
        <div class="header">
            <div class="user-top">
                <img src="https://via.placeholder.com/50" class="avatar">
                <div class="name-wrapper">
                    <span class="rank-tag">🏆 Developer</span>
                    <div class="styled-name">⊱ كـ🌹ــارلـوس ⊰</div>
                </div>
            </div>
            <div class="top-icons">
                <span>🔔</span><span>✉️</span><span>👑</span>
            </div>
        </div>

        <div class="chat-container">
            </div>

        <div class="input-area">
            <span class="btn-action">⊕</span>
            <span class="btn-action">🎙️</span>
            <input type="text" class="message-input" placeholder="اكتب هنا...">
            <span class="btn-action">😊</span>
            <span class="btn-send">➤</span>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><i>⚙️</i>الخيارات</div>
            <div class="nav-item"><i>👥</i>متواجدين</div>
            <div class="nav-item"><i>🏠</i>الغرف</div>
            <div class="nav-item"><i>🎤</i>صوتيات</div>
            <div class="nav-item"><i>📻</i>الراديو</div>
        </div>
    </div>

    <script>
        function switchLogin(type) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if(type === 'visitor') {
                document.getElementById('pass').style.display = 'none';
            } else {
                document.getElementById('pass').style.display = 'block';
            }
        }

        function enterChat() {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
            }, 500);
        }
    </script>
</body>
    </html>
