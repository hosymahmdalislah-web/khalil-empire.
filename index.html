<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية خليل - شات متطور</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #1e1e2e;
            --bg-side: #181825;
            --accent: #89b4fa;
            --text-color: #cdd6f4;
            --input-bg: #313244;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--bg-main); color: var(--text-color); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 280px; background-color: var(--bg-side); display: flex; flex-direction: column; border-left: 1px solid #313244; }
        .server-title { padding: 15px; font-weight: bold; border-bottom: 1px solid #313244; text-align: center; color: var(--accent); font-size: 1.2rem; }
        .section-title { padding: 10px 15px 5px; font-size: 0.85rem; color: #6c7086; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .list-items { flex: 1; overflow-y: auto; padding: 5px 10px; }
        .item { padding: 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; margin-bottom: 5px; transition: 0.2s; }
        .item:hover, .item.active { background-color: var(--input-bg); color: #fff; }
        .item i { margin-left: 10px; }
        .add-btn { cursor: pointer; color: var(--accent); }
        
        /* Main Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-main); }
        .chat-header { padding: 15px; background-color: var(--bg-side); border-bottom: 1px solid #313244; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Message Styling */
        .msg-box { display: flex; align-items: flex-start; gap: 10px; max-width: 80%; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #11111b; }
        .msg-content { background: var(--input-bg); padding: 10px 15px; border-radius: 12px; position: relative; }
        .msg-user { font-weight: bold; font-size: 0.9rem; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
        
        /* Badges for Roles */
        .badge { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .badge.admin { background: #f38ba8; color: #11111b; }
        .badge.mod { background: #fab387; color: #11111b; }
        .badge.user { background: #a6e3a1; color: #11111b; }
        
        /* Chat Input */
        .chat-input-area { padding: 20px; background: var(--bg-main); }
        .input-wrapper { display: flex; background: var(--input-bg); padding: 10px; border-radius: 8px; align-items: center; }
        .input-wrapper input { flex: 1; background: none; border: none; color: #fff; outline: none; padding: 5px 10px; font-size: 1rem; }
        .input-actions i { font-size: 1.2rem; margin-right: 15px; cursor: pointer; color: #a6adc8; transition: 0.2s; }
        .input-actions i:hover { color: var(--accent); }
        
        /* User Status Area */
        .user-panel { padding: 15px; background: #11111b; display: flex; align-items: center; justify-content: space-between; }
        .mic-status { display: flex; gap: 15px; font-size: 1.1rem; }
        .mic-status i { cursor: pointer; }
        .mic-status i.muted { color: #f38ba8; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="server-title">👑 إمبراطورية خليل</div>
        
        <div class="section-title">
            <span>الرومات الصوتية (الميكات)</span>
            <i class="fas fa-plus add-btn" onclick="createRoom('voice')"></i>
        </div>
        <div class="list-items" id="voice-rooms">
            <div class="item active" onclick="switchRoom(this)"><i class="fas fa-volume-up"></i> الميك العام</div>
            <div class="item" onclick="switchRoom(this)"><i class="fas fa-volume-up"></i> مجلس الإدارة</div>
        </div>

        <div class="section-title">
            <span>الرومات النصية</span>
            <i class="fas fa-plus add-btn" onclick="createRoom('text')"></i>
        </div>
        <div class="list-items" id="text-rooms">
            <div class="item active" onclick="switchRoom(this)"><i class="fas fa-hashtag"></i> الدردشة العامة</div>
            <div class="item" onclick="switchRoom(this)"><i class="fas fa-hashtag"></i> ركن الفعاليات</div>
        </div>

        <!-- User Panel -->
        <div class="user-panel">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="msg-avatar" id="current-avatar">خ</div>
                <div>
                    <div style="font-weight:bold;" id="current-username">الزائر</div>
                    <div id="current-role" class="badge user">عضو</div>
                </div>
            </div>
            <div class="mic-status">
                <i class="fas fa-microphone" id="btn-mic" onclick="toggleMic()"></i>
                <i class="fas fa-headphones" id="btn-audio" onclick="toggleAudio()"></i>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-area">
        <div class="chat-header">
            <h3 id="active-room-title"><i class="fas fa-hashtag"></i> الدردشة العامة</h3>
            <div>
                <button class="badge admin" style="border:none; padding:8px 12px; cursor:pointer;" onclick="openAdminPanel()">لوحة التحكم</button>
            </div>
        </div>
        
        <div class="messages" id="message-container">
            <!-- رسالة ترحيبية كمثال تجريبي -->
            <div class="msg-box">
                <div class="msg-avatar">👑</div>
                <div class="msg-content">
                    <div class="msg-user">خليل إبراهيم <span class="badge admin">المالك</span></div>
                    <div>مرحباً بكم في نظام شات إمبراطورية خليل المتطور! يمكنك التحكم بالرتب والرومات والميكات بالكامل من هنا.</div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="input-msg" placeholder="اكتب رسالتك هنا..." onkeypress="checkSend(event)">
                <div class="input-actions">
                    <i class="fas fa-paper-plane" style="color:var(--accent)" onclick="sendMessage()"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myUser = { name: "خليل", role: "admin" }; // تجريبي كأدمن كامل الصلاحيات
        let micMuted = false;
        let audioMuted = false;

        document.getElementById('current-username').innerText = myUser.name;
        document.getElementById('current-role').className = `badge ${myUser.role}`;
        document.getElementById('current-role').innerText = myUser.role === 'admin' ? 'مالك' : 'عضو';

        function switchRoom(element) {
            document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('active-room-title').innerHTML = element.innerHTML;
        }

        function sendMessage() {
            let input = document.getElementById('input-msg');
            if(input.value.trim() === "") return;

            let container = document.getElementById('message-container');
            let msgHtml = `
                <div class="msg-box">
                    <div class="msg-avatar">${myUser.name[0]}</div>
                    <div class="msg-content">
                        <div class="msg-user">${myUser.name} <span class="badge admin">المالك</span></div>
                        <div>${input.value}</div>
                    </div>
                </div>
            `;
            container.innerHTML += msgHtml;
            input.value = "";
            container.scrollTop = container.scrollHeight;
        }

        function checkSend(e) { if(e.key === 'Enter') sendMessage(); }

        function toggleMic() {
            micMuted = !micMuted;
            let micIcon = document.getElementById('btn-mic');
            micIcon.className = micMuted ? "fas fa-microphone-slash muted" : "fas fa-microphone";
        }

        function toggleAudio() {
            audioMuted = !audioMuted;
            let audioIcon = document.getElementById('btn-audio');
            audioIcon.className = audioMuted ? "fas fa-volume-mute muted" : "fas fa-headphones";
        }

        function createRoom(type) {
            Swal.fire({
                title: 'إنشاء غرفة جديدة',
                input: 'text',
                inputPlaceholder: 'اكتب اسم الغرفة...',
                showCancelButton: true,
                confirmButtonText: 'إنشاء',
                cancelButtonText: 'إلغاء'
            }).then((result) => {
                if (result.value) {
                    let id = type === 'text' ? 'text-rooms' : 'voice-rooms';
                    let icon = type === 'text' ? 'fa-hashtag' : 'fa-volume-up';
                    let container = document.getElementById(id);
                    container.innerHTML += `<div class="item" onclick="switchRoom(this)"><i class="fas ${icon}"></i> ${result.value}</div>`;
                }
            });
        }

        function openAdminPanel() {
            Swal.fire({
                title: 'لوحة التحكم الإدارية',
                html: `
                    <div style="text-align:right;">
                        <p><b>إدارة الرتب:</b></p>
                        <select id="swal-role" class="swal2-input" style="width:80%">
                            <option value="admin">إمبراطور / مالك</option>
                            <option value="mod">مشرف (ميوت وطرد)</option>
                            <option value="user">عضو عادي</option>
                        </select>
                        <br><br>
                        <p><b>إعدادات السيرفر:</b></p>
                        <label><input type="checkbox" checked> تفعيل الميكات الصوتية للجميع</label><br>
                        <label><input type="checkbox" checked> السماح بإنشاء رومات فرعية</label>
                    </div>
                `,
                confirmButtonText: 'حفظ الإعدادات'
            });
        }
    </script>
</body>
</html>
