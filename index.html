<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - النسخة السيادية الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); --dark: #000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: #fff; overflow: hidden; }

        /* شاشة الدخول */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #222, #000); z-index: 100000; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .login-card { background: rgba(255, 255, 255, 0.05); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); backdrop-filter: blur(15px); text-align: center; box-shadow: 0 0 50px var(--gold); }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #111; padding: 5px; border-radius: 10px; }
        .tabs button { flex: 1; padding: 10px; border: none; background: none; color: #fff; cursor: pointer; font-size: 11px; }
        .tabs button.active { background: var(--king-grad); color: #000; border-radius: 8px; font-weight: bold; }
        .login-form { display: none; } .login-form.active { display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; text-align: center; }
        .btn-king { width: 100%; padding: 14px; background: var(--king-grad); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* الهيكل الأساسي */
        #chatApp { display: none; height: 100vh; flex-direction: column; position: relative; }
        
        /* الشريط العلوي */
        .top-nav { position: fixed; top: 0; width: 100%; height: 75px; background: #000; display: flex; border-bottom: 2px solid var(--gold); align-items: center; z-index: 1000; padding: 0 5px; overflow-x: auto; }
        .nav-item { min-width: 70px; text-align: center; color: var(--gold); font-size: 9px; cursor: pointer; transition: 0.3s; }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 2px; }

        .chat-view { flex: 1; overflow-y: auto; padding: 85px 10px 145px 10px; display: flex; flex-direction: column; gap: 15px; background: url('https://www.transparenttextures.com/patterns/black-linen.png'); }

        /* الرسائل */
        .msg-container { align-self: flex-start; max-width: 95%; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .avatar-box { position: relative; width: 40px; height: 40px; }
        .user-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .trophy-sep { color: var(--gold); font-size: 14px; filter: drop-shadow(0 0 3px gold); animation: pulse 2s infinite; }
        .user-name-wrap { padding: 3px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; border: 1px solid rgba(241, 196, 15, 0.3); }
        .msg-text { background: #fff; color: #000; padding: 10px 15px; border-radius: 0 15px 15px 15px; font-size: 14px; box-shadow: 2px 2px 10px rgba(0,0,0,0.3); line-height: 1.4; }

        /* الفوتر */
        .footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); z-index: 1000; }
        .input-area { display: flex; padding: 10px; gap: 8px; align-items: center; }
        .msg-inp { flex: 1; background: #111; border: 1px solid var(--gold); color: #fff; height: 40px; border-radius: 20px; padding: 0 15px; }
        .btn-send { background: var(--king-grad); border: none; padding: 8px 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        .bottom-nav { height: 50px; display: flex; align-items: center; background: #000; }
        .b-nav-item { flex: 1; text-align: center; color: var(--gold); font-size: 10px; cursor: pointer; }

        /* المودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100000; align-items: center; justify-content: center; }
        .modal-content { background: #111; width: 90%; max-width: 380px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .stat-card { background: #1a1a1a; padding: 8px; border-radius: 10px; border: 1px solid #333; margin: 5px; flex: 1; }
        .rank-btn { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; font-size: 12px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 40px; color: var(--gold); margin-bottom: 10px;"></i>
        <div class="tabs">
            <button id="t1" class="active" onclick="tab('v')">زائر</button>
            <button id="t2" onclick="tab('m')">عضوية</button>
            <button id="t3" onclick="tab('n')">تسجيل</button>
        </div>
        <div id="f-v" class="login-form active"><input type="text" id="vN" placeholder="اسمك المستعار"><button class="btn-king" onclick="login('v')">دخول سريع</button></div>
        <div id="f-m" class="login-form"><input type="text" id="mN" placeholder="الاسم"><input type="password" id="mP" placeholder="كلمة المرور"><button class="btn-king" onclick="login('m')">دخول</button></div>
        <div id="f-n" class="login-form"><input type="text" id="nN" placeholder="الاسم الجديد"><input type="password" placeholder="كلمة المرور"><button class="btn-king" onclick="login('n')">إنشاء ملكية</button></div>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-item" onclick="openMe()"><i class="fas fa-user-circle"></i>بروفايلي</div>
        <div class="nav-item" onclick="earnMoney()"><i class="fas fa-piggy-bank"></i>الأرباح</div>
        <div class="nav-item" onclick="manageRooms()"><i class="fas fa-door-open"></i>الغرف</div>
        <div class="nav-item" onclick="clearChat()"><i class="fas fa-broom"></i>مسح</div>
        <div class="nav-item" onclick="alert('قائمة المتصدرين بنقاطهم')"><i class="fas fa-gem"></i>الأثرياء</div>
        <div class="nav-item" style="color:red" onclick="logout()"><i class="fas fa-power-off"></i>خروج</div>
    </div>

    <div class="chat-view" id="chatBox"></div>

    <div class="footer">
        <div class="input-area">
            <input type="file" id="imgUp" hidden onchange="uploadImg(this)">
            <i class="fas fa-camera emoji-btn" onclick="document.getElementById('imgUp').click()" style="color:var(--gold); font-size:20px; cursor:pointer"></i>
            <input type="text" id="msgInp" class="msg-inp" placeholder="اكتب رسالتك هنا...">
            <button class="btn-send" onclick="onSend()">نشر</button>
        </div>
        <div class="bottom-nav">
            <div class="b-nav-item" onclick="alert('عدد المتصلين: ' + Math.floor(Math.random()*100))"><i class="fas fa-users"></i> المتصلين</div>
            <div class="b-nav-item" onclick="ytSearch()"><i class="fab fa-youtube"></i> سينما</div>
            <div class="b-nav-item" onclick="openAdmin()"><i class="fas fa-shield-alt"></i> الإدارة</div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeM()" style="float:left; color:red; font-size:25px; cursor:pointer;">&times;</span>
        <div id="mBody"></div>
    </div>
</div>

<script>
    let me = JSON.parse(localStorage.getItem('impUser')) || null;
    let botImg = "https://cdn-icons-png.flaticon.com/512/4712/4712035.png";
    let roomName = "العامة";

    window.onload = () => { if(me) start(); };

    function tab(t) {
        document.querySelectorAll('.login-form').forEach(f=>f.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
        document.getElementById('f-'+t).classList.add('active');
        document.getElementById('t'+(t=='v'?1:t=='m'?2:3)).classList.add('active');
    }

    function login(type) {
        let nameField = document.getElementById(type+'N');
        let name = nameField.value || "زائر_" + Math.floor(Math.random()*1000);
        
        me = {
            name: name,
            role: name.includes("مدير") ? "الإمبراطور" : "عضو جديد",
            roleCol: name.includes("مدير") ? "gold" : "#fff",
            bg: name.includes("مدير") ? "#332b00" : "#222",
            icon: "https://i.pravatar.cc/150?u=" + name,
            points: 1000,
            roses: 5,
            level: 1,
            joinDate: new Date().toLocaleDateString()
        };
        save();
        start();
    }

    function save() { localStorage.setItem('impUser', JSON.stringify(me)); }

    function start() {
        document.getElementById('loginOverlay').style.display='none';
        document.getElementById('chatApp').style.display='flex';
        sendMsg("النظام", `مرحباً بك يا <b>${me.name}</b> في غرفة <b>${roomName}</b>`, botImg, "بوت", "cyan", "#000", false);
    }

    function onSend() {
        let txt = document.getElementById('msgInp').value;
        if(!txt) return;
        sendMsg(me.name, txt, me.icon, me.role, me.roleCol, me.bg, true);
        document.getElementById('msgInp').value = "";
        
        // رد تلقائي بسيط لبيان عمل النظام
        if(txt.includes("حسين")) {
            setTimeout(() => sendMsg("حسين", "لبيك يا سيدي، كل الأوامر تعمل!", botImg, "مساعد", "lime", "#000", false), 600);
        }
    }

    function sendMsg(user, text, img, role, rCol, rBg, hasTrophy) {
        let div = document.createElement('div');
        div.className = 'msg-container';
        div.innerHTML = `
            <div class="msg-header">
                <div class="avatar-box"><img src="${img}" class="user-img" onclick="viewUser('${user}', '${role}', '${img}')"></div>
                ${hasTrophy ? '<i class="fas fa-trophy trophy-sep"></i>' : ''}
                <div class="user-name-wrap" style="background:${rBg}; color:${rCol}">${user} [${role}]</div>
            </div>
            <div class="msg-text">${text}</div>
        `;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    function viewUser(name, role, img) {
        let isMe = (name === me.name);
        let html = `
            <img src="${img}" style="width:80px; height:80px; border-radius:50%; border:2px solid gold;">
            <h2 style="color:gold; margin:10px 0;">${name}</h2>
            <p style="font-size:12px">${role}</p>
            <div style="display:flex; flex-wrap:wrap">
                <div class="stat-card">نقاط: ${isMe ? me.points : 0}</div>
                <div class="stat-card">مستوى: ${isMe ? me.level : 1}</div>
            </div>`;
        
        if(isMe) {
            html += `
                <hr>
                <input type="text" id="newName" placeholder="اسم جديد" style="width:80%">
                <button class="rank-btn" style="background:blue" onclick="editProfile()">تحديث البيانات</button>
                <button class="rank-btn" style="background:purple" onclick="changeNameColor()">تغيير لون الاسم</button>
            `;
        } else {
            html += `
                <button class="rank-btn" style="background:red" onclick="adminAction('طرد')">طرد</button>
                <button class="rank-btn" style="background:orange" onclick="adminAction('كتم')">كتم</button>
                <button class="rank-btn" style="background:gold; color:black" onclick="giftRose()">إهداء وردة 🌹</button>
            `;
        }
        
        document.getElementById('mBody').innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    }

    function editProfile() {
        let n = document.getElementById('newName').value;
        if(n) me.name = n;
        save();
        alert("تم حفظ التعديلات بنجاح!");
        location.reload();
    }

    function earnMoney() {
        let reward = 50;
        me.points += reward;
        save();
        alert(`لقد ربحت ${reward} نقطة ذهبية مكافأة تواجد!`);
    }

    function clearChat() {
        if(confirm("هل تريد مسح الدردشة بالكامل؟")) {
            document.getElementById('chatBox').innerHTML = "";
            sendMsg("النظام", "تم تنظيف الغرفة بواسطة الإدارة", botImg, "بوت", "red", "#000", false);
        }
    }

    function manageRooms() {
        let r = prompt("ادخل اسم الغرفة الجديدة:");
        if(r) {
            roomName = r;
            document.getElementById('chatBox').innerHTML = "";
            sendMsg("النظام", "انتقلت الآن إلى غرفة: " + r, botImg, "نظام", "gold", "#000", false);
        }
    }

    function changeNameColor() {
        let c = prompt("ادخل كود اللون (مثلاً red أو #00ff00):");
        if(c) { me.roleCol = c; save(); alert("تم تغيير اللون!"); }
    }

    function uploadImg(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                sendMsg(me.name, `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`, me.icon, me.role, me.roleCol, me.bg, true);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function ytSearch() {
        let q = prompt("ابحث في يوتيوب:");
        if(q) sendMsg(me.name, `🎬 ابحث عن: ${q} <br><a href="https://www.youtube.com/results?search_query=${q}" target="_blank" style="color:red">اضغط لمشاهدة النتائج</a>`, me.icon, me.role, me.roleCol, me.bg, true);
    }

    function adminAction(act) { alert("تم تنفيذ إجراء " + act + " بنجاح!"); closeM(); }
    function giftRose() { alert("تم إرسال وردة بنجاح 🌹"); closeM(); }
    function closeM() { document.getElementById('modal').style.display='none'; }
    function logout() { if(confirm("هل تريد الخروج؟")) { localStorage.removeItem('impUser'); location.reload(); } }
</script>
</body>
                                                                             </html>
