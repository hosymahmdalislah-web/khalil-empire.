<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - النسخة الملكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; overflow: hidden; position: relative; }

        /* شاشة الدخول الاحترافية - (زائر، عضوية، تسجيل جديد) */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #444, #000); z-index: 100000; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .login-card { background: #fff; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; border: 4px solid var(--gold); text-align: center; box-shadow: 0 0 20px gold; }
        .login-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--king-grad); color: #000; }
        .login-form { display: none; } .login-form.active { display: block; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ccc; text-align: center; }

        /* الواجهة الرئيسية */
        #chatApp { display: none; height: 100vh; flex-direction: column; background-size: cover; background-position: center; }
        
        /* الشريط العلوي */
        .top-nav { height: 65px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid gold; z-index: 100; }
        .nav-btn { color: gold; text-align: center; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 2px; }

        /* منطقة المايكات */
        .mic-section { height: 90px; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); display: flex; justify-content: space-around; align-items: center; padding: 5px; border-bottom: 1px solid gold; }
        .user-mic { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; position: relative; cursor: pointer; }
        .user-mic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .lvl-badge { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: gold; color: #000; font-size: 10px; font-weight: bold; padding: 1px 5px; border-radius: 5px; border: 1px solid #000; }

        /* منطقة الشات - التركيز على فصل الكأس والأيقونة الدائرية */
        .chat-view { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .msg-bubble { align-self: flex-start; max-width: 90%; display: flex; flex-direction: column; }
        
        /* تصميم الرأس: أيقونة دائرية + كأس منفصل + خلفية اسم */
        .msg-header-container { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        
        /* الأيقونة الدائرية المتوضعة (بجانب الكأس) */
        .header-circle-icon { width: 28px; height: 28px; border-radius: 50%; border: 2px solid gold; background: #fff; overflow: hidden; box-shadow: 0 0 5px gold; }
        .header-circle-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        /* الكأس المنفصل */
        .trophy-standalone { color: gold; font-size: 18px; filter: drop-shadow(1px 1px 2px #000); }
        
        /* خلفية الاسم المستقلة */
        .name-background { background: #000; color: gold; border: 1.5px solid gold; padding: 2px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; }

        .msg-text { background: #fff; padding: 10px 15px; border-radius: 0 15px 15px 15px; border: 1px solid #ddd; font-size: 14px; box-shadow: 2px 2px 8px rgba(0,0,0,0.2); color: #000; }

        /* لوحة الكتابة السفلية - علم اليمن */
        .bottom-panel { height: 75px; background: linear-gradient(to bottom, #FF0000 33.3%, #FFFFFF 33.3%, #FFFFFF 66.6%, #000000 66.6%); display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 2px solid gold; }
        .msg-input { flex: 1; height: 45px; border-radius: 25px; border: 2px solid gold; padding: 0 15px; font-weight: bold; }
        .icon-btn { font-size: 26px; color: #000; cursor: pointer; filter: drop-shadow(1px 1px 1px #fff); }

        /* المودالات */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-box { background: #fff; width: 100%; max-width: 400px; border-radius: 20px; border: 4px solid gold; overflow: hidden; }
        .m-header { background: #000; color: gold; padding: 12px; text-align: center; font-weight: bold; }
        .m-body { padding: 15px; max-height: 70vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .admin-btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: #fff; cursor: pointer; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 50px; color: gold; margin-bottom: 10px;"></i>
        <div class="login-tabs">
            <button class="tab-btn active" onclick="switchTab('visitor', this)">دخول زائر</button>
            <button class="tab-btn" onclick="switchTab('member', this)">عضوية</button>
            <button class="tab-btn" onclick="switchTab('new', this)">جديد</button>
        </div>
        
        <div id="visitor" class="login-form active">
            <input type="text" id="visName" placeholder="أدخل اسم الزائر">
            <button class="tab-btn active" style="width:100%" onclick="login('visitor')">دخول سريع 🚀</button>
        </div>

        <div id="member" class="login-form">
            <input type="email" id="memEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="memPass" placeholder="كلمة المرور">
            <button class="tab-btn active" style="width:100%" onclick="login('member')">دخول العضوية 🔐</button>
        </div>

        <div id="new" class="login-form">
            <input type="text" id="newName" placeholder="الاسم الملكي">
            <input type="email" id="newEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="newPass" placeholder="كلمة المرور">
            <button class="tab-btn active" style="width:100%" onclick="login('new')">إنشاء حساب 👑</button>
        </div>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-btn" onclick="openMyProfile()"><i class="fas fa-user-shield"></i>بروفايلي</div>
        <div class="nav-btn" onclick="openAppearance()"><i class="fas fa-image"></i>الخلفية</div>
        <div class="nav-btn" onclick="openRooms()"><i class="fas fa-door-open"></i>الغرف</div>
        <div class="nav-btn" onclick="openList('الأثرياء')"><i class="fas fa-gem"></i>الأثرياء</div>
        <div class="nav-btn" onclick="openList('الكبار')"><i class="fas fa-medal"></i>الكبار</div>
        <div class="nav-btn" onclick="location.reload()"><i class="fas fa-power-off"></i>خروج</div>
    </div>

    <div class="mic-section">
        <div class="user-mic" onclick="adminControl('الإمبراطور')"><img src="https://i.pravatar.cc/150?u=1" id="mainAv"><span class="lvl-badge">1000</span></div>
        <div class="user-mic" onclick="adminControl('عاشق اليمن')"><img src="https://i.pravatar.cc/150?u=2"><span class="lvl-badge">500</span></div>
        <div class="user-mic" onclick="adminControl('صقر العرب')"><img src="https://i.pravatar.cc/150?u=3"><span class="lvl-badge">220</span></div>
    </div>

    <div class="chat-view" id="chatBox"></div>

    <div class="bottom-panel">
        <input type="file" id="imgUpload" hidden onchange="uploadToChat(this, 'img')">
        <i class="fas fa-camera icon-btn" onclick="document.getElementById('imgUpload').click()"></i>
        <i class="fab fa-youtube icon-btn" style="color:red" onclick="youtubeTrigger()"></i>
        <input type="text" id="mainMsgInp" class="msg-input" placeholder="اكتب رسالتك الملكية...">
        <i class="fas fa-paper-plane icon-btn" style="color: gold;" onclick="sendKingMsg()"></i>
    </div>
</div>

<div id="globalModal" class="modal">
    <div class="modal-box">
        <div class="m-header" id="modalTitle">الإعدادات</div>
        <div class="m-body" id="modalBody"></div>
        <button onclick="closeGlobalMod()" style="width:100%; padding:15px; background:#f5f5f5; border:none; cursor:pointer; font-weight:bold; color:red;">إغلاق</button>
    </div>
</div>

<script>
    // بيانات المستخدم مع أيقونة الرأس الدائرية
    let myData = { 
        name: "زائر", 
        avatar: "https://i.pravatar.cc/150?u=v", 
        headerCircle: "https://i.pravatar.cc/150?u=icon", // الأيقونة الدائرية بجانب الكأس
        bg: "", 
        level: 1, 
        type: "visitor" 
    };

    function switchTab(id, btn) {
        document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function login(type) {
        const nameInput = (type === 'visitor') ? document.getElementById('visName').value : (type === 'new' ? document.getElementById('newName').value : "عضو ملكي");
        myData.name = nameInput || "إمبراطور مجهول";
        myData.type = type;
        myData.level = (type === 'visitor') ? 1 : 1000;
        startApp();
    }

    function startApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        if(myData.bg) document.getElementById('chatApp').style.backgroundImage = `url(${myData.bg})`;
        document.getElementById('mainAv').src = myData.avatar;
        sendKingMsg("دخل الإمبراطور للسيطرة على الأجواء! 🛡️");
    }

    function sendKingMsg(customText = null) {
        const inp = document.getElementById('mainMsgInp');
        const val = customText || inp.value;
        if(!val) return;
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = 'msg-bubble';
        
        // هنا التصميم المطلوب: أيقونة دائرية + كأس منفصل + خلفية اسم
        div.innerHTML = `
            <div class="msg-header-container">
                <div class="header-circle-icon">
                    <img src="${myData.headerCircle}">
                </div>
                <i class="fas fa-trophy trophy-standalone"></i>
                <div class="name-background">${myData.name}</div>
            </div>
            <div class="msg-text">${val}</div>
        `;
        box.appendChild(div);
        inp.value = "";
        box.scrollTop = box.scrollHeight;
    }

    function uploadToChat(input, mode) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const res = e.target.result;
                if(mode === 'img') sendKingMsg(`<img src="${res}" style="max-width:100%; border-radius:10px; border:2px solid gold;">`);
                else if(mode === 'bg') {
                    myData.bg = res;
                    document.getElementById('chatApp').style.backgroundImage = `url(${res})`;
                }
                else if(mode === 'av') {
                    myData.avatar = res;
                    document.getElementById('mainAv').src = res;
                }
                else if(mode === 'hCircle') {
                    myData.headerCircle = res; // تعديل الأيقونة بجانب الكأس
                    alert("تم تحديث أيقونة الاسم الدائرية!");
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function openMyProfile() {
        showGlobalMod("تعديل البروفايل الملكي", `
            <label>تغيير الصورة الشخصية:</label>
            <input type="file" onchange="uploadToChat(this, 'av')">
            
            <label>تغيير الأيقونة الدائرية (بجانب الكأس):</label>
            <input type="file" onchange="uploadToChat(this, 'hCircle')">
            
            <label>الاسم الملكي:</label>
            <input type="text" id="editN" value="${myData.name}">
            
            <button class="admin-btn" style="background:var(--king-grad); color:#000" onclick="saveP()">حفظ التغييرات ✅</button>
        `);
    }

    function openAppearance() {
        showGlobalMod("تغيير خلفية الشات", `
            <label>اختر صورة من ملفاتك:</label>
            <input type="file" onchange="uploadToChat(this, 'bg')">
        `);
    }

    function adminControl(target) {
        showGlobalMod("إدارة العضو: " + target, `
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="admin-btn" style="background:#e67e22" onclick="alert('تم الكتم')">كتم 🔇</button>
                <button class="admin-btn" style="background:#d35400" onclick="alert('تم الطرد')">طرد 🚪</button>
                <button class="admin-btn" style="background:#c0392b" onclick="alert('حظر IP')">حظر 🚫</button>
                <button class="admin-btn" style="background:#2c3e50" onclick="alert('تم الحجب')">حجب 🧱</button>
            </div>
        `);
    }

    function saveP() { 
        myData.name = document.getElementById('editN').value; 
        closeGlobalMod(); 
        sendKingMsg("تم تحديث ملفي الشخصي بنجاح ✨"); 
    }

    function youtubeTrigger() {
        const id = prompt("أدخل كود اليوتيوب:");
        if(id) sendKingMsg(`<iframe width="100%" height="180" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`);
    }

    function openRooms() { showGlobalMod("الغرف", `<button class="admin-btn" style="background:#222">غرفة الإدارة 🛡️</button>`); }
    function openList(t) { showGlobalMod("قائمة " + t, `<div style="text-align:center;">1. الإمبراطور (1000 LVL)</div>`); }
    function showGlobalMod(t, c) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerHTML = c; document.getElementById('globalModal').style.display = 'flex'; }
    function closeGlobalMod() { document.getElementById('globalModal').style.display = 'none'; }
    document.getElementById('mainMsgInp').onkeypress = (e) => { if(e.key === 'Enter') sendKingMsg(); };
</script>

</body>
</html>
