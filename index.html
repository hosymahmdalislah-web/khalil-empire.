<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - 3rab.chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }

        /* شاشة الدخول الملكية */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #333, #000); z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 25px; border: 5px solid var(--gold); text-align: center; box-shadow: 0 0 30px var(--gold); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; text-align: center; }

        /* الواجهة الرئيسية الخلفية */
        #chatApp { display: none; height: 100vh; flex-direction: column; position: relative; background-size: cover; background-position: center; transition: 0.5s; }
        
        /* الشريط العلوي الذهبي */
        .top-nav { background: rgba(0,0,0,0.9); color: gold; display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 3px solid gold; z-index: 10; }
        .nav-btn { text-align: center; font-size: 11px; cursor: pointer; color: gold; transition: 0.3s; }
        .nav-btn:hover { transform: scale(1.1); text-shadow: 0 0 10px gold; }
        .nav-btn i { display: block; font-size: 24px; margin-bottom: 3px; }

        /* المايكات والمستويات */
        .mic-grid { background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid gold; }
        .mic-box { width: 65px; height: 65px; border-radius: 50%; border: 3px solid gold; position: relative; cursor: pointer; box-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .mic-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .level-badge { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background: var(--king-grad); color: #000; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 10px; border: 1px solid #fff; }

        /* منطقة الرسائل */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.05); display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; align-items: flex-start; gap: 10px; animation: slideIn 0.3s ease; }
        .name-strip { padding: 5px 15px; border-radius: 15px; color: white; font-weight: bold; font-size: 13px; border: 1px solid gold; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); position: relative; }
        .msg-content { background: rgba(255,255,255,0.9); padding: 8px 15px; border-radius: 15px; font-size: 14px; color: #333; max-width: 70%; line-height: 1.4; border: 1px solid #ddd; }

        /* لوحة الكتابة الإمبراطورية (علم اليمن) */
        .write-area { 
            padding: 15px; 
            background: linear-gradient(to bottom, #FF0000 33.3%, #FFFFFF 33.3%, #FFFFFF 66.6%, #000000 66.6%); 
            display: flex; align-items: center; gap: 10px; border-top: 3px solid gold; position: relative;
        }
        .write-area::before { content: "3rab.chat - إمبراطورية الشات"; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: gold; font-size: 10px; font-weight: bold; text-shadow: 1px 1px #000; }
        .msg-input { flex: 1; background: #fff; border-radius: 25px; padding: 12px 20px; border: 2px solid gold; font-weight: bold; font-size: 15px; }
        .send-btn { width: 50px; height: 50px; background: var(--king-grad); border: none; border-radius: 50%; color: #000; font-size: 20px; cursor: pointer; box-shadow: 0 0 10px gold; }

        /* مودال المظهر والبروفايل */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200000; align-items: center; justify-content: center; }
        .modal-card { background: #fff; width: 95%; max-width: 450px; border-radius: 30px; border: 5px solid gold; overflow: hidden; animation: zoomIn 0.3s; }
        .m-header { background: #000; color: gold; padding: 20px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 2px solid gold; }
        .m-body { padding: 25px; display: flex; flex-direction: column; gap: 15px; max-height: 75vh; overflow-y: auto; }
        .m-body input, .m-body textarea { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #eee; font-size: 15px; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-chess-king" style="font-size: 60px; color: gold; margin-bottom: 15px;"></i>
        <h2>دخول الإدارة العليا</h2>
        <input type="text" id="logUser" placeholder="الاسم الملكي">
        <input type="password" id="logPass" placeholder="كلمة المرور">
        <button class="gold-btn" onclick="login()">دخول وسيطرة 🏆</button>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-btn" onclick="openProfile()"><i class="fas fa-id-card"></i>بروفايلي</div>
        <div class="nav-btn" onclick="openAppearance()"><i class="fas fa-palette"></i>المظهر</div>
        <div class="nav-btn" onclick="openRooms()"><i class="fas fa-gem"></i>الغرف</div>
        <div class="nav-btn" onclick="openElite('الأثرياء')"><i class="fas fa-coins"></i>الأثرياء</div>
        <div class="nav-btn" onclick="openElite('الكبار')"><i class="fas fa-user-shield"></i>الكبار</div>
        <div class="nav-btn" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>خروج</div>
    </div>

    <div class="mic-grid">
        <div class="mic-box" onclick="openProfile()"><img src="https://i.pravatar.cc/150?u=king" id="myAv"><div class="level-badge">LVL 1000</div></div>
        <div class="mic-box"><img src="https://i.pravatar.cc/150?u=a"><div class="level-badge">LVL 450</div></div>
        <div class="mic-box"><img src="https://i.pravatar.cc/150?u=b"><div class="level-badge">LVL 220</div></div>
    </div>

    <div class="chat-area" id="chatBox"></div>

    <div class="write-area">
        <input type="file" id="fileInp" hidden onchange="uploadImg(this)">
        <i class="fas fa-camera" style="font-size: 26px; color: #333; cursor: pointer;" onclick="document.getElementById('fileInp').click()"></i>
        <i class="fab fa-youtube" style="font-size: 26px; color: #ff0000; cursor: pointer;" onclick="playYoutube()"></i>
        <input type="text" id="mainInp" class="msg-input" placeholder="اكتب رسالتك يا ملك...">
        <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div id="mainModal" class="modal">
    <div class="modal-card">
        <div class="m-header" id="mTitle">الإعدادات</div>
        <div class="m-body" id="mBody"></div>
        <button onclick="closeMod()" style="width:100%; padding:15px; background:#f8f9fa; border:none; color:#d63031; font-weight:bold; cursor:pointer;">إغلاق القائمة</button>
    </div>
</div>

<script>
    let myData = JSON.parse(localStorage.getItem('kingUser')) || {
        name: "الإمبراطور",
        avatar: "https://i.pravatar.cc/150?u=king",
        status: "في صدارة المشهد 🛡️",
        bio: "إمبراطور شات 3rab.chat",
        bg: "https://images.unsplash.com/photo-1519750783826-e2420f4d687f",
        lvl: 1000,
        color: "#000000"
    };

    function login() {
        const u = document.getElementById('logUser').value;
        if(u) myData.name = u;
        localStorage.setItem('kingUser', JSON.stringify(myData));
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        document.getElementById('chatApp').style.backgroundImage = `url('${myData.bg}')`;
        sendMsg("دخل الملك الساحة.. تحية إجلال! 👑");
    }

    function sendMsg(txt = null) {
        const inp = document.getElementById('mainInp');
        const val = txt || inp.value;
        if(!val) return;
        const box = document.getElementById('chatBox');
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.innerHTML = `
            <img src="${myData.avatar}" style="width:45px; height:45px; border-radius:50%; border:2px solid gold;">
            <div>
                <div class="name-strip" style="background:${myData.color}">
                    <i class="fas fa-crown" style="color:gold;"></i> ${myData.name} 
                    <span style="font-size:9px; background:gold; color:#000; padding:1px 4px; border-radius:5px; margin-right:5px;">LVL ${myData.lvl}</span>
                </div>
                <div class="msg-content">${val}</div>
            </div>
        `;
        box.appendChild(row);
        inp.value = "";
        box.scrollTop = box.scrollHeight;
    }

    function openProfile() {
        showMod("تعديل البروفايل الملكي", `
            <label>الاسم المستعار:</label><input type="text" id="upName" value="${myData.name}">
            <label>الحالة الشخصية:</label><input type="text" id="upStatus" value="${myData.status}">
            <label>نبذة عنك:</label><textarea id="upBio">${myData.bio}</textarea>
            <label>رابط صورتك:</label><input type="text" id="upAv" value="${myData.avatar}">
            <label>لون الاسم (هوية ملكية):</label><input type="color" id="upColor" value="${myData.color}">
            <button class="gold-btn" onclick="saveProfile()">حفظ التعديلات 💾</button>
        `);
    }

    function openAppearance() {
        showMod("ديكور الإمبراطورية", `
            <label>اختر صورة خلفية من جهازك:</label>
            <input type="file" accept="image/*" onchange="changeBgFile(this)">
            <label>أو ضع رابط خلفية مباشرة:</label>
            <input type="text" id="bgLink" placeholder="http://...">
            <button class="gold-btn" onclick="saveBg()">تحديث الخلفية 🎨</button>
        `);
    }

    function saveProfile() {
        myData.name = document.getElementById('upName').value;
        myData.status = document.getElementById('upStatus').value;
        myData.bio = document.getElementById('upBio').value;
        myData.avatar = document.getElementById('upAv').value;
        myData.color = document.getElementById('upColor').value;
        document.getElementById('myAv').src = myData.avatar;
        localStorage.setItem('kingUser', JSON.stringify(myData));
        closeMod();
        sendMsg("تم تحديث هويتي الملكية بنجاح ✅");
    }

    function changeBgFile(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = (e) => {
                myData.bg = e.target.result;
                document.getElementById('chatApp').style.backgroundImage = `url('${myData.bg}')`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveBg() {
        const link = document.getElementById('bgLink').value;
        if(link) {
            myData.bg = link;
            document.getElementById('chatApp').style.backgroundImage = `url('${link}')`;
        }
        closeMod();
    }

    function openElite(type) {
        showMod(`قائمة ${type}`, `
            <div style="text-align:center;">
                <i class="fas fa-trophy" style="font-size:40px; color:gold;"></i>
                <p>يتم الآن جلب بيانات صفوة الإمبراطورية...</p>
                <div style="background:#f1c40f; color:#000; padding:10px; border-radius:10px; font-weight:bold;">1- الإمبراطور (LVL 1000)</div>
            </div>
        `);
    }

    function openRooms() {
        showMod("غرف الدردشة", `
            <button class="gold-btn" onclick="sendMsg('دخلت غرفة: مجلس الإمبراطورية 🏰'); closeMod();">مجلس الإمبراطورية 🏰</button>
            <button class="gold-btn" style="margin-top:10px;" onclick="sendMsg('دخلت غرفة: يمانيون صقور 🦅'); closeMod();">يمانيون صقور 🦅</button>
        `);
    }

    function playYoutube() {
        const id = prompt("أدخل كود فيديو اليوتيوب:");
        if(id) sendMsg(`<iframe width="100%" height="200" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`);
    }

    function uploadImg(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = (e) => sendMsg(`<img src="${e.target.result}" style="width:100%; border-radius:10px;">`);
            reader.readAsDataURL(input.files[0]);
        }
    }

    function showMod(title, html) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mBody').innerHTML = html;
        document.getElementById('mainModal').style.display = 'flex';
    }
    function closeMod() { document.getElementById('mainModal').style.display = 'none'; }
    document.getElementById('mainInp').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
</script>

</body>
                                                                 </html>
