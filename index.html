<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - التصميم الأصلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* إعادة بناء الهوية البصرية (الأسود والذهبي) */
        :root { --gold: #f1c40f; --dark: #000000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark); color: #fff; overflow: hidden; }

        /* الشريط العلوي - مطابق تماماً للصورة */
        .header-bar { position: fixed; top: 0; width: 100%; height: 70px; background: #000; display: flex; border-bottom: 2px solid var(--gold); align-items: center; z-index: 1000; }
        .h-btn { flex: 1; text-align: center; color: var(--gold); font-size: 11px; cursor: pointer; }
        .h-btn i { display: block; font-size: 22px; margin-bottom: 2px; }

        /* شريط الميكات تحت الهيدر */
        .mics-row { display: flex; justify-content: space-around; padding: 10px; background: #000; margin-top: 72px; border-bottom: 1px solid #222; }
        .mic-unit { width: 50px; height: 50px; border-radius: 50%; border: 2px dashed var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); position: relative; cursor: pointer; }
        .mic-unit.on { border-style: solid; background: linear-gradient(180deg, #ffd700, #b8860b); color: #000; box-shadow: 0 0 10px var(--gold); }

        /* منطقة المحادثة */
        .chat-scroll { height: calc(100vh - 270px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-wrap { align-self: flex-start; max-width: 90%; }
        .msg-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); cursor: pointer; position: relative; }
        .dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; bottom: 0; right: 0; border: 2px solid #000; }
        .online { background: #2ecc71; }
        .name-box { background: #000; border: 1px solid var(--gold); color: #fff; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .bubble { background: #fff; color: #000; padding: 12px; border-radius: 0 15px 15px 15px; margin-right: 50px; font-size: 14px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }

        /* الفوتر المثبت - مطابق تماماً للصورة */
        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); z-index: 1000; }
        .input-row { display: flex; padding: 10px; gap: 10px; align-items: center; }
        .chat-input { flex: 1; background: #000; border: 1px solid var(--gold); color: #fff; height: 42px; border-radius: 20px; padding: 0 15px; outline: none; }
        .send-btn { background: linear-gradient(180deg, #ffd700, #b8860b); border: none; padding: 8px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        
        .bottom-nav { height: 60px; display: flex; align-items: center; justify-content: space-around; color: var(--gold); font-size: 10px; }
        .b-btn { text-align: center; cursor: pointer; flex: 1; }
        .b-btn i { display: block; font-size: 20px; }

        /* نافذة التحكم (المودال) */
        .king-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .king-card { background: #111; width: 90%; max-width: 350px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; }
        .k-btn { width: 100%; padding: 12px; margin: 6px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .k-btn:active { background: var(--gold); color: #000; }
        .k-input { width: 100%; background: #000; border: 1px solid var(--gold); color: #fff; padding: 10px; margin: 5px 0; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="h-btn" onclick="openProfile(me)"><i class="fas fa-id-card"></i>إعداداتي</div>
    <div class="h-btn" onclick="openAdmin()"><i class="fas fa-crown"></i>الإدارة</div>
    <div class="h-btn" onclick="showWallet()"><i class="fas fa-coins"></i>الأرباح</div>
    <div class="h-btn" style="color:red" onclick="location.reload()"><i class="fas fa-power-off"></i>خروج</div>
</div>

<div class="mics-row">
    <div class="mic-unit" id="mic1" onclick="micClick(1)">1</div>
    <div class="mic-unit" id="mic2" onclick="micClick(2)">2</div>
    <div class="mic-unit" id="mic3" onclick="micClick(3)">3</div>
    <div class="mic-unit" id="mic4" onclick="micClick(4)">4</div>
</div>

<div class="chat-scroll" id="box"></div>

<div class="footer-fixed">
    <div class="input-row">
        <i class="fas fa-laugh-beam" style="color:var(--gold); font-size:24px;" onclick="alert('لوحة الإيموجي')"></i>
        <i class="fas fa-camera" style="color:var(--gold); font-size:24px;" onclick="document.getElementById('file').click()"></i>
        <input type="text" id="inp" class="chat-input" placeholder="تحدث يا إمبراطور...">
        <button class="send-btn" onclick="send()">نشر</button>
    </div>
    <div class="bottom-nav">
        <div class="b-btn"><i class="fas fa-users"></i>المتواجدون</div>
        <div class="b-btn" onclick="playYT()"><i class="fab fa-youtube" style="color:red"></i>يوتيوب</div>
        <div class="b-btn"><i class="fas fa-microphone"></i>تسجيل</div>
        <div class="b-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i>تحديث</div>
    </div>
</div>

<input type="file" id="file" hidden onchange="updatePhoto(this)">
<div id="modal" class="king-modal"><div class="king-card" id="mContent"></div></div>

<script>
    // بياناتك محفوظة ولا تتغير أبداً عند الخروج
    let me = JSON.parse(localStorage.getItem('king_data')) || {
        name: "خليل ابراهيم",
        age: "25",
        status: "صاحب الموقع",
        bio: "إمبراطور الشات",
        gold: 0,
        img: "https://i.pravatar.cc/150?u=khalil"
    };

    window.onload = () => {
        save();
        renderMsg("حسين", "تمت استعادة التصميم الأصلي يا سيدي! كل الأزرار مفعلة الآن.", "https://cdn-icons-png.flaticon.com/512/4712/4712035.png", false);
    };

    function save() { localStorage.setItem('king_data', JSON.stringify(me)); }

    function send() {
        let t = document.getElementById('inp').value;
        if(!t) return;
        renderMsg(me.name, t, me.img, true);
        document.getElementById('inp').value = "";
        me.gold += 10; // ربح الذهب
        save();
    }

    function renderMsg(name, txt, img, king) {
        let div = document.createElement('div');
        div.className = 'msg-wrap';
        div.innerHTML = `
            <div class="msg-top">
                <div class="pfp" onclick="openProfile({name:'${name}', img:'${img}'})">
                    <img src="${img}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                    <div class="dot online"></div>
                </div>
                ${king ? '<i class="fas fa-trophy" style="color:gold"></i>' : ''}
                <span class="name-box">${name}</span>
            </div>
            <div class="bubble">${txt}</div>
        `;
        document.getElementById('box').appendChild(div);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    }

    function openProfile(user) {
        let isMe = (user.name === me.name);
        let h = `
            <h3 style="color:gold">${isMe ? 'ملفي الشخصي' : 'ملف العضو'}</h3>
            <img src="${isMe ? me.img : user.img}" style="width:80px; height:80px; border-radius:50%; border:2px solid gold;">
            <div style="margin:10px 0;">الاسم: ${isMe ? me.name : user.name}</div>
            <div style="margin:10px 0;">الحالة: ${isMe ? me.status : 'عضو'}</div>
            <div style="margin:10px 0;">العمر: ${isMe ? me.age : '??'}</div>
            ${isMe ? '<button class="k-btn" onclick="editMe()">✏️ تعديل بياناتي</button>' : ''}
            <button class="k-btn" style="color:red" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function editMe() {
        let h = `
            <h3 style="color:gold">تعديل البيانات</h3>
            <input type="text" id="eN" class="k-input" value="${me.name}" placeholder="الاسم">
            <input type="text" id="eS" class="k-input" value="${me.status}" placeholder="الحالة">
            <input type="text" id="eA" class="k-input" value="${me.age}" placeholder="العمر">
            <button class="k-btn" onclick="saveMe()">حفظ ✅</button>
            <button class="k-btn" onclick="document.getElementById('file').click()">🖼️ تغيير الصورة</button>
        `;
        document.getElementById('mContent').innerHTML = h;
    }

    function saveMe() {
        me.name = document.getElementById('eN').value;
        me.status = document.getElementById('eS').value;
        me.age = document.getElementById('eA').value;
        save();
        alert("تم الحفظ!");
        closeM();
    }

    function micClick(id) {
        let h = `
            <h3 style="color:gold">الميكروفون ${id}</h3>
            <button class="k-btn" onclick="joinMic(${id})">🎙️ صعود الميك</button>
            <button class="k-btn">🔇 كتم</button>
            <button class="k-btn" onclick="playYT()">🎵 تشغيل أغنية</button>
            <button class="k-btn" style="color:red" onclick="closeM(); leaveMic(${id})">مغادرة</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function joinMic(id) {
        document.getElementById('mic'+id).classList.add('on');
        alert("أنت الآن تتحدث على ميك " + id);
        closeM();
    }

    function leaveMic(id) {
        document.getElementById('mic'+id).classList.remove('on');
    }

    function showWallet() {
        let h = `
            <h3 style="color:gold">خزنة الإمبراطور</h3>
            <div style="font-size:30px; color:#2ecc71;">$${(me.gold / 10).toFixed(2)}</div>
            <button class="k-btn" style="background:green" onclick="alert('تم السحب!')">💸 استلام الأرباح</button>
            <button class="k-btn" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function openAdmin() {
        let h = `
            <h3 style="color:gold">لوحة الإدارة</h3>
            <button class="k-btn" onclick="let s=prompt('الإعلان:'); if(s) alert('تم النشر')">📢 إعلان عام</button>
            <button class="k-btn" onclick="alert('تم إضافة غرفة')">➕ إضافة غرفة</button>
            <button class="k-btn" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function updatePhoto(input) {
        if (input.files[0]) {
            let r = new FileReader();
            r.onload = (e) => { me.img = e.target.result; save(); alert("تغيرت الصورة!"); };
            r.readAsDataURL(input.files[0]);
        }
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function playYT() { let s = prompt("اسم الأغنية؟"); if(s) renderMsg(me.name, `🎬 فيديو: ${s}<br><iframe width="100%" height="180" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>`, me.img, true); }
</script>
</body>
            </html>
