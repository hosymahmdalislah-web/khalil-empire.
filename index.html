<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة الكأس 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #2d0a4e; color: white; margin: 0; overflow: hidden; }
        .gold-border { border: 2px solid #ffd700; box-shadow: 0 0 15px #ffd700; }
        .royal-gradient { background: linear-gradient(135deg, #6b21a8, #2d0a4e); }
        .tab-content { display: none; height: calc(100vh - 160px); overflow-y: auto; }
        .tab-content.active { display: block; }
        .royal-btn { background: #ffd700; color: #2d0a4e; font-weight: bold; border-radius: 50%; width: 45px; height: 45px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="royal-gradient p-4 text-center border-b-2 border-yellow-500">
        <h1 class="text-2xl font-bold text-yellow-400 italic">👑 مملكة الكأس 👑</h1>
        <div class="flex justify-around mt-2 text-xs">
            <span class="bg-yellow-600 px-2 py-1 rounded">الرتبة: الملك خليل 👑</span>
            <span class="bg-yellow-600 px-2 py-1 rounded">الذهب: 1,000,000 💰</span>
        </div>
    </header>

    <nav class="flex justify-around bg-purple-900 p-3 border-b border-yellow-700">
        <button onclick="showTab('chat')" class="nav-link text-yellow-400"><i class="fas fa-comments text-xl"></i></button>
        <button onclick="showTab('private')" class="nav-link"><i class="fas fa-comment-medical text-xl"></i></button>
        <button onclick="showTab('rich')" class="nav-link"><i class="fas fa-gem text-xl"></i></button>
        <button onclick="showTab('settings')" class="nav-link"><i class="fas fa-crown text-xl"></i></button>
    </nav>

    <main class="flex-1 p-4">
        <div id="chat" class="tab-content active space-y-3">
            <div class="bg-purple-800/50 p-3 rounded-lg border-r-4 border-yellow-500">
                <span class="text-yellow-400 font-bold ml-2">[الملك خليل]:</span>
                <span>مرحباً بكم في إمبراطوريتي.. الدردشة مفتوحة الآن! 👑</span>
            </div>
        </div>

        <div id="private" class="tab-content text-center pt-20">
            <i class="fas fa-user-shield text-6xl text-yellow-600 mb-4"></i>
            <h2 class="text-xl font-bold text-yellow-400">الدردشة الخاصة (مشفرة)</h2>
            <p class="text-gray-400 mt-2">غرفتك الخاصة يا ملك خليل جاهزة لاستقبال الرسائل.</p>
        </div>

        <div id="rich" class="tab-content">
            <h2 class="text-center text-yellow-400 mb-4 font-bold border-b border-yellow-600 pb-2">💎 قائمة أثرياء المملكة 💎</h2>
            <div class="flex justify-between items-center bg-yellow-600/20 p-3 rounded-lg border border-yellow-500">
                <span class="font-bold text-lg">1. الملك خليل إبراهيم 👑</span>
                <span class="text-yellow-300">مليونير المملكة</span>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-purple-900 border-t border-yellow-700">
        <div class="flex gap-2">
            <input type="text" placeholder="اكتب أمرك يا ملك..." class="flex-1 p-3 rounded-full bg-purple-800 border border-yellow-600 text-white focus:outline-none focus:border-yellow-400">
            <button class="royal-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </footer>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('text-yellow-400'));
            event.currentTarget.classList.add('text-yellow-400');
        }
    </script>
</body>
</html>
