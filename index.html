<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - التحكم المطلق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: #fff; overflow: hidden; }

        /* شريط الميكات الجديد */
        .mic-container { display: flex; justify-content: space-around; padding: 10px; background: rgba(20,20,20,0.9); border-bottom: 1px solid var(--gold); margin-top: 75px; }
        .mic-box { width: 60px; height: 60px; border-radius: 50%; border: 2px dashed var(--gold); display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; font-size: 10px; color: var(--gold); transition: 0.3s; }
        .mic-box.active { border-style: solid; background: var(--king-grad); color: #000; box-shadow: 0 0 15px var(--gold); }
        .mic-box i { font-size: 20px; }

        /* مظهر الشات */
        .top-nav { position: fixed; top: 0; width: 100%; height: 75px; background: #000; display: flex; border-bottom: 2px solid var(--gold); align-items: center; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--gold); font-size: 10px; cursor: pointer; }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 3px; }

        .chat-view { height: calc(100vh - 270px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; margin-top: 5px; }
        
        /* الرسائل والكأس */
        .msg-container { align-self: flex-start; max-width: 90%; position: relative; }
        .msg-header { display: flex; align-items: center; gap: 10px; }
        .user-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); cursor: pointer; }
        .trophy-king { color: var(--gold); font-size: 20px; margin: 0 5px; filter: drop-shadow(0 0 5px gold); }
        .user-name { font-weight: bold; font-size: 13px; color: #fff; padding: 2px 8px; border-radius: 10px; }

        /* الفوتر */
        .footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); }
        .input-bar { display: flex; padding: 10px; gap: 10px; align-items: center; }
        .inp-main { flex: 1; background: #111; border: 1px solid var(--gold); color: #fff; height: 45px; border-radius: 25px; padding: 0 15px; }
        .btn-gold { background: var(--king-grad); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* مودال الخيارات */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #111; width: 90%; max-width: 350px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; }
        .opt-btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #222; color: #fff; }
        .opt-btn:hover { background: var(--king-grad); color: #000; }

        /* الأرباح */
        .bank-info { color: #2ecc71; font-weight: bold; font-size: 18px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-item" onclick="openProfile(me)"><i class="fas fa-user-cog"></i>إعداداتي</div>
    <div class="nav-item" onclick="showAdmin()"><i class="fas fa-tasks"></i>الإدارة</div>
    <div class="nav-item" onclick="alert('الأرباح: $450.00')"><i class="fas fa-wallet"></i>أرباحي</div>
    <div class="nav-item"><i class="fas fa-gem"></i>المتجر</div>
    <div class="nav-item" style="color:red" onclick="location.reload()"><i class="fas fa-power-off"></i>خروج</div>
</div>

<div class="mic-container">
    <div class="mic-box" onclick="micAction(1)" id="mic1"><i class="fas fa-microphone"></i>1</div>
    <div class="mic-box" onclick="micAction(2)" id="mic2"><i class="fas fa-microphone"></i>2</div>
    <div class="mic-box" onclick="micAction(3)" id="mic3"><i class="fas fa-microphone"></i>3</div>
    <div class="mic-box" onclick="micAction(4)" id="mic4"><i class="fas fa-microphone"></i>4</div>
</div>

<div class="chat-view" id="chatBox"></div>

<div class="footer">
    <div class="input-bar">
        <i class="fas fa-smile" style="color:var(--gold); font-size:25px;" onclick="showEmojis()"></i>
        <i class="fas fa-camera" style="color:var(--gold); font-size:25px;" onclick="document.getElementById('fileInp').click()"></i>
        <input type="text" id="msgInp" class="inp-main" placeholder="تحدث يا ملك...">
        <button class="btn-gold" onclick="send()">نشر</button>
    </div>
</div>

<div id="micModal" class="modal">
    <div class="modal-content">
        <h3 id="micTitle" style="color:var(--gold)">خيارات الميكروفون</h3>
        <button class="opt-btn" onclick="alert('تم كتم الصوت')">🔇 كتم الصوت</button>
        <button class="opt-btn" onclick="playMusicOnMic()">🎵 تشغيل أغنية</button>
        <button class="opt-btn" onclick="alert('بدء جولة الميك')">🔥 جولة مع الميك</button>
        <button class="opt-btn" onclick="alert('تم إرسال إيموجي')">😂 إيموجي معبر</button>
        <button class="opt-btn" style="background:red" onclick="leaveMic()">🚪 مغادرة الميك</button>
    </div>
</div>

<script>
    let me = {
        name: "خليل ابراهيم",
        role: "صاحب الموقع",
        icon: "https://i.pravatar.cc/150?u=king",
        balance: 5000.75,
        isKing: true
    };

    let currentMic = null;

    function send() {
        let t = document.getElementById('msgInp').value;
        if(!t) return;
        renderMsg(me.name, t, me.icon, me.isKing);
        document.getElementById('msgInp').value = "";
    }

    function renderMsg(user, text, img, king) {
        let div = document.createElement('div');
        div.className = 'msg-container';
        div.innerHTML = `
            <div class="msg-header">
                <img src="${img}" class="user-img" onclick="openProfile({name:'${user}'})">
                ${king ? '<i class="fas fa-trophy trophy-king"></i>' : ''}
                <span class="user-name">${user}</span>
            </div>
            <div style="background:#fff; color:#000; padding:10px; border-radius:0 15px 15px 15px; margin-right:50px;">${text}</div>
        `;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    function micAction(id) {
        currentMic = id;
        document.getElementById('micModal').style.display = 'flex';
        document.getElementById('mic'+id).classList.add('active');
    }

    function leaveMic() {
        document.getElementById('mic'+currentMic).classList.remove('active');
        document.getElementById('micModal').style.display = 'none';
    }

    function playMusicOnMic() {
        let song = prompt("ادخل اسم الأغنية التي تريد تشغيلها:");
        if(song) {
            renderMsg("النظام", `🎵 يتم الآن تشغيل [${song}] على ميكروفون ${currentMic}`, me.icon, false);
            // هنا يتم البحث وتنزيل الفيديو تلقائياً (محاكاة)
            let videoHtml = `<div style="text-align:center; margin:10px 0;"><iframe width="200" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0"></iframe></div>`;
            setTimeout(() => {
                let vDiv = document.createElement('div');
                vDiv.innerHTML = videoHtml;
                document.getElementById('chatBox').appendChild(vDiv);
            }, 1000);
        }
    }

    function showAdmin() {
        let h = `
            <h2 style="color:var(--gold)">لوحة الإدارة المطلقة</h2>
            <button class="opt-btn" onclick="addRoom()">➕ إضافة غرفة جديدة</button>
            <button class="opt-btn" onclick="changeRoomBg()">🖼️ تغيير خلفية الروم</button>
            <button class="opt-btn" onclick="alert('تم تفعيل الـ 4 ميكات')">🎤 ضبط الميكروفونات</button>
            <div class="bank-info">💰 رصيد الأرباح: $${me.balance}</div>
            <button class="opt-btn" style="background:green" onclick="alert('جاري التحويل لـ Paypal...')">💸 سحب الأرباح</button>
        `;
        document.getElementById('mBody').innerHTML = h; // سنستخدم المودال القديم
        alert("فتحت لوحة الإدارة يا ملك!");
    }

    // إيموجيات متحركة
    function showEmojis() {
        let emojis = "🔥,👑,😂,❤️,🌹,💎,🦁,⚡";
        let res = prompt("اختر إيموجي متحرك: " + emojis);
        if(res) renderMsg(me.name, `<span style="font-size:40px; animation: bounce 1s infinite;">${res}</span>`, me.icon, true);
    }
</script>

<style>
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
</style>

</body>
        </html>
