<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - 3rab.chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }

        /* شاشة تسجيل الدخول المتقدمة - بناءً على طلبك */
        #loginOverlay { position: fixed; inset: 0; background: url('https://images.unsplash.com/photo-1510511459019-5dda7724fd87?auto=format&fit=crop&q=80') center/cover; z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.95); width: 92%; max-width: 400px; padding: 30px; border-radius: 25px; border: 5px solid var(--gold); text-align: center; box-shadow: 0 0 30px var(--gold); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ccc; text-align: center; font-size: 14px; }
        
        /* الواجهة الرئيسية */
        #chatApp { display: none; height: 100vh; flex-direction: column; position: relative; background: #eee center/cover; }
        
        /* الشريط العلوي - نسخة 75668.png */
        .top-nav { background: #000; color: gold; display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 3px solid gold; z-index: 10; }
        .nav-btn { text-align: center; font-size: 11px; cursor: pointer; color: gold; }
        .nav-btn i { display: block; font-size: 24px; margin-bottom: 4px; color: gold; }

        /* منطقة المايكات والمستويات */
        .mic-grid { background: rgba(200, 200, 200, 0.8); padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid gold; }
        .mic-box { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff; position: relative; cursor: pointer; background: #fff; }
        .mic-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .lvl-tag { position: absolute; top: -5px; right: -5px; background: var(--king-grad); color: #000; font-size: 10px; font-weight: bold; padding: 2px 5px; border-radius: 5px; border: 1px solid #000; }

        /* منطقة الشات */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-container { display: flex; align-items: flex-start; gap: 10px; animation: fadeIn 0.3s; }
        .user-info-box { background: #000; color: gold; border: 1px solid gold; border-radius: 12px; padding: 5px 12px; font-size: 12px; font-weight: bold; min-width: 100px; text-align: center; }

        /* لوحة الكتابة - علم اليمن */
        .write-panel { 
            background: linear-gradient(to bottom, #FF0000 33.3%, #FFFFFF 33.3%, #FFFFFF 66.6%, #000000 66.6%); 
            padding: 15px; display: flex; align-items: center; gap: 10px; border-top: 3px solid gold;
        }
        .msg-input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 2px solid gold; font-weight: bold; }
        .action-icon { font-size: 25px; color: #000; cursor: pointer; transition: 0.2s; }
        .action-icon:hover { color: gold; transform: scale(1.1); }

        /* مودال - نظام الإدارة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 95%; max-width: 450px; border-radius: 20px; border: 4px solid gold; overflow: hidden; }
        .m-header { background: #000; color: gold; padding: 15px; text-align: center; font-weight: bold; }
        .m-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .admin-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-kick { background: #e67e22; color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-ban { background: #c0392b; color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-mute { background: #7f8c8d; color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="margin-top:0;">إنشاء حساب / دخول</h2>
        <input type="text" id="logUser" placeholder="اسم المستخدم">
        <input type="email" id="logEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="logPass" placeholder="كلمة المرور">
        <button class="btn-kick" style="width:100%; font-size:18px; background:var(--king-grad); color:#000;" onclick="handleLogin()">إرسال ودخول 👑</button>
        <p style="font-size:11px; color:#666; margin-top:10px;">بتسجيلك أنت توافق على شروط الاستخدام</p>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-btn" onclick="openProfile()"><i class="fas fa-user-circle"></i>بروفايلي</div>
        <div class="nav-btn" onclick="openSettings()"><i class="fas fa-edit"></i>المظهر</div>
        <div class="nav-btn" onclick="openRooms()"><i class="fas fa-door-open"></i>الغرف</div>
        <div class="nav-btn" onclick="openList('الأثرياء')"><i class="fas fa-money-bill-wave"></i>الأثرياء</div>
        <div class="nav-btn" onclick="openList('الكبار')"><i class="fas fa-crown"></i>الكبار</div>
        <div class="nav-btn" onclick="location.reload()"><i class="fas fa-power-off"></i>خروج</div>
    </div>

    <div class="mic-grid">
        <div class="mic-box" onclick="manageUser('الإمبراطور')"><img src="https://i.pravatar.cc/150?u=1"><span class="lvl-tag">1000</span></div>
        <div class="mic-box" onclick="manageUser('عضو 1')"><img src="https://i.pravatar.cc/150?u=2"><span class="lvl-tag">500</span></div>
        <div class="mic-box" onclick="manageUser('عضو 2')"><img src="https://i.pravatar.cc/150?u=3"><span class="lvl-tag">120</span></div>
    </div>

    <div class="chat-area" id="chatBox"></div>

    <div class="write-panel">
        <input type="file" id="uploadFile" hidden onchange="processFile(this)">
        <i class="fas fa-image action-icon" onclick="document.getElementById('uploadFile').click()"></i>
        <i class="fab fa-youtube action-icon" style="color:red;" onclick="playYoutube()"></i>
        <input type="text" id="msgInput" class="msg-input" placeholder="اكتب رسالتك الملكية...">
        <i class="fas fa-paper-plane action-icon" onclick="sendMsg()"></i>
    </div>
</div>

<div id="genModal" class="modal">
    <div class="modal-content">
        <div class="m-header" id="mTitle">لوحة التحكم</div>
        <div class="m-body" id="mBody"></div>
        <button onclick="closeMod()" style="width:100%; padding:15px; background:#eee; border:none; cursor:pointer; font-weight:bold;">إغلاق</button>
    </div>
</div>

<script>
    let user = JSON.parse(localStorage.getItem('kingSession')) || null;

    window.onload = () => { if(user) loadApp(); };

    function handleLogin() {
        const name = document.getElementById('logUser').value;
        const email = document.getElementById('logEmail').value;
        const pass = document.getElementById('logPass').value;
        if(!name || !email || !pass) return alert("اكمل البيانات!");
        user = { name, email, avatar: 'https://i.pravatar.cc/150?u='+name, bg: '', status: 'ملك الشات' };
        localStorage.setItem('kingSession', JSON.stringify(user));
        loadApp();
    }

    function loadApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        if(user.bg) document.getElementById('chatApp').style.backgroundImage = `url(${user.bg})`;
        sendMsg("تم تسجيل الدخول بنجاح عبر البريد والاسم 🛡️");
    }

    function sendMsg(text = null) {
        const inp = document.getElementById('msgInput');
        const val = text || inp.value;
        if(!val) return;
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = 'msg-container';
        div.innerHTML = `
            <img src="${user.avatar}" style="width:40px;height:40px;border-radius:50%; border:2px solid gold;">
            <div>
                <div class="user-info-box">${user.name} 🏆</div>
                <div style="background:#fff; padding:8px 12px; border-radius:0 15px 15px 15px; margin-top:5px; border:1px solid #ddd;">${val}</div>
            </div>
        `;
        box.appendChild(div);
        inp.value = "";
        box.scrollTop = box.scrollHeight;
    }

    // تفعيل رفع الصور من الملفات
    function processFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => sendMsg(`<img src="${e.target.result}" style="max-width:200px; border-radius:10px;">`);
            reader.readAsDataURL(input.files[0]);
        }
    }

    // نظام الإدارة (حظر، طرد، كتم، حجب) - نسخة 75659.png
    function manageUser(targetName) {
        showMod("إدارة العضو: " + targetName, `
            <div class="admin-tools">
                <button class="btn-mute" onclick="adminAct('${targetName}', 'كتم')">كتم العضو 🔇</button>
                <button class="btn-kick" onclick="adminAct('${targetName}', 'طرد')">طرد العضو 🚪</button>
                <button class="btn-ban" onclick="adminAct('${targetName}', 'حظر نهائي')">حظر (IP) 🚫</button>
                <button class="btn-ban" style="background:#000;" onclick="adminAct('${targetName}', 'حجب')">حجب الرؤية 🧱</button>
            </div>
            <hr>
            <button class="btn-kick" style="background:gold; color:#000; width:100%;" onclick="giftRank('${targetName}')">إهداء رتبة (تاج/بريمو)</button>
        `);
    }

    function adminAct(u, act) { 
        alert(`تم تنفيذ [${act}] على العضو [${u}] بنجاح`); 
        closeMod(); 
    }

    function openProfile() {
        showMod("تعديل ملفي الشخصي", `
            <label>تغيير الاسم:</label><input type="text" id="newN" value="${user.name}">
            <label>الحالة:</label><input type="text" id="newS" value="${user.status}">
            <label>صورة الخلفية من ملفاتك:</label><input type="file" onchange="updateBg(this)">
            <button class="btn-kick" style="width:100%; margin-top:10px;" onclick="saveProf()">حفظ التغييرات</button>
        `);
    }

    function updateBg(input) {
        const reader = new FileReader();
        reader.onload = (e) => { 
            user.bg = e.target.result; 
            document.getElementById('chatApp').style.backgroundImage = `url(${user.bg})`;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveProf() {
        user.name = document.getElementById('newN').value;
        user.status = document.getElementById('newS').value;
        localStorage.setItem('kingSession', JSON.stringify(user));
        closeMod();
        sendMsg("قمت بتحديث معلوماتي بنجاح ✨");
    }

    function openRooms() {
        showMod("قائمة الغرف", `<button class="btn-kick" style="width:100%; margin-bottom:10px;" onclick="sendMsg('دخلت غرفة اليمن السعيد'); closeMod();">غرفة اليمن السعيد 🇾🇪</button>
                               <button class="btn-kick" style="width:100%; background:#222;" onclick="sendMsg('دخلت غرفة الإدارة'); closeMod();">غرفة الإدارة العليا 🛡️</button>`);
    }

    function openList(type) {
        showMod("قائمة " + type, `<div style="text-align:center;">يتم عرض قائمة ${type} من قاعدة البيانات...<br><b>1. الإمبراطور (LVL 1000)</b></div>`);
    }

    function playYoutube() {
        const id = prompt("أدخل كود يوتيوب:");
        if(id) sendMsg(`<iframe width="200" height="150" src="https://www.youtube.com/embed/${id}" frameborder="0"></iframe>`);
    }

    function showMod(t, c) {
        document.getElementById('mTitle').innerText = t;
        document.getElementById('mBody').innerHTML = c;
        document.getElementById('genModal').style.display = 'flex';
    }
    function closeMod() { document.getElementById('genModal').style.display = 'none'; }
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
</script>

</body>
                                                                                                                                        </html>
