<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - العصر الذهبي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(145deg, #ffd700, #b8860b, #8a6d3b); --dark-bg: #050505; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark-bg); color: #fff; overflow: hidden; }

        /* الهيدر المطور */
        .header-bar { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(15, 15, 15, 0.95); display: flex; align-items: center; justify-content: space-around; z-index: 1000; border-bottom: 2px solid var(--gold); box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        .h-btn { text-align: center; color: #fff; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .h-btn i { display: block; font-size: 22px; margin-bottom: 3px; filter: drop-shadow(0 0 5px rgba(255,215,0,0.3)); }

        /* الكأس الذهبي الفخم */
        .fancy-cup {
            font-size: 26px;
            background: var(--king-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px #ffd700);
            animation: cup-glow 2s infinite alternate;
            margin: 0 8px;
        }
        @keyframes cup-glow { from { transform: scale(1); filter: drop-shadow(0 0 5px #ffd700); } to { transform: scale(1.1); filter: drop-shadow(0 0 15px #ffd700); } }

        /* منطقة الشات */
        #chatBox { height: calc(100vh - 140px); overflow-y: auto; padding: 90px 15px 120px; display: flex; flex-direction: column; gap: 20px; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        
        .msg-wrap { display: flex; flex-direction: column; align-self: flex-start; max-width: 85%; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .msg-header { display: flex; align-items: center; margin-bottom: 5px; }
        .pfp { width: 50px; height: 50px; border-radius: 15px; border: 2px solid var(--gold); object-fit: cover; box-shadow: 0 0 10px var(--gold); }
        .name-box { background: rgba(20, 20, 20, 0.8); padding: 4px 15px; border-radius: 8px; color: #fff; font-weight: bold; border-right: 4px solid var(--gold); margin-right: 5px; }
        
        .bubble { background: #fff; color: #000; padding: 12px 18px; border-radius: 0 15px 15px 15px; font-size: 14px; line-height: 1.5; box-shadow: 5px 5px 15px rgba(0,0,0,0.4); }
        .msg-time { font-size: 9px; color: #777; margin-top: 5px; display: block; }

        /* البروفيل المطور */
        .king-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .king-card { background: #111; width: 95%; max-width: 420px; border: 2px solid var(--gold); border-radius: 30px; overflow-y: auto; max-height: 90vh; }
        .profile-header { height: 140px; position: relative; border-bottom: 3px solid var(--gold); }
        .profile-img-container { position: absolute; bottom: -40px; right: 20px; display: flex; align-items: center; }
        .profile-pfp { width: 100px; height: 100px; border-radius: 20px; border: 4px solid var(--gold); background: #000; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 60px 20px 20px; }
        .stat-item { background: #1a1a1a; padding: 12px; border-radius: 15px; border-bottom: 2px solid var(--gold); }
        .stat-item b { color: var(--gold); display: block; font-size: 11px; margin-bottom: 4px; }
        .stat-item span { font-size: 13px; font-weight: bold; }

        .k-btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; color: #fff; }
        .btn-gold { background: var(--king-grad); color: #000; width: 100%; margin: 5px 0; }
        .btn-action { background: #222; border: 1px solid #444; flex: 1; }

        .input-section { position: fixed; bottom: 65px; width: 100%; background: #111; padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; }
        .chat-input { flex: 1; background: #1a1a1a; border: 1px solid var(--gold); color: #fff; height: 48px; border-radius: 15px; padding: 0 15px; outline: none; }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="h-btn" onclick="showChallenges()"><i class="fas fa-swords" style="color:#e74c3c"></i>التحديات</div>
    <div class="h-btn" onclick="showList('الكبار')"><i class="fas fa-crown" style="color:var(--gold)"></i>الكبار</div>
    <div class="h-btn" onclick="showList('الأثرياء')"><i class="fas fa-gem" style="color:#3498db"></i>الأثرياء</div>
    <div class="h-btn" onclick="showPrivate()"><i class="fas fa-comments" style="color:#2ecc71"></i>الخاص</div>
</div>

<div id="chatBox"></div>

<div class="input-section">
    <i class="fas fa-plus-square" style="color:var(--gold); font-size:28px; cursor:pointer;" onclick="document.getElementById('msgFile').click()"></i>
    <input type="text" id="msgInp" class="chat-input" placeholder="تكلم يا إمبراطور...">
    <button class="k-btn btn-gold" onclick="sendMsg()" style="width:70px; margin:0; height:48px;">إرسال</button>
</div>

<div class="footer-nav" style="position:fixed; bottom:0; width:100%; height:65px; background:#111; display:flex; align-items:center; justify-content:space-around; border-top:2px solid var(--gold);">
    <div class="h-btn" onclick="showChoiceModal()"><i class="fas fa-user-shield"></i>أنا</div>
    <div class="h-btn" onclick="showList('أونلاين')"><i class="fas fa-globe" style="color:#3498db"></i>المتصلين</div>
    <div class="h-btn" onclick="showRoomMenu()"><i class="fas fa-cog"></i>الإعدادات</div>
    <div class="h-btn" onclick="location.reload()"><i class="fas fa-sync" style="color:var(--gold)"></i>تحديث</div>
</div>

<div id="modal" class="king-modal"><div class="king-card" id="mContent"></div></div>

<input type="file" id="pfpFile" hidden onchange="updateFile(this, 'img')">
<input type="file" id="coverFile" hidden onchange="updateFile(this, 'cover')">
<input type="file" id="bgFile" hidden onchange="changeRoomBg(this)">
<input type="file" id="msgFile" hidden onchange="uploadMsgImg(this)">

<script>
    let me = JSON.parse(localStorage.getItem('khalil_king_v5')) || {
        name: "خليل إبراهيم",
        img: "https://i.pravatar.cc/150?u=kh",
        cover: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400",
        gold: 25000000,
        status: "إمبراطور خليل - سيّد العرش 🏆",
        age: 25,
        rank: "إمبراطور",
        joinDate: "2026/04/17",
        equality: "100%",
        likes: 999
    };

    function save() { localStorage.setItem('khalil_king_v5', JSON.stringify(me)); }

    window.onload = () => {
        let savedBg = localStorage.getItem('room_bg');
        if(savedBg) document.getElementById('chatBox').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url(${savedBg})`;
        renderMsg("النظام الملكي", "أهلاً بك يا جلالة الإمبراطور خليل في عرشك.", "https://cdn-icons-png.flaticon.com/512/1042/1042291.png", true);
    };

    function sendMsg() {
        let t = document.getElementById('msgInp').value;
        if(t.trim()) { renderMsg(me.name, t, me.img, true); document.getElementById('msgInp').value=''; }
    }

    function renderMsg(user, txt, img, isKing) {
        let div = document.createElement('div');
        div.className = 'msg-wrap';
        div.innerHTML = `
            <div class="msg-header">
                <img src="${img}" class="pfp" onclick="viewProfile('${user}', '${img}')">
                ${isKing ? '<i class="fas fa-trophy fancy-cup"></i>' : ''}
                <span class="name-box">${user}</span>
            </div>
            <div class="bubble">${txt} <span class="msg-time">${new Date().toLocaleTimeString('ar-EG')}</span></div>
        `;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    function viewProfile(name, img) {
        let isMe = (name === me.name);
        let h = `
            <div class="profile-header" style="background:url(${isMe ? me.cover : ''}) center/cover"></div>
            <div class="profile-img-container">
                <img src="${img}" class="profile-pfp">
                ${isMe ? '<i class="fas fa-trophy fancy-cup" style="font-size:40px;"></i>' : ''}
            </div>
            <div class="stats-grid">
                <div class="stat-item"><b>الاسم</b><span>${name}</span></div>
                <div class="stat-item"><b>الرتبة</b><span>${isMe ? me.rank : 'عضو'}</span></div>
                <div class="stat-item"><b>الذهب</b><span>${isMe ? me.gold.toLocaleString() : '5,000'}</span></div>
                <div class="stat-item"><b>تاريخ الانضمام</b><span>${isMe ? me.joinDate : '2026/04/18'}</span></div>
                <div class="stat-item"><b>المساواة</b><span>${isMe ? me.equality : '10%'}</span></div>
                <div class="stat-item"><b>الإعجابات</b><span>❤️ ${isMe ? me.likes : 0}</span></div>
                <div class="stat-item"><b>الوقت الآن</b><span>${new Date().toLocaleTimeString('ar-EG')}</span></div>
                <div class="stat-item"><b>الحالة</b><span>متصل الآن 🟢</span></div>
            </div>
            <div style="padding:15px; display:flex; flex-wrap:wrap; gap:5px;">
                <button class="k-btn btn-action" onclick="alert('تم إعطاء لايك')">❤️ لايك</button>
                <button class="k-btn btn-action" onclick="alert('تم إرسال طلب صداقة')">👤 إضافة صديق</button>
                <button class="k-btn btn-action" onclick="alert('فتح قائمة الهدايا')">🎁 إهداء</button>
                ${isMe ? `<button class="k-btn btn-gold" onclick="editProfileMenu()">⚙️ تعديل بياناتي الملكية</button>` : ''}
                <button class="k-btn btn-red" style="width:100%; background:#c0392b" onclick="closeM()">إغلاق البروفايل</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function editProfileMenu() {
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold)">تعديل البيانات الملكية</h3>
                <button class="k-btn btn-action" style="width:100%; margin:5px 0" onclick="document.getElementById('pfpFile').click()">🖼️ تغيير الصورة الشخصية</button>
                <button class="k-btn btn-action" style="width:100%; margin:5px 0" onclick="document.getElementById('coverFile').click()">🌄 تغيير صورة الغلاف</button>
                <input type="text" id="newName" class="chat-input" style="width:100%; margin-top:10px;" value="${me.name}" placeholder="الاسم الجديد">
                <button class="k-btn btn-gold" onclick="saveNewName()">حفظ التعديلات</button>
                <button class="k-btn btn-red" style="width:100%; background:#444" onclick="closeM()">إلغاء</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
    }

    function saveNewName() {
        me.name = document.getElementById('newName').value;
        save();
        alert("تم الحفظ بنجاح يا إمبراطور");
        location.reload();
    }

    function showChallenges() {
        alert("⚔️ جاري البحث عن خصم قوي لمواجهة الإمبراطور خليل...");
    }

    function showRoomMenu() {
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold)">إعدادات الغرفة</h3>
                <button class="k-btn btn-action" style="width:100%; margin:5px 0" onclick="document.getElementById('bgFile').click()">🖼️ تغيير خلفية الشات</button>
                <button class="k-btn btn-red" style="width:100%" onclick="localStorage.clear(); location.reload();">🚪 خروج نهائي وتصفير</button>
                <button class="k-btn btn-gold" onclick="closeM()">عودة</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function updateFile(input, type) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => {
                if(type === 'img') me.img = e.target.result;
                else me.cover = e.target.result;
                save(); alert("تم التحديث بنجاح!"); viewProfile(me.name, me.img);
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function changeRoomBg(input) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => {
                localStorage.setItem('room_bg', e.target.result);
                document.getElementById('chatBox').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url(${e.target.result})`;
                alert("تم تغيير المظهر بنجاح");
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function uploadMsgImg(input) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => renderMsg(me.name, `<img src="${e.target.result}" style="width:100%; border-radius:10px; border:1px solid gold;">`, me.img, true);
            r.readAsDataURL(input.files[0]);
        }
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function showPrivate() { alert("صندوق الرسائل الخاصة فارغ حالياً."); }
    function showList(title) { alert("قائمة " + title + " قيد التحميل..."); }
</script>

</body>
    </html>
