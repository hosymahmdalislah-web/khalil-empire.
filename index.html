<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - النسخة الملكية 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); --dark: #000000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark); color: #fff; overflow: hidden; }

        /* الشريط العلوي - نسخة طبق الأصل من الصورة */
        .header-bar { position: fixed; top: 0; width: 100%; height: 75px; background: #333; display: flex; border-bottom: 2px solid var(--gold); align-items: center; z-index: 1000; padding: 0 5px; justify-content: space-around; }
        .h-btn { text-align: center; color: #fff; font-size: 10px; cursor: pointer; min-width: 50px; transition: 0.3s; }
        .h-btn i { display: block; font-size: 20px; margin-bottom: 3px; color: #fff; }
        .h-btn.active i { color: #81ecec; } /* لون مميز للأثرياء كما في الصورة */
        .h-btn:hover { transform: translateY(-2px); color: var(--gold); }

        /* شريط الميكات */
        .mics-row { display: flex; justify-content: space-around; padding: 10px; background: #111; margin-top: 75px; border-bottom: 1px solid #222; }
        .mic-unit { width: 45px; height: 45px; border-radius: 50%; border: 2px dashed var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); cursor: pointer; font-weight: bold; }
        .mic-unit.on { border-style: solid; background: var(--king-grad); color: #000; box-shadow: 0 0 10px var(--gold); }

        /* منطقة المحادثة */
        .chat-scroll { height: calc(100vh - 210px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #000; }
        .msg-wrap { align-self: flex-start; max-width: 90%; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity:0; transform: translateX(10px); } to { opacity:1; transform: translateX(0); } }
        .msg-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .pfp-wrap { position: relative; width: 45px; height: 45px; }
        .pfp { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; }
        .dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; border: 2px solid #000; background: #2ecc71; }
        .name-box { background: #111; border: 1px solid var(--gold); color: #fff; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .bubble { background: #fff; color: #000; padding: 10px 15px; border-radius: 0 15px 15px 15px; font-size: 14px; box-shadow: 2px 2px 8px rgba(0,0,0,0.5); line-height: 1.4; }

        /* الفوتر الثابت */
        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); z-index: 1000; }
        .input-row { display: flex; padding: 10px; gap: 12px; align-items: center; }
        .chat-input { flex: 1; background: #111; border: 1px solid var(--gold); color: #fff; height: 40px; border-radius: 20px; padding: 0 15px; }
        .send-btn { background: var(--king-grad); border: none; padding: 8px 18px; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; }
        .bottom-nav { height: 55px; display: flex; align-items: center; justify-content: space-around; color: var(--gold); font-size: 10px; }

        /* نافذة المودال الملكية */
        .king-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
        .king-card { background: #111; width: 100%; max-width: 380px; border: 2px solid var(--gold); border-radius: 25px; padding: 20px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .k-btn { width: 100%; padding: 12px; margin: 5px 0; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; }
        .btn-gold { background: var(--king-grad); color: #000; }
        .btn-red { background: #e74c3c; color: #fff; }
        .btn-dark { background: #2c3e50; color: #fff; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; text-align: right; font-size: 12px; }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="h-btn" onclick="openProfile(me)"><i class="fas fa-user-circle"></i>اعدادات</div>
    <div class="h-btn" onclick="alert('قسم البلاغات مفعل')"><i class="fas fa-flag"></i>إبلاغ</div>
    <div class="h-btn" onclick="alert('لا توجد إشعارات جديدة')"><i class="fas fa-bell"></i>إشعار</div>
    <div class="h-btn" onclick="alert('طلبات الصداقة (0)')"><i class="fas fa-user-plus"></i>طلب</div>
    <div class="h-btn" onclick="alert('الرسائل الخاصة')"><i class="fas fa-envelope"></i>رسالة</div>
    <div class="h-btn active" onclick="alert('قائمة الأثرياء')"><i class="fas fa-crown"></i>الأثرياء</div>
    <div class="h-btn" onclick="alert('قائمة الكبار')"><i class="fas fa-gem"></i>الكبار</div>
</div>

<div class="mics-row">
    <div class="mic-unit" id="mic1" onclick="micAction(1)">1</div>
    <div class="mic-unit" id="mic2" onclick="micAction(2)">2</div>
    <div class="mic-unit" id="mic3" onclick="micAction(3)">3</div>
    <div class="mic-unit" id="mic4" onclick="micAction(4)">4</div>
</div>

<div class="chat-scroll" id="box"></div>

<div class="footer-fixed">
    <div class="input-row">
        <i class="fas fa-laugh-beam" style="color:var(--gold); font-size:24px;"></i>
        <i class="fas fa-camera" style="color:var(--gold); font-size:24px;" onclick="document.getElementById('file').click()"></i>
        <input type="text" id="inp" class="chat-input" placeholder="تحدث يا إمبراطور خليل...">
        <button class="send-btn" onclick="send()">نشر</button>
    </div>
    <div class="bottom-nav">
        <div class="b-btn" onclick="alert('المتواجدون: 1,452')"><i class="fas fa-users"></i>المتواجدون</div>
        <div class="b-btn" onclick="playYT()"><i class="fab fa-youtube" style="color:red"></i>يوتيوب</div>
        <div class="b-btn" onclick="alert('بدء التسجيل...')"><i class="fas fa-microphone"></i>تسجيل</div>
        <div class="b-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i>تحديث</div>
    </div>
</div>

<input type="file" id="file" hidden onchange="updatePhoto(this)">
<div id="modal" class="king-modal"><div class="king-card" id="mContent"></div></div>

<script>
    // بياناتك كإمبراطور (لا تتغير)
    let me = JSON.parse(localStorage.getItem('khalil_profile')) || {
        name: "خليل ابراهيم",
        role: "إمبراطور الموقع",
        gold: 1000000,
        img: "https://i.pravatar.cc/150?u=khalil",
        joinDate: "2024/01/01",
        bio: "مؤسس الإمبراطورية"
    };

    window.onload = () => {
        save();
        renderMsg("المساعد حسين", "أهلاً بك يا سيدي خليل. تم تفعيل كافة الأزرار والصلاحيات المطلوبة بنسبة 100%.", "https://cdn-icons-png.flaticon.com/512/4712/4712035.png", false);
    };

    function save() { localStorage.setItem('khalil_profile', JSON.stringify(me)); }

    function send() {
        let t = document.getElementById('inp').value;
        if(!t) return;
        renderMsg(me.name, t, me.img, true);
        document.getElementById('inp').value = "";
    }

    function renderMsg(name, txt, img, king) {
        let div = document.createElement('div');
        div.className = 'msg-wrap';
        div.innerHTML = `
            <div class="msg-top">
                <div class="pfp-wrap" onclick="viewProfileLogic('${name}', '${img}')">
                    <img src="${img}" class="pfp">
                    <div class="dot"></div>
                </div>
                <span class="name-box">${name}</span>
                ${king ? '<i class="fas fa-chess-king" style="color:gold"></i>' : ''}
            </div>
            <div class="bubble">${txt}</div>
        `;
        document.getElementById('box').appendChild(div);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    }

    // منطق عرض البروفيل كما طلبت
    function viewProfileLogic(name, img) {
        let isMe = (name === me.name);
        let h = `
            <img src="${img}" style="width:100px; height:100px; border-radius:50%; border:3px solid gold; margin-bottom:10px;">
            <h2 style="color:gold; margin:5px;">${name}</h2>
            <div class="stat-grid">
                <div><b>الحالة:</b> متصل</div>
                <div><b>الوقت:</b> ${new Date().toLocaleTimeString()}</div>
                <div><b>تاريخ الانضمام:</b> ${isMe ? me.joinDate : '2026/04/17'}</div>
                <div><b>الذهب:</b> ${isMe ? me.gold : 500}</div>
            </div>
            <hr style="border:0.5px solid #333">
            <button class="k-btn btn-gold" onclick="alert('تم إرسال طلب الصداقة')">➕ إضافة صديق</button>
            <button class="k-btn btn-gold" onclick="alert('تم إهداء وردة 🌹')">🌹 إهداء وردة</button>
            
            ${isMe ? `
                <button class="k-btn btn-dark" onclick="editMyInfo()">✏️ تعديل بياناتي</button>
                <button class="k-btn btn-gold" onclick="showAdminTools()">💰 إدارة الأرباح والذهب</button>
            ` : `
                <h4 style="color:gold">أدوات الإدارة (خاص بخليل)</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button class="k-btn btn-red" onclick="alert('تم الطرد')">طرد</button>
                    <button class="k-btn btn-red" onclick="alert('تم الكتم')">كتم</button>
                    <button class="k-btn btn-red" onclick="alert('تم الحظر نهائياً')">حظر</button>
                    <button class="k-btn btn-gold" onclick="alert('تم فك الحظر')">فك حظر</button>
                </div>
                <h4 style="color:gold; margin-top:10px;">إهداء رتب ملكية</h4>
                <select id="ranks" class="k-btn btn-dark">
                    <option>كأس أسود 🏆</option>
                    <option>برنس الموقع 👑</option>
                    <option>تاج انروا 💎</option>
                    <option>أدمن 🛡️</option>
                    <option>بريمو ✨</option>
                </select>
                <button class="k-btn btn-gold" onclick="alert('تم منح الرتبة بنجاح!')">منح الرتبة المختارة</button>
            `}
            <button class="k-btn btn-red" style="margin-top:15px" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function editMyInfo() {
        let n = prompt("ادخل الاسم الجديد:", me.name);
        if(n) { me.name = n; save(); location.reload(); }
    }

    function showAdminTools() {
        let h = `
            <h3 style="color:gold">خزنة الأرباح</h3>
            <div style="font-size:35px; color:#2ecc71;">$${(me.gold / 100).toFixed(2)}</div>
            <button class="k-btn btn-gold" onclick="alert('سيتم تحويل الأرباح لحسابك')">💸 سحب الأرباح</button>
            <button class="k-btn btn-dark" onclick="let g=prompt('كم ذهب تريد توزيعه؟'); alert('تم توزيع ' + g + ' ذهبة')">🎁 توزيع ذهب للكل</button>
            <button class="k-btn btn-red" onclick="closeM()">رجوع</button>
        `;
        document.getElementById('mContent').innerHTML = h;
    }

    function micAction(id) {
        document.getElementById('mic'+id).classList.toggle('on');
        alert("تحكم الميكروفون رقم " + id);
    }

    function updatePhoto(input) {
        if (input.files[0]) {
            let r = new FileReader();
            r.onload = (e) => { me.img = e.target.result; save(); alert("تم تغيير الصورة!"); location.reload(); };
            r.readAsDataURL(input.files[0]);
        }
    }

    function playYT() { 
        let s = prompt("ماذا تريد أن نشاهد؟"); 
        if(s) renderMsg(me.name, `🎬 سينما الإمبراطورية: ${s}<br><iframe width="100%" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>`, me.img, true); 
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function openProfile() { viewProfileLogic(me.name, me.img); }
</script>
</body>
            </html>
