<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات الملكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(45deg, #ffd700, #b8860b); --dark: #1a1a1a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: #fff; overflow: hidden; }

        /* شاشة الدخول */
        #loginOverlay { position: fixed; inset: 0; background: url('https://wallpaperaccess.com/full/1150493.jpg') center/cover; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(0,0,0,0.85); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); backdrop-filter: blur(10px); text-align: center; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #333; padding: 5px; border-radius: 10px; }
        .tabs button { flex: 1; padding: 10px; border: none; background: none; color: #aaa; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tabs button.active { background: var(--king-grad); color: #000; }
        .login-form { display: none; } .login-form.active { display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--gold); background: #222; color: #fff; text-align: center; }
        .btn-gold { width: 100%; padding: 12px; background: var(--king-grad); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* الهيكل الرئيسي */
        #chatApp { display: none; height: 100vh; flex-direction: column; background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); }
        
        /* الشريط العلوي */
        .top-nav { height: 70px; background: #000; display: flex; overflow-x: auto; border-bottom: 2px solid var(--gold); align-items: center; padding: 0 10px; }
        .nav-item { min-width: 70px; text-align: center; color: var(--gold); font-size: 11px; cursor: pointer; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }

        /* منطقة المحادثة */
        .chat-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-container { align-self: flex-start; max-width: 90%; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .user-avatar-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); cursor: pointer; object-fit: cover; }
        .trophy-icon { color: var(--gold); font-size: 18px; }
        .user-name-tag { background: #222; border: 1px solid var(--gold); padding: 2px 10px; border-radius: 20px; font-size: 13px; color: var(--gold); font-weight: bold; }
        .msg-text-box { background: #fff; color: #000; padding: 10px 15px; border-radius: 0 15px 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* الشريط السفلي */
        .bottom-nav { height: 65px; background: #111; border-top: 2px solid var(--gold); display: flex; align-items: center; padding: 0 10px; gap: 10px; }
        .msg-inp { flex: 1; background: #222; border: 1px solid var(--gold); color: #fff; height: 40px; border-radius: 20px; padding: 0 15px; }
        .bottom-icons { display: flex; gap: 15px; color: var(--gold); font-size: 20px; }
        .bottom-icons i { cursor: pointer; }

        /* القوائم الجانبية والمودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; align-items: center; justify-content: center; }
        .modal-content { background: #222; width: 90%; max-width: 400px; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 10px; color: red; font-size: 20px; cursor: pointer; }

        /* بروفايل المستخدم */
        .profile-card { text-align: center; }
        .profile-bg { height: 100px; width: 100%; border-radius: 10px; background: var(--king-grad); margin-bottom: -50px; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #222; position: relative; z-index: 1; object-fit: cover; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .stat-box { background: #333; padding: 10px; border-radius: 10px; flex: 1; margin: 0 5px; }

        /* اليوتيوب */
        #ytResults { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        .yt-item { background: #333; padding: 10px; border-radius: 5px; cursor: pointer; border-left: 3px solid red; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color: var(--gold); margin-bottom: 15px;"><i class="fas fa-crown"></i> إمبراطورية الشات</h2>
        <div class="tabs">
            <button class="t-btn active" onclick="showForm('tab-vis', this)">زائر</button>
            <button class="t-btn" onclick="showForm('tab-mem', this)">عضوية</button>
            <button class="t-btn" onclick="showForm('tab-new', this)">جديد</button>
        </div>

        <div id="tab-vis" class="login-form active">
            <input type="text" id="vis_name" placeholder="اسم الزائر المستعار">
            <button class="btn-gold" onclick="handleLogin('visitor')">دخول سريع</button>
        </div>

        <div id="tab-mem" class="login-form">
            <input type="email" id="mem_email" placeholder="البريد الإلكتروني">
            <input type="password" id="mem_pass" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="handleLogin('member')">تسجيل دخول</button>
        </div>

        <div id="tab-new" class="login-form">
            <input type="text" id="reg_name" placeholder="الاسم الملكي">
            <input type="email" id="reg_email" placeholder="البريد الإلكتروني">
            <input type="password" id="reg_pass" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="handleLogin('new')">إنشاء العضوية</button>
        </div>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-item" onclick="openProfile(currentUser)"><i class="fas fa-user-cog"></i>إعداداتي</div>
        <div class="nav-item" onclick="alert('قائمة الكبار قريباً')"><i class="fas fa-chess-king"></i>الكبار</div>
        <div class="nav-item" onclick="alert('قائمة الأثرياء قريباً')"><i class="fas fa-gem"></i>الأثرياء</div>
        <div class="nav-item" onclick="alert('أدوات الغرفة للمشرفين')"><i class="fas fa-shield-alt"></i>الأدوات</div>
        <div class="nav-item" onclick="alert('الرسائل الخاصة فارغة')"><i class="fas fa-envelope"></i>الخاص</div>
        <div class="nav-item" style="color:red" onclick="logout()"><i class="fas fa-power-off"></i>خروج</div>
    </div>

    <div class="chat-view" id="chatBox"></div>

    <div class="bottom-nav">
        <div class="bottom-icons">
            <i class="fas fa-users" onclick="alert('المتواجدون: ' + currentUser.name + ', نظام ذكي')"></i>
            <i class="fab fa-youtube" style="color: red;" onclick="openYoutube()"></i>
            <i class="fas fa-camera" onclick="document.getElementById('imgUp').click()"></i>
        </div>
        <input type="text" id="msgInput" class="msg-inp" placeholder="اكتب رسالتك الملكية...">
        <div class="bottom-icons">
            <i class="fas fa-sync-alt" onclick="location.reload()"></i>
            <i class="fas fa-paper-plane" onclick="sendMsg()"></i>
        </div>
        <input type="file" id="imgUp" hidden onchange="uploadImg(this)">
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let currentUser = JSON.parse(localStorage.getItem('impUser')) || null;
    let chatLogs = JSON.parse(localStorage.getItem('impLogs')) || [];

    window.onload = () => {
        if(currentUser) {
            startApp();
        }
    };

    function showForm(id, btn) {
        document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function handleLogin(type) {
        let name = "مجهول";
        if(type === 'visitor') name = document.getElementById('vis_name').value;
        if(type === 'member') name = document.getElementById('mem_email').value.split('@')[0];
        if(type === 'new') name = document.getElementById('reg_name').value;

        if(!name) return alert("يرجى إدخال البيانات");

        currentUser = {
            name: name,
            avatar: "https://i.pravatar.cc/150?u=" + name,
            bg: "linear-gradient(45deg, #222, #444)",
            status: "أنا هنا في الإمبراطورية 🛡️",
            likes: 0,
            gifts: 0,
            joined: new Date().toLocaleDateString('ar-EG'),
            music: ""
        };

        localStorage.setItem('impUser', JSON.stringify(currentUser));
        startApp();
    }

    function startApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        renderChat();
    }

    function logout() {
        localStorage.removeItem('impUser');
        location.reload();
    }

    function sendMsg(text = null) {
        let val = text || document.getElementById('msgInput').value;
        if(!val) return;

        let msg = {
            user: currentUser.name,
            avatar: currentUser.avatar,
            text: val,
            time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})
        };

        chatLogs.push(msg);
        localStorage.setItem('impLogs', JSON.stringify(chatLogs));
        appendMsg(msg);
        document.getElementById('msgInput').value = "";
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    function appendMsg(msg) {
        const div = document.createElement('div');
        div.className = 'msg-container';
        div.innerHTML = `
            <div class="msg-header">
                <img src="${msg.avatar}" class="user-avatar-btn" onclick="openProfileByName('${msg.user}')">
                <i class="fas fa-trophy trophy-icon"></i>
                <div class="user-name-tag">${msg.user}</div>
            </div>
            <div class="msg-text-box">${msg.text}</div>
            <small style="color:#666; font-size:9px;">${msg.time}</small>
        `;
        document.getElementById('chatBox').appendChild(div);
    }

    function renderChat() {
        document.getElementById('chatBox').innerHTML = "";
        chatLogs.forEach(appendMsg);
    }

    function openProfile(user) {
        const isMe = user.name === currentUser.name;
        let html = `
            <div class="profile-card">
                <div class="profile-bg" style="background:${user.bg}"></div>
                <img src="${user.avatar}" class="profile-img">
                <h2 style="color:var(--gold); margin-top:10px;">${user.name}</h2>
                <p>"${user.status}"</p>
                <div class="stats">
                    <div class="stat-box"><b>❤️</b><br>${user.likes} لايك</div>
                    <div class="stat-box"><b>🎁</b><br>${user.gifts} هدايا</div>
                    <div class="stat-box"><b>📅</b><br>${user.joined}</div>
                </div>
                ${isMe ? `
                    <input type="text" id="statusUp" placeholder="تعديل الحالة" style="width:70%">
                    <button class="btn-gold" onclick="updateProfile()">حفظ التعديلات</button>
                ` : `
                    <div style="display:flex; gap:10px;">
                        <button class="btn-gold" style="flex:1" onclick="alert('تم إرسال طلب الصداقة')">إضافة صديق</button>
                        <button class="btn-gold" style="flex:1; background:red; color:#fff" onclick="alert('تم إرسال هدية!')">إرسال هدية</button>
                    </div>
                `}
            </div>
        `;
        showModal(html);
    }

    function openProfileByName(name) {
        // في النسخة الحقيقية ستبحث في قاعدة البيانات، هنا نستخدم بيانات المستخدم الحالي للمثال
        openProfile(currentUser.name === name ? currentUser : {
            name: name,
            avatar: "https://i.pravatar.cc/150?u=" + name,
            bg: "purple",
            status: "عضو جديد في المملكة",
            likes: 5,
            gifts: 2,
            joined: "2024/05/10"
        });
    }

    function updateProfile() {
        let newStatus = document.getElementById('statusUp').value;
        if(newStatus) currentUser.status = newStatus;
        localStorage.setItem('impUser', JSON.stringify(currentUser));
        alert("تم تحديث الملف الشخصي!");
        closeModal();
    }

    function openYoutube() {
        let html = `
            <h3 style="color:red"><i class="fab fa-youtube"></i> بحث يوتيوب</h3>
            <input type="text" id="ytSearch" placeholder="اسم الأغنية أو الفيديو..." oninput="searchYT()">
            <div id="ytResults">
                <div class="yt-item" onclick="sendYT('يا ليلي ويا ليلة')">يا ليلي ويا ليلة - أغنية مشهورة</div>
                <div class="yt-item" onclick="sendYT('مهرجان ملك الشات')">مهرجان ملك الشات - حصري</div>
            </div>
        `;
        showModal(html);
    }

    function sendYT(name) {
        sendMsg(`<div style="color:red; font-weight:bold;"><i class="fab fa-youtube"></i> جاري تشغيل: ${name}</div>`);
        closeModal();
    }

    function uploadImg(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = (e) => {
                sendMsg(`<img src="${e.target.result}" style="max-width:100%; border:2px solid gold; border-radius:10px;">`);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function showModal(content) {
        document.getElementById('modalBody').innerHTML = content;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
            </html>
