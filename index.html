<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - الإصدار السيادي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); --dark: #000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: #fff; overflow: hidden; }

        /* شاشة الدخول الثلاثية */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #222, #000); z-index: 100000; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .login-card { background: rgba(255, 255, 255, 0.05); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); backdrop-filter: blur(15px); text-align: center; box-shadow: 0 0 40px var(--gold); }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #111; padding: 5px; border-radius: 10px; }
        .tabs button { flex: 1; padding: 10px; border: none; background: none; color: #fff; cursor: pointer; font-size: 12px; }
        .tabs button.active { background: var(--king-grad); color: #000; border-radius: 8px; font-weight: bold; }
        .login-form { display: none; } .login-form.active { display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; text-align: center; }
        .btn-king { width: 100%; padding: 14px; background: var(--king-grad); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* الواجهة الرئيسية */
        #chatApp { display: none; height: 100vh; flex-direction: column; position: relative; }
        
        /* الشريط العلوي المصغر */
        .top-nav { position: fixed; top: 0; width: 100%; height: 70px; background: #000; display: flex; border-bottom: 2px solid var(--gold); align-items: center; z-index: 1000; padding: 0 5px; }
        .nav-item { flex: 1; text-align: center; color: var(--gold); font-size: 9px; cursor: pointer; }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 2px; }

        .chat-view { flex: 1; overflow-y: auto; padding: 80px 10px 140px 10px; display: flex; flex-direction: column; gap: 15px; }

        /* الرسائل والكأس */
        .msg-container { align-self: flex-start; max-width: 95%; animation: fadeIn 0.3s ease; }
        .msg-header { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .avatar-wrap { position: relative; }
        .user-img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; }
        .trophy-badge { position: absolute; -10px; right: -5px; color: var(--gold); font-size: 16px; filter: drop-shadow(0 0 2px #000); }
        .user-info { display: flex; flex-direction: column; }
        .user-name-box { padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; border: 1px solid var(--gold); }
        .msg-text { background: #fff; color: #000; padding: 10px 15px; border-radius: 0 15px 15px 15px; font-size: 14px; box-shadow: 4px 4px 10px rgba(0,0,0,0.4); margin-right: 45px; cursor: pointer; }

        /* الفوتر */
        .footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); z-index: 1000; }
        .input-area { display: flex; padding: 10px; gap: 8px; align-items: center; }
        .msg-inp { flex: 1; background: #111; border: 1px solid var(--gold); color: #fff; height: 42px; border-radius: 20px; padding: 0 15px; }
        .bottom-nav { height: 55px; display: flex; align-items: center; background: #000; border-top: 1px solid #222; }
        .b-nav-item { flex: 1; text-align: center; color: var(--gold); font-size: 10px; cursor: pointer; }

        /* المودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100000; align-items: center; justify-content: center; }
        .modal-content { background: #111; width: 90%; max-width: 380px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        
        /* بروفايل مطور */
        .p-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 10px; }
        .p-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .p-stat-box { background: #222; padding: 8px; border-radius: 10px; font-size: 11px; border: 1px solid #333; }
        .p-stat-box b { color: var(--gold); font-size: 14px; display: block; }
        .adm-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .adm-btn { padding: 10px; border-radius: 5px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 40px; color: var(--gold); margin-bottom: 10px;"></i>
        <div class="tabs">
            <button id="tab1" class="active" onclick="showTab('v')">زائر</button>
            <button id="tab2" onclick="showTab('m')">عضوية</button>
            <button id="tab3" onclick="showTab('n')">جديد</button>
        </div>
        <div id="f-v" class="login-form active"><input type="text" id="vName" placeholder="اسم الزائر المستعار"><button class="btn-king" onclick="auth('v')">دخول سريع</button></div>
        <div id="f-m" class="login-form"><input type="text" id="mName" placeholder="الاسم أو البريد"><input type="password" placeholder="كلمة المرور"><button class="btn-king" onclick="auth('m')">تسجيل دخول</button></div>
        <div id="f-n" class="login-form"><input type="text" id="nName" placeholder="الاسم الملكي"><input type="email" placeholder="البريد الإلكتروني"><input type="password" placeholder="كلمة المرور"><button class="btn-king" onclick="auth('n')">إنشاء حساب جديد</button></div>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-item" onclick="viewProfile(me)"><i class="fas fa-id-card"></i>إعداداتي</div>
        <div class="nav-item" onclick="alert('قائمة الكبار قريباً')"><i class="fas fa-chess-king"></i>الكبار</div>
        <div class="nav-item" onclick="alert('قائمة الأثرياء قريباً')"><i class="fas fa-gem"></i>الأثرياء</div>
        <div class="nav-item" onclick="alert('أدوات الإدارة')"><i class="fas fa-shield-alt"></i>الأدوات</div>
        <div class="nav-item" onclick="alert('الرسائل الخاصة')"><i class="fas fa-envelope"></i>الخاص</div>
        <div class="nav-item" style="color:red" onclick="logout()"><i class="fas fa-power-off"></i>خروج</div>
    </div>

    <div class="chat-view" id="chatBox"></div>

    <div class="footer">
        <div class="input-area">
            <i class="fas fa-camera" style="color:var(--gold); font-size: 24px;" onclick="document.getElementById('fileUp').click()"></i>
            <input type="text" id="mainInput" class="msg-inp" placeholder="اكتب رسالتك..">
            <div class="btn-king" style="width:auto; margin:0; padding:10px 20px;" onclick="handleSend()">نشر</div>
        </div>
        <div class="bottom-nav">
            <div class="b-nav-item"><i class="fas fa-users"></i>المتواجدون</div>
            <div class="b-nav-item" onclick="askYt()"><i class="fab fa-youtube"></i>يوتيوب</div>
            <div class="b-nav-item" onclick="alert('تسجيل صوتي...')"><i class="fas fa-microphone"></i>تسجيل</div>
            <div class="b-nav-item" onclick="location.reload()"><i class="fas fa-sync"></i>تحديث</div>
        </div>
    </div>
    <input type="file" id="fileUp" hidden onchange="upload(this)">
    <input type="file" id="iconUp" hidden onchange="updateIcon(this)">
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="position:absolute; top:10px; right:15px; color:red; font-size:25px; cursor:pointer;">×</span>
        <div id="mBody"></div>
    </div>
</div>

<script>
    let me = JSON.parse(localStorage.getItem('impUser')) || null;
    let botImg = "https://cdn-icons-png.flaticon.com/512/4712/4712035.png";

    function showTab(t) {
        document.querySelectorAll('.login-form').forEach(f=>f.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
        if(t=='v'){document.getElementById('f-v').classList.add('active'); document.getElementById('tab1').classList.add('active');}
        if(t=='m'){document.getElementById('f-m').classList.add('active'); document.getElementById('tab2').classList.add('active');}
        if(t=='n'){document.getElementById('f-n').classList.add('active'); document.getElementById('tab3').classList.add('active');}
    }

    function auth(type) {
        let name = document.getElementById(type+'Name').value || "إمبراطور";
        me = {
            name: name,
            role: name=="المدير"?"ملك الموقع":"عضو جديد",
            roleCol: name=="المدير"?"gold":"#fff",
            nameBg: name=="المدير"?"#222":"transparent",
            fontCol: name=="المدير"?"#000":"#000",
            icon: "https://i.pravatar.cc/150?u="+name,
            gold: 1000000, gems: 50000, roses: 99,
            lvl: 100, joined: "2026/04/16", room: "العامة"
        };
        localStorage.setItem('impUser', JSON.stringify(me));
        startApp();
    }

    function startApp() {
        document.getElementById('loginOverlay').style.display='none';
        document.getElementById('chatApp').style.display='flex';
        sendMsg("حسين", "أهلاً بك يا سيدي " + me.name + "! أنا حسين، خادمك المطيع جاهز لأي سؤال.", botImg, "بدون رتبة", "cyan");
    }

    function handleSend() {
        let txt = document.getElementById('mainInput').value;
        if(!txt) return;
        sendMsg(me.name, txt, me.icon, me.role, me.roleCol, me.nameBg, me.fontCol);
        document.getElementById('mainInput').value = "";
        if(txt.includes("حسين")) processBot(txt);
    }

    function sendMsg(user, text, img, role, rCol, rBg, fCol) {
        let div = document.createElement('div');
        div.className = 'msg-container';
        div.innerHTML = `
            <div class="msg-header">
                <div class="avatar-wrap">
                    <img src="${img}" class="user-img" onclick="viewProfile({name:'${user}', role:'${role}', icon:'${img}'})">
                    <i class="fas fa-trophy trophy-badge"></i>
                </div>
                <div class="user-info">
                    <span class="user-name-box" style="background:${rBg}; color:${rCol}">${user} [${role}]</span>
                </div>
            </div>
            <div class="msg-text" style="color:${fCol}" ondblclick="alert('تم الاقتباس')">${text}</div>
            <small style="font-size:8px; color:#555; margin-right:50px;">${new Date().toLocaleTimeString()}</small>
        `;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    function processBot(t) {
        let ans = "أنا حسين، مستشارك الذكي. اسألني عن أي دولة أو اطلب قصة!";
        if(t.includes("مين انا")) ans = "أنت سيدي ومؤسس الإمبراطورية " + me.name + "!";
        if(t.includes("قصة")) ans = "يحكى أن هناك ملكاً ذكياً بنى شاتاً عظيماً بلمحة بصر...";
        setTimeout(() => sendMsg("حسين", ans, botImg, "بدون رتبة", "cyan", "#000", "#fff"), 800);
    }

    function viewProfile(u) {
        let isMe = u.name === me.name;
        let d = isMe ? me : u;
        let html = `
            <div style="text-align:center">
                <img src="${d.icon}" class="p-img">
                <h3 style="color:var(--gold)">${d.name}</h3>
                <p>${d.role}</p>
            </div>
            <div class="p-stats">
                <div class="p-stat-box"><b>🏆 المستوى</b> ${isMe?d.lvl:1}</div>
                <div class="p-stat-box"><b>💰 ذهب</b> ${isMe?d.gold:0}</div>
                <div class="p-stat-box"><b>💎 مجوهرات</b> ${isMe?d.gems:0}</div>
                <div class="p-stat-box"><b>🌹 وردة</b> ${isMe?d.roses:0}</div>
            </div>
            <p style="font-size:11px">📍 الغرفة: ${isMe?d.room:'العامة'} | 🕒 الوقت: ${new Date().toLocaleTimeString()}</p>
            <div class="adm-btns">
                ${isMe ? `
                    <button class="adm-btn" style="background:blue" onclick="document.getElementById('iconUp').click()">تغيير الصورة</button>
                    <button class="adm-btn" style="background:green" onclick="alert('تغيير الألوان قريباً')">خلفية الاسم</button>
                ` : `
                    <button class="adm-btn" style="background:red" onclick="alert('تم الطرد')">طرد</button>
                    <button class="adm-btn" style="background:orange" onclick="alert('تم الكتم')">كتم</button>
                    <button class="adm-btn" style="background:blue" onclick="alert('منح رتبة')">منح رتبة</button>
                    <button class="adm-btn" style="background:purple" onclick="alert('تم منح نقاط')">منح نقاط</button>
                `}
                <button class="adm-btn" style="background:#444; grid-column:span 2">إضافة صديق 🌹</button>
            </div>
        `;
        document.getElementById('mBody').innerHTML = html;
        document.getElementById('modal').style.display='flex';
    }

    function upload(i) {
        if(i.files[0]) {
            let r = new FileReader();
            r.onload = e => sendMsg(me.name, `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`, me.icon, me.role, me.roleCol, me.nameBg, me.fontCol);
            r.readAsDataURL(i.files[0]);
        }
    }
    function updateIcon(i) {
        if(i.files[0]) {
            let r = new FileReader();
            r.onload = e => { me.icon = e.target.result; localStorage.setItem('impUser', JSON.stringify(me)); alert('تم التحديث!'); };
            r.readAsDataURL(i.files[0]);
        }
    }
    function askYt() {
        let q = prompt("اسم الفيديو؟");
        if(q) sendMsg(me.name, `🎬 يوتيوب: ${q}<br><iframe width="100%" height="150" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>`, me.icon, me.role, me.roleCol, me.nameBg, me.fontCol);
    }
    function logout() { localStorage.removeItem('impUser'); location.reload(); }
    function closeModal() { document.getElementById('modal').style.display='none'; }
</script>
</body>
    </html>
