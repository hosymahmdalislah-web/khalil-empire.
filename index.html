<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - النظام الملكي المتكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); --dark-bg: #000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark-bg); color: #fff; overflow: hidden; transition: 0.5s; }

        /* الهيدر والفوتر */
        .header-bar, .footer-nav { position: fixed; width: 100%; background: rgba(26, 26, 26, 0.98); display: flex; align-items: center; justify-content: space-around; z-index: 1000; border-color: var(--gold); border-style: solid; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .header-bar { top: 0; height: 70px; border-bottom-width: 2px; padding-right: 60px; }
        .footer-nav { bottom: 0; height: 65px; border-top-width: 2px; }
        .h-btn, .f-btn { text-align: center; color: #fff; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .h-btn:hover, .f-btn:hover { color: var(--gold); transform: scale(1.1); }
        .h-btn i, .f-btn i { display: block; font-size: 20px; margin-bottom: 2px; }

        .room-settings-btn { position: fixed; top: 12px; right: 10px; width: 45px; height: 45px; background: var(--king-grad); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 1100; box-shadow: 0 0 10px var(--gold); border: none; }

        /* منطقة الشات */
        #chatBox { height: calc(100vh - 135px); overflow-y: auto; padding: 85px 15px 120px; display: flex; flex-direction: column; gap: 20px; background-size: cover; background-position: center; background-attachment: fixed; }
        
        .msg-wrap { display: flex; flex-direction: column; gap: 5px; align-self: flex-start; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-header { display: flex; align-items: center; gap: 8px; }
        .pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; box-shadow: 0 0 5px var(--gold); }
        .name-box { background: rgba(255, 215, 0, 0.15); border: 1px solid var(--gold); padding: 2px 12px; border-radius: 20px; color: var(--gold); font-weight: bold; font-size: 11px; }
        .bubble { background: rgba(255, 255, 255, 0.95); color: #000; padding: 12px 18px; border-radius: 0 20px 20px 20px; font-size: 14px; box-shadow: 5px 5px 15px rgba(0,0,0,0.3); line-height: 1.4; }
        .msg-time { font-size: 9px; color: #666; margin-top: 5px; display: block; }

        /* المودالات الملكية */
        .king-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .king-card { background: #1a1a1a; width: 92%; max-width: 400px; border: 2px solid var(--gold); border-radius: 30px; overflow-y: auto; max-height: 85vh; position: relative; box-shadow: 0 0 30px var(--gold); }
        .cover-img { width: 100%; height: 120px; object-fit: cover; border-bottom: 2px solid var(--gold); }
        .profile-pfp { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--gold); margin-top: -45px; background: #000; object-fit: cover; position: relative; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .info-item { background: #262626; padding: 10px; border-radius: 12px; border-left: 3px solid var(--gold); font-size: 12px; }
        .info-item b { color: var(--gold); display: block; margin-bottom: 3px; }

        .k-btn { padding: 12px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 13px; margin: 5px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-gold { background: var(--king-grad); color: #000; }
        .btn-red { background: #e74c3c; color: #fff; }
        .btn-blue { background: #3498db; color: #fff; }
        .k-btn:active { transform: scale(0.95); }

        .input-section { position: fixed; bottom: 65px; width: 100%; background: #111; padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; z-index: 999; }
        .chat-input { flex: 1; background: #222; border: 1px solid var(--gold); color: #fff; height: 45px; border-radius: 25px; padding: 0 20px; outline: none; }
    </style>
</head>
<body>

<button class="room-settings-btn" onclick="showRoomMenu()"><i class="fas fa-crown"></i></button>

<div class="header-bar">
    <div class="h-btn" onclick="showWallet()"><i class="fas fa-wallet" style="color:#2ecc71"></i>الأرباح</div>
    <div class="h-btn" onclick="showList('الكبار')"><i class="fas fa-shield-halved" style="color:#3498db"></i>الكبار</div>
    <div class="h-btn" onclick="showList('الأثرياء')"><i class="fas fa-gem" style="color:var(--gold)"></i>الأثرياء</div>
    <div class="h-btn" onclick="location.reload()"><i class="fas fa-power-off"></i>ريستارت</div>
</div>

<div id="chatBox"></div>

<div class="input-section">
    <i class="fas fa-plus-circle" style="color:var(--gold); font-size:24px; cursor:pointer;" onclick="document.getElementById('msgFile').click()"></i>
    <input type="text" id="msgInp" class="chat-input" placeholder="تحدث يا إمبراطور خليل...">
    <button class="k-btn btn-gold" onclick="sendMsg()" style="width:70px; margin:0;">إرسال</button>
</div>

<div class="footer-nav">
    <div class="f-btn" onclick="showSettings()"><i class="fas fa-sliders"></i>الضبط</div>
    <div class="f-btn" onclick="openYouTube()"><i class="fab fa-youtube" style="color:#ff0000"></i>يوتيوب</div>
    <div class="f-btn" onclick="showChoiceModal()"><i class="fas fa-user-circle"></i>أنا</div>
    <div class="f-btn" onclick="showList('المتصلين')"><i class="fas fa-wifi"></i>أونلاين</div>
    <div class="f-btn" onclick="alert('خدمة الزخرفة الملكية مفعلة')"><i class="fas fa-wand-magic-sparkles"></i>الزخرفة</div>
</div>

<div id="modal" class="king-modal"><div class="king-card" id="mContent"></div></div>

<input type="file" id="pfpFile" hidden onchange="updateFile(this, 'img')">
<input type="file" id="coverFile" hidden onchange="updateFile(this, 'cover')">
<input type="file" id="bgFile" hidden onchange="changeRoomBg(this)">
<input type="file" id="msgFile" hidden onchange="uploadMsgImg(this)">

<script>
    // تخزين البيانات
    let me = JSON.parse(localStorage.getItem('khalil_king_v4')) || {
        name: "خليل إبراهيم",
        img: "https://i.pravatar.cc/150?u=kh",
        cover: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400",
        gold: 15000000,
        status: "إمبراطور خليل - مؤسس المنصة 👑",
        age: 25,
        rank: "إمبراطور",
        joinDate: "2026/04/17",
        equality: "100%"
    };

    let currentBg = localStorage.getItem('room_bg') || "";

    function save() { 
        localStorage.setItem('khalil_king_v4', JSON.stringify(me)); 
        localStorage.setItem('room_bg', currentBg);
    }

    window.onload = () => {
        if(currentBg) document.getElementById('chatBox').style.backgroundImage = `url(${currentBg})`;
        renderMsg("النظام", "أهلاً بك يا جلالة الملك خليل. كل الأقسام مفعلة وتحت إشرافك.", "https://cdn-icons-png.flaticon.com/512/1042/1042291.png", true);
    };

    // --- إدارة القوائم ---
    function showList(title) {
        let listData = title === 'المتصلين' ? `<li>🟢 ${me.name} (أنت)</li>` : `<li>لا يوجد أعضاء حالياً</li>`;
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold); border-bottom:2px solid gold; padding-bottom:10px;">قائمة ${title}</h3>
                <ul style="list-style:none; padding:10px; color:#ccc;">${listData}</ul>
                <button class="k-btn btn-gold" style="width:100%" onclick="closeM()">إغلاق</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function showWallet() {
        let h = `
            <div style="padding:20px; text-align:center;">
                <i class="fas fa-vault" style="font-size:50px; color:var(--gold);"></i>
                <h2 style="color:var(--gold)">حقيبتك الملكية</h2>
                <div style="background:#222; padding:15px; border-radius:15px; font-size:24px; margin:10px 0;">
                    ${me.gold.toLocaleString()} <small>ذهبة</small>
                </div>
                <p>الأرباح اليومية: +5,000 ذهبة</p>
                <button class="k-btn btn-gold" style="width:100%" onclick="closeM()">ممتاز</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    // --- إدارة الغرفة ---
    function showRoomMenu() {
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold)"><i class="fas fa-tools"></i> تحكم الإمبراطور</h3>
                <button class="k-btn btn-blue" style="width:100%" onclick="let n=prompt('اسم الغرفة الجديد:'); if(n) alert('تم الحفظ')">📝 تغيير اسم الغرفة</button>
                <button class="k-btn btn-gold" style="width:100%" onclick="document.getElementById('bgFile').click()">🖼️ تغيير خلفية الشات</button>
                <button class="k-btn btn-red" style="width:100%" onclick="if(confirm('هل تود مسح السجل؟')) document.getElementById('chatBox').innerHTML=''">🗑️ مسح المحادثات</button>
                <button class="k-btn btn-red" style="width:100%; margin-top:15px;" onclick="if(confirm('خروج؟')) location.reload()">🚪 تسجيل خروج</button>
                <button class="k-btn btn-gold" style="width:100%" onclick="closeM()">عودة</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function changeRoomBg(input) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => {
                currentBg = e.target.result;
                document.getElementById('chatBox').style.backgroundImage = `url(${currentBg})`;
                save();
                alert("تم تحديث مظهر الغرفة");
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    // --- الشات ---
    function sendMsg() {
        let t = document.getElementById('msgInp').value;
        if(t.trim()) { renderMsg(me.name, t, me.img, true); document.getElementById('msgInp').value=''; }
    }

    function renderMsg(user, txt, img, isKing) {
        let time = new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        let div = document.createElement('div');
        div.className = 'msg-wrap';
        div.innerHTML = `
            <div class="msg-header">
                <img src="${img}" class="pfp" onclick="viewProfile('${user}', '${img}')">
                <span class="name-box">${user}</span>
                ${isKing ? '<i class="fas fa-crown trophy-icon"></i>' : ''}
            </div>
            <div class="bubble">${txt} <span class="msg-time">${time}</span></div>
        `;
        let b = document.getElementById('chatBox');
        b.appendChild(div);
        b.scrollTop = b.scrollHeight;
    }

    // --- البروفايل المتطور ---
    function showChoiceModal() { viewProfile(me.name, me.img); }

    function viewProfile(name, img) {
        let isMe = (name === me.name);
        let h = `
            <img src="${isMe ? me.cover : 'https://via.placeholder.com/400x120/111/gold'}" class="cover-img">
            <center>
                <img src="${img}" class="profile-pfp">
                <h3 style="color:var(--gold); margin:5px;">${name}</h3>
                <p style="font-size:12px; color:#aaa; padding:0 10px;">${isMe ? me.status : 'ضيف في الإمبراطورية'}</p>
            </center>
            <div class="info-grid">
                <div class="info-item"><b>الرتبة</b> ${isMe ? me.rank : 'عضو'}</div>
                <div class="info-item"><b>العمر</b> ${isMe ? me.age : 'غير معروف'}</div>
                <div class="info-item"><b>النقاط</b> ${isMe ? me.gold.toLocaleString() : '1,000'}</div>
                <div class="info-item"><b>المساواة</b> ${isMe ? me.equality : '5%'}</div>
                <div class="info-item"><b>التوقيت</b> ${new Date().toLocaleTimeString('ar-EG')}</div>
                <div class="info-item"><b>الحالة</b> متصل 🟢</div>
            </div>
            <div style="padding:10px; text-align:center;">
                ${!isMe ? `<button class="k-btn btn-blue" onclick="alert('فتح الخاص مع ${name}')"><i class="fas fa-comment-dots"></i> مراسلة خاصة</button>` : ''}
                <button class="k-btn btn-gold" onclick="alert('تم إرسال طلب الصداقة')"><i class="fas fa-user-plus"></i> إضافة صديق</button>
                <button class="k-btn btn-gold" onclick="giftRank('${name}')"><i class="fas fa-award"></i> إهداء رتبة</button>
                <button class="k-btn btn-blue" onclick="alert('تم إرسال وردة 🌹')"><i class="fas fa-leaf"></i> إهداء وردة</button>
                ${isMe ? `<button class="k-btn btn-blue" style="width:90%" onclick="editMyProfile()"><i class="fas fa-user-edit"></i> تعديل بياناتي الملكية</button>` : 
                        `<button class="k-btn btn-red" style="width:90%" onclick="adminControl('${name}')"><i class="fas fa-shield-alt"></i> لوحة تحكم الإمبراطور</button>`}
            </div>
            <button class="k-btn btn-red" style="width:90%; margin:10px 5%;" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function editMyProfile() {
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold)">تعديل البيانات</h3>
                <button class="k-btn btn-blue" style="width:100%" onclick="document.getElementById('pfpFile').click()">📷 تغيير الصورة</button>
                <button class="k-btn btn-blue" style="width:100%" onclick="document.getElementById('coverFile').click()">🖼️ تغيير الغلاف</button>
                <input type="text" id="eName" class="chat-input" style="width:100%; margin:8px 0" value="${me.name}" placeholder="الاسم">
                <input type="text" id="eStatus" class="chat-input" style="width:100%; margin:8px 0" value="${me.status}" placeholder="الحالة">
                <input type="number" id="eAge" class="chat-input" style="width:100%; margin:8px 0" value="${me.age}" placeholder="العمر">
                <button class="k-btn btn-gold" style="width:100%" onclick="saveMyEdits()">تأكيد الحفظ</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
    }

    function saveMyEdits() {
        me.name = document.getElementById('eName').value;
        me.status = document.getElementById('eStatus').value;
        me.age = document.getElementById('eAge').value;
        save(); location.reload();
    }

    function giftRank(target) {
        let r = prompt("أدخل اسم الرتبة (مثلاً: مستشار الملك، أمير، الحارس):");
        if(r) alert(`بأمر من الإمبراطور خليل، تم منح ${target} رتبة ${r}`);
    }

    function adminControl(target) {
        let cmd = prompt("اختر إجراء:\n1- حظر نهائي\n2- كتم مؤقت\n3- طرد من الغرفة\n4- منح 50,000 نقطة");
        if(cmd) alert("تم تنفيذ القرار الإمبراطوري تجاه " + target);
    }

    // --- الوظائف العامة ---
    function updateFile(input, type) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => {
                if(type === 'img') me.img = e.target.result;
                else me.cover = e.target.result;
                save(); alert("تم التحديث"); editMyProfile();
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function openYouTube() {
        let l = prompt("ضع رابط الفيديو هنا:");
        if(l) renderMsg(me.name, `<iframe width="100%" height="180" src="${l.replace('watch?v=','embed/')}" frameborder="0" allowfullscreen></iframe>`, me.img, true);
    }

    function uploadMsgImg(input) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => renderMsg(me.name, `<img src="${e.target.result}" style="width:100%; border-radius:15px; border:1px solid gold;">`, me.img, true);
            r.readAsDataURL(input.files[0]);
        }
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function showSettings() { showRoomMenu(); }
</script>

</body>
    </html>
