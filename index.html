<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - الإصدار التفاعلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; overflow: hidden; position: relative; }

        /* شاشة الدخول */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #444, #000); z-index: 100000; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .login-card { background: #fff; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; border: 4px solid var(--gold); text-align: center; }
        .login-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--king-grad); color: #000; }
        .login-form { display: none; } .login-form.active { display: block; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ccc; text-align: center; }

        #chatApp { display: none; height: 100vh; flex-direction: column; background-size: cover; background-position: center; }
        
        /* الهيدر */
        .top-nav { height: 65px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid gold; z-index: 100; }
        .nav-btn { color: gold; text-align: center; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 2px; }

        /* الشات */
        .chat-view { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .msg-bubble { align-self: flex-start; max-width: 90%; display: flex; flex-direction: column; }
        
        /* الرأس المطور: أيقونة دائرية قابلة للضغط */
        .msg-header-container { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .header-circle-icon { width: 32px; height: 32px; border-radius: 50%; border: 2px solid gold; background: #fff; overflow: hidden; cursor: pointer; transition: 0.3s; box-shadow: 0 0 5px gold; }
        .header-circle-icon:active { transform: scale(1.2); }
        .header-circle-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .trophy-standalone { color: gold; font-size: 18px; }
        .name-background { background: #000; color: gold; border: 1.5px solid gold; padding: 2px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; }

        .msg-text { background: #fff; padding: 10px 15px; border-radius: 0 15px 15px 15px; border: 1px solid #ddd; font-size: 14px; color: #000; }

        /* قائمة الخيارات عند الضغط على الأيقونة */
        .icon-menu { display: none; position: absolute; background: #fff; border: 2px solid gold; border-radius: 10px; z-index: 1000; width: 120px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .icon-menu button { width: 100%; padding: 8px; border: none; background: none; font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; font-size: 12px; }
        .icon-menu button:hover { background: #f9f9f9; }

        /* بروفايل العضو */
        .profile-card { text-align: center; padding: 10px; }
        .p-avatar { width: 90px; height: 90px; border-radius: 50%; border: 4px solid gold; margin-bottom: 10px; }
        .p-stats { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .stat-box { font-size: 14px; font-weight: bold; }
        .stat-box i { color: gold; display: block; font-size: 20px; }

        /* لوحة الكتابة */
        .bottom-panel { height: 75px; background: linear-gradient(to bottom, #FF0000 33.3%, #FFFFFF 33.3%, #FFFFFF 66.6%, #000000 66.6%); display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 2px solid gold; }
        .msg-input { flex: 1; height: 45px; border-radius: 25px; border: 2px solid gold; padding: 0 15px; font-weight: bold; }
        .icon-btn { font-size: 26px; color: #000; cursor: pointer; }

        /* المودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-box { background: #fff; width: 100%; max-width: 400px; border-radius: 20px; border: 4px solid gold; overflow: hidden; }
        .m-header { background: #000; color: gold; padding: 12px; text-align: center; font-weight: bold; }
        .m-body { padding: 15px; max-height: 70vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .action-btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-chess-king" style="font-size: 50px; color: gold; margin-bottom: 10px;"></i>
        <div class="login-tabs">
            <button class="tab-btn active" onclick="switchTab('visitor', this)">زائر</button>
            <button class="tab-btn" onclick="switchTab('member', this)">عضوية</button>
            <button class="tab-btn" onclick="switchTab('new', this)">جديد</button>
        </div>
        <div id="visitor" class="login-form active"><input type="text" id="visName" placeholder="الاسم"><button class="action-btn active" style="background:gold" onclick="login('visitor')">دخول</button></div>
        <div id="member" class="login-form"><input type="email" placeholder="البريد"><input type="password" placeholder="كلمة المرور"><button class="action-btn active" style="background:gold" onclick="login('member')">دخول</button></div>
        <div id="new" class="login-form"><input type="text" id="newName" placeholder="الاسم الملكي"><input type="email" placeholder="البريد"><button class="action-btn active" style="background:gold" onclick="login('new')">تسجيل جديد</button></div>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-btn" onclick="openProfile(myData.name, true)"><i class="fas fa-user-circle"></i>أنا</div>
        <div class="nav-btn" onclick="alert('تحديات مفعلة!')"><i class="fas fa-bolt"></i>التحديات</div>
        <div class="nav-btn" onclick="location.reload()"><i class="fas fa-power-off"></i>خروج</div>
    </div>

    <div class="chat-view" id="chatBox"></div>

    <div id="iconMenu" class="icon-menu">
        <button onclick="openProfile(currentSelectedUser, false)">دخول البروفايل</button>
        <button onclick="openEditProfile()">تعديل البروفايل</button>
    </div>

    <div class="bottom-panel">
        <input type="file" id="chatImg" hidden onchange="uploadFile(this, 'chat')">
        <i class="fas fa-camera icon-btn" onclick="document.getElementById('chatImg').click()"></i>
        <input type="text" id="mainInp" class="msg-input" placeholder="اكتب هنا...">
        <i class="fas fa-paper-plane icon-btn" style="color:gold" onclick="sendMsg()"></i>
    </div>
</div>

<div id="globalModal" class="modal">
    <div class="modal-box">
        <div class="m-header" id="mTitle"></div>
        <div class="m-body" id="mBody"></div>
        <button onclick="closeMod()" style="width:100%; padding:15px; border:none; background:#eee;">إغلاق</button>
    </div>
</div>

<script>
    let myData = { name: "خليل", avatar: "https://i.pravatar.cc/150?u=k", hCircle: "https://i.pravatar.cc/150?u=icon", likes: 0, status: "ملك الأجواء 👑", friends: 0 };
    let currentSelectedUser = "";

    function switchTab(id, btn) {
        document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
    }

    function login(t) {
        if(t === 'new') myData.name = document.getElementById('newName').value || "عضو جديد";
        else if(t === 'visitor') myData.name = document.getElementById('visName').value || "زائر";
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        sendMsg("دخلت الإمبراطورية الآن! ✨");
    }

    function sendMsg(txt = null) {
        const val = txt || document.getElementById('mainInp').value;
        if(!val) return;
        const div = document.createElement('div');
        div.className = 'msg-bubble';
        div.innerHTML = `
            <div class="msg-header-container">
                <div class="header-circle-icon" onclick="showIconMenu(event, '${myData.name}')">
                    <img src="${myData.hCircle}">
                </div>
                <i class="fas fa-trophy trophy-standalone"></i>
                <div class="name-background">${myData.name}</div>
            </div>
            <div class="msg-text">${val}</div>
        `;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('mainInp').value = "";
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    function showIconMenu(e, user) {
        currentSelectedUser = user;
        const menu = document.getElementById('iconMenu');
        menu.style.display = 'block';
        menu.style.top = e.pageY + 'px';
        menu.style.left = e.pageX + 'px';
        e.stopPropagation();
    }

    document.onclick = () => document.getElementById('iconMenu').style.display = 'none';

    function openProfile(user, isMe) {
        const title = isMe ? "بروفايلي الملكي" : "بروفايل " + user;
        const likeAction = isMe ? "" : `<button class="action-btn" style="background:pink; color:red" onclick="myData.likes++; alert('شكراً على اللايك!')"><i class="fas fa-heart"></i> أعطِ لايك</button>`;
        const friendAction = isMe ? "" : `<button class="action-btn" style="background:#3498db; color:#fff" onclick="alert('تم إرسال طلب الصداقة')"><i class="fas fa-user-plus"></i> إضافة صديق</button>`;

        showMod(title, `
            <div class="profile-card">
                <img src="${myData.avatar}" class="p-avatar">
                <h3>${user}</h3>
                <p style="color:#666; margin-bottom:10px;">${myData.status}</p>
                <div class="p-stats">
                    <div class="stat-box"><i class="fas fa-heart"></i> ${myData.likes} لايك</div>
                    <div class="stat-box"><i class="fas fa-users"></i> ${myData.friends} أصدقاء</div>
                </div>
                ${likeAction}
                ${friendAction}
            </div>
        `);
    }

    function openEditProfile() {
        showMod("تعديل البيانات", `
            <label>تغيير أيقونة الاسم (بجانب الكأس):</label>
            <input type="file" onchange="updateFiles(this, 'hCircle')">
            <label>تغيير الصورة الشخصية:</label>
            <input type="file" onchange="updateFiles(this, 'av')">
            <label>تعديل الحالة:</label>
            <input type="text" id="newStatus" placeholder="ماذا يدور في ذهنك؟" class="msg-input" style="width:100%; margin-top:5px;">
            <button class="action-btn" style="background:var(--king-grad); margin-top:10px;" onclick="saveChanges()">حفظ التعديلات ✅</button>
        `);
    }

    function updateFiles(input, mode) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if(mode === 'hCircle') myData.hCircle = e.target.result;
                if(mode === 'av') myData.avatar = e.target.result;
                alert("تم تحميل الصورة بنجاح!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveChanges() {
        const s = document.getElementById('newStatus').value;
        if(s) myData.status = s;
        closeMod();
        sendMsg("قمت بتحديث بروفايلي للتو! 😎");
    }

    function showMod(t, c) { document.getElementById('mTitle').innerText = t; document.getElementById('mBody').innerHTML = c; document.getElementById('globalModal').style.display = 'flex'; }
    function closeMod() { document.getElementById('globalModal').style.display = 'none'; }
    document.getElementById('mainInp').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
</script>

</body>
</html>
