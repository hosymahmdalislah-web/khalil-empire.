<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات الإمبراطورية المتطور</title>
    <!-- ربط مكتبة الجمالية والأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-weight/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #121213; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 600px; height: 90vh; background: #1c1c1e; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 1px solid #2c2c2e; }
        
        /* شاشة الدخول */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; text-align: center; }
        #login-screen h1 { color: #ffd700; margin-bottom: 20px; }
        .input-field { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #3a3a3c; background: #2c2c2e; color: #fff; text-align: center; font-size: 16px; }
        .btn { width: 80%; padding: 12px; border: none; border-radius: 8px; background: #ff3b30; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #e0241b; }

        /* شاشة الشات الرئيسية */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        .chat-header { background: #2c2c2e; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3a3a3c; }
        .chat-header h2 { color: #ffd700; font-size: 18px; }
        .user-info-bar { font-size: 14px; color: #aaa; }
        
        /* منطقة الرسائل */
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #141416; }
        .msg-box { max-width: 80%; padding: 10px 14px; border-radius: 12px; background: #2c2c2e; animation: fadeIn 0.3s ease; position: relative; word-break: break-word; }
        .msg-box.my-msg { align-self: flex-start; background: #007aff; }
        .msg-box.others-msg { align-self: flex-end; background: #2c2c2e; }
        
        /* الرتب والأشكال داخل الشات */
        .sender-name { font-size: 12px; font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .role-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .role-admin { color: #ff3b30; }
        .role-royal { color: #ffcc00; }
        .role-vip { color: #00e5ff; }
        .role-user { color: #b3b3b3; }
        
        .msg-text { font-size: 15px; color: #fff; }
        .msg-time { font-size: 9px; color: rgba(255,255,255,0.5); text-align: left; margin-top: 4px; }

        /* صندوق الإرسال */
        .input-area { padding: 12px; background: #2c2c2e; display: flex; gap: 10px; align-items: center; }
        #message-input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #1c1c1e; color: #fff; outline: none; padding-right: 15px; }
        #send-btn { background: #007aff; border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 16px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <!-- استدعاء مكتبات Firebase الحديثة والمستقرة (v9) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // !!! ضع بيانات Firebase الخاصة بمشروعك هنا لكي يشتغل الشات 100% !!!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // تهيئة الـ Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // متغيرات المستخدم الحالي
        let currentUser = null;

        // عناصر الواجهة
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const usernameInput = document.getElementById('username-input');
        const loginBtn = document.getElementById('login-btn');
        const messagesArea = document.getElementById('messages-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const userStatusText = document.getElementById('user-status');

        // كود تسجيل الدخول وحفظ البيانات بشكل مضبوط وغير عشوائي
        loginBtn.addEventListener('click', async () => {
            const name = usernameInput.value.trim();
            if (!name) return alert('الرجاء إدخال اسمك أولاً!');

            // نستخدم الاسم كمعرّف ثابت محلياً لتسهيل التجربة بدون تعقيد الإيميلات
            const userId = "user_" + name.replace(/\s+/g, '_').toLowerCase(); 
            const userRef = doc(db, "users", userId);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                // إذا كان المستخدم موجوداً من قبل، نسحب بياناته ورتبته
                currentUser = { id: userId, ...userSnap.data() };
            } else {
                // إذا كان جديداً، ننشئه برتبة مستخدم عادية و0 نقاط
                // ملاحظة: إذا كتبت اسمك الخاص الذي تريده كمالك، يمكنك تغيير رتبته يدوياً من الفايربيس إلى Admin
                let defaultRole = "User";
                if (name.toLowerCase() === "khalil" || name === "خليل") { 
                    defaultRole = "Admin"; // جعل اسمك كمسؤول تلقائياً لتكون أنت المالك
                }

                currentUser = { id: userId, username: name, points: 0, role: defaultRole };
                await setDoc(userRef, currentUser);
            }

            // الانتقال لشاشة الشات
            loginScreen.style.display = 'none';
            chatScreen.style.style.display = 'flex';
            updateUserBar();
            listenToMessages(); // تشغيل الاستماع الفوري للرسائل للجميع
        });

        function updateUserBar() {
            userStatusText.innerHTML = `الاسم: ${currentUser.username} | الرتبة: <span class="role-${currentUser.role.toLowerCase()}">${currentUser.role}</span> | النقاط: ${currentUser.points}`;
        }

        // إرسال الرسالة وزيادة النقاط مع فحص الترقية التلقائية للرتب
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.value = ''; // مسح صندوق الكتابة فوراً لتجربة سريعة

            // 1. تحديث نقاط المستخدم في قاعدة البيانات أولاً (زيادة 10 نقاط لكل رسالة)
            const userRef = doc(db, "users", currentUser.id);
            await updateDoc(userRef, {
                points: increment(10)
            });

            // 2. تحديث الرتبة محلياً وفي قاعدة البيانات بناءً على النقاط الجديدة
            currentUser.points += 10;
            if (currentUser.role !== "Admin") { // المالك يبقى دائماً Admin ولا تتغير رتبته بنقاطه
                if (currentUser.points >= 200) {
                    currentUser.role = "Royal";
                    await updateDoc(userRef, { role: "Royal" });
                } else if (currentUser.points >= 100) {
                    currentUser.role = "VIP";
                    await updateDoc(userRef, { role: "VIP" });
                }
            }
            updateUserBar();

            // 3. رفع الرسالة إلى مجموعة الرسائل لتظهر عند الجميع فوراً
            await addDoc(collection(db, "messages"), {
                text: text,
                senderId: currentUser.id,
                senderName: currentUser.username,
                senderRole: currentUser.role,
                timestamp: Date.now()
            });
        }

        // الاستماع اللحظي (Real-time Listener) يضمن ظهور الرسالة عند الكل بنفس اللحظة بدون اختفاء
        function listenToMessages() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                messagesArea.innerHTML = ''; // تنظيف الشاشة لإعادة البناء الفوري النظيف
                snapshot.forEach((doc) => {
                    const msg = doc.data();
                    const isMe = msg.senderId === currentUser.id;
                    
                    // تحديد شكل الرتبة (تاج للمالك، نجمة للرويال والـ VIP)
                    let badge = '';
                    if (msg.senderRole === 'Admin') badge = '👑 [مالك]';
                    else if (msg.senderRole === 'Royal') badge = '👑 [Royal]';
                    else if (msg.senderRole === 'VIP') badge = '⭐ [VIP]';
                    else badge = '👤';

                    const msgHTML = `
                        <div class="msg-box ${isMe ? 'my-msg' : 'others-msg'}">
                            <div class="sender-name role-${msg.senderRole.toLowerCase()}">
                                ${badge} ${msg.senderName}
                            </div>
                            <div class="msg-text">${msg.text}</div>
                        </div>
                    `;
                    messagesArea.insertAdjacentHTML('beforeend', msgHTML);
                });
                messagesArea.scrollTop = messagesArea.scrollHeight; // النزول التلقائي لآخر رسالة
            });
        }
    </script>
</head>
<body>

    <div class="chat-container">
        <!-- شاشة الدخول المسبق -->
        <div id="login-screen">
            <h1>شات الإمبراطورية</h1>
            <p>سجل اسمك لتدخل الدردشة وتبدأ بجمع النقاط والرتب</p>
            <input type="text" id="username-input" class="input-field" placeholder="اكتب اسمك المستعار هنا..." maxlength="15">
            <button id="login-btn" class="btn">دخول الدردشة</button>
        </div>

        <!-- شاشة الشات الحية -->
        <div id="chat-screen">
            <div class="chat-header">
                <h2>غرفة الدردشة العامة</h2>
                <div id="user-status" class="user-info-bar">جاري تحميل البيانات...</div>
            </div>
            
            <div id="messages-area" class="messages-area">
                <!-- الرسائل تظهر هنا ديناميكياً من الفايربيس -->
            </div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
                <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

</body>
</html>
