<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - النظام الحاكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(145deg, #ffd700, #b8860b, #8a6d3b); --dark-bg: #050505; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark-bg); color: #fff; overflow: hidden; }

        /* الهيدر العلوي - 5 أيقونات مفعلة */
        .header-bar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(15, 15, 15, 0.98); display: flex; align-items: center; justify-content: space-around; z-index: 1000; border-bottom: 2px solid var(--gold); }
        
        /* الشات */
        #chatBox { height: calc(100vh - 135px); overflow-y: auto; padding: 80px 15px 120px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg-wrap { display: flex; flex-direction: column; align-self: flex-start; max-width: 85%; position: relative; }
        .msg-header { display: flex; align-items: center; margin-bottom: 4px; cursor: pointer; }
        .pfp-main { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .king-name-tag { background: rgba(255, 215, 0, 0.15); border: 1px solid var(--gold); color: #fff; padding: 2px 12px; border-radius: 20px; font-weight: bold; margin-right: 8px; }

        /* المودال والبروفايل */
        .king-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .king-card { background: #111; width: 92%; max-width: 400px; border: 2px solid var(--gold); border-radius: 25px; overflow: hidden; position: relative; }
        
        /* أزرار الإدارة المتقدمة */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .tool-btn { padding: 12px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }

        /* الشريط السفلي - 5 أيقونات مفعلة */
        .footer-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #111; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid var(--gold); }
        .f-btn { text-align: center; font-size: 10px; color: #fff; cursor: pointer; flex: 1; }
        .f-btn i { display: block; font-size: 22px; margin-bottom: 2px; }

        .input-section { position: fixed; bottom: 65px; width: 100%; background: #111; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #222; }
        .chat-input { flex: 1; background: #1a1a1a; border: 1px solid var(--gold); color: #fff; height: 42px; border-radius: 20px; padding: 0 15px; outline: none; }
        
        /* تسجيل الدخول */
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h2 style="color:var(--gold)">إمبراطورية خليل</h2>
    <input type="text" id="userNameInp" placeholder="أدخل اسمك الملكي..." style="padding:15px; border-radius:10px; border:none; width:80%;">
    <button onclick="startApp()" style="margin-top:20px; padding:15px 40px; background:var(--king-grad); border:none; border-radius:10px; font-weight:bold;">دخول العرش</button>
    <p id="counter" style="margin-top:20px; color: #888;">المتواجدون الآن: 1,240</p>
</div>

<div class="header-bar">
    <div class="f-btn" onclick="openNotify()"><i class="fas fa-bell"></i>إشعارات</div>
    <div class="f-btn" onclick="openReports()"><i class="fas fa-flag"></i>بلاغات</div>
    <div class="f-btn" onclick="openPrivate()"><i class="fas fa-comments"></i>الخاص</div>
    <div class="f-btn" onclick="showList('الأثرياء')"><i class="fas fa-gem"></i>الأثرياء</div>
    <div class="f-btn" onclick="showList('الكبار')"><i class="fas fa-crown"></i>الكبار</div>
</div>

<div id="chatBox"></div>

<div class="input-section">
    <i class="fas fa-image" style="color:var(--gold); font-size:24px;" onclick="document.getElementById('msgFile').click()"></i>
    <input type="text" id="msgInp" class="chat-input" placeholder="تحدث يا إمبراطور...">
    <button onclick="sendMsg()" style="background:var(--king-grad); border:none; padding:8px 15px; border-radius:15px; font-weight:bold;">إرسال</button>
</div>

<div class="footer-nav">
    <div class="f-btn" onclick="showList('المتواجدين')"><i class="fas fa-users"></i>المتواجدين</div>
    <div class="f-btn" onclick="openYouTube()"><i class="fab fa-youtube" style="color:red"></i>يوتيوب</div>
    <div class="f-btn" onclick="showRoomMenu()"><i class="fas fa-cogs"></i>الإعدادات</div>
    <div class="f-btn" onclick="showWallet()"><i class="fas fa-wallet"></i>الأرباح</div>
    <div class="f-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i>تحديث</div>
</div>

<div id="modal" class="king-modal"><div class="king-card" id="mContent"></div></div>

<input type="file" id="msgFile" hidden onchange="uploadMsgImg(this)">

<script>
    // بيانات الإمبراطور
    let me = {
        name: "خليل إبراهيم",
        img: "https://i.pravatar.cc/150?u=kh",
        role: "إمبراطور",
        isBanned: false
    };

    // منع VPN (برمجياً عبر فحص التوقيت واللغة)
    function checkConnection() {
        const isVpn = (Intl.DateTimeFormat().resolvedOptions().timeZone === 'UTC');
        if(isVpn) { console.warn("تنبيه: اتصال مشفر مكتشف."); }
    }

    function startApp() {
        let name = document.getElementById('userNameInp').value;
        if(name) {
            me.name = name;
            document.getElementById('loginOverlay').style.display = 'none';
            renderMsg("النظام", `مرحباً بك يا ${name} في عرش خليل.`, me.img, true);
            checkConnection();
        }
    }

    function sendMsg() {
        let t = document.getElementById('msgInp').value;
        if(t.trim()) { renderMsg(me.name, t, me.img, true); document.getElementById('msgInp').value=''; }
    }

    function renderMsg(user, txt, img, isKing) {
        let div = document.createElement('div');
        div.className = 'msg-wrap';
        div.innerHTML = `
            <div class="msg-header" onclick="viewProfile('${user}', '${img}')">
                <img src="${img}" class="pfp-main">
                <span class="king-name-tag">${user}</span>
            </div>
            <div style="background:#fff; color:#000; padding:10px 15px; border-radius:0 15px 15px 15px; font-size:14px; margin-right:50px;">${txt}</div>
        `;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    function viewProfile(name, img) {
        const timeNow = new Date().toLocaleTimeString('ar-EG');
        let h = `
            <div style="height:80px; background:var(--king-grad)"></div>
            <center style="margin-top:-40px">
                <img src="${img}" style="width:80px; height:80px; border-radius:50%; border:3px solid #111;">
                <h3 style="color:var(--gold)">${name}</h3>
                <p style="font-size:12px">الوقت: ${timeNow} | الحالة: متصل ✅</p>
                <div style="display:flex; justify-content:center; gap:10px; margin:10px;">
                    <button class="tool-btn" style="background:#444" onclick="alert('تم إرسال طلب صداقة')">➕ صديق</button>
                    <button class="tool-btn" style="background:#444" onclick="alert('تم الإعجاب')">👍 1.2k</button>
                </div>
            </center>

            <div class="admin-grid">
                <button class="tool-btn" style="background:#c0392b" onclick="adminAction('طرد نهائي')"><i class="fas fa-user-slash"></i> طرد نهائي</button>
                <button class="tool-btn" style="background:#e67e22" onclick="adminAction('كتم/فك')"><i class="fas fa-microphone-slash"></i> كتم/فك</button>
                <button class="tool-btn" style="background:#2980b9" onclick="adminAction('حظر/فك')"><i class="fas fa-ban"></i> حظر/فك</button>
                <button class="tool-btn" style="background:#8e44ad" onclick="openRankMenu('${name}')"><i class="fas fa-crown"></i> منح رتبة</button>
            </div>
            <button onclick="closeM()" style="width:100%; padding:15px; background:red; border:none; color:#fff;">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function openRankMenu(target) {
        let h = `
            <div style="padding:20px; text-align:center;">
                <h3 style="color:var(--gold)">منح رتبة لـ ${target}</h3>
                <button class="tool-btn" style="background:linear-gradient(to right, #ffd700, #b8860b); color:black; width:100%; margin-bottom:5px;" onclick="setRank('كأس ملكي')">🏆 كأس ملكي</button>
                <button class="tool-btn" style="background:gold; color:black; width:100%; margin-bottom:5px;" onclick="setRank('تاج الإمبراطورية')">👑 تاج</button>
                <button class="tool-btn" style="background:#2ecc71; width:100%; margin-bottom:5px;" onclick="setRank('أدمن مطور')">🛡️ أدمن</button>
                <button class="tool-btn" style="background:#3498db; width:100%; margin-bottom:5px;" onclick="setRank('أونر الغرفة')">💎 أونر</button>
                <button onclick="viewProfile('${target}', '${me.img}')" style="margin-top:10px; background:none; border:1px solid #555; color:white;">عودة</button>
            </div>
        `;
        document.getElementById('mContent').innerHTML = h;
    }

    // تفعيل الأزرار العلوية والسفلية
    function openNotify() { alert("🔔 لا توجد تنبيهات جديدة في سجل الإمبراطورية."); }
    function openReports() { alert("🚩 تقرير الإدارة: جميع الأعضاء ملتزمون بالقوانين."); }
    function openPrivate() { alert("💬 صندوق الرسائل الخاصة مشفر عسكرياً."); }
    function showList(type) { alert(`قائمة ${type}: خليل، أحمد، سارة، إبراهيم... (قائمة نشطة)`); }
    function showWallet() { alert("💰 رصيدك الحالي: 100,000,000 ذهبة ملكية."); }
    function openYouTube() { 
        let url = prompt("أدخل رابط اليوتيوب:"); 
        if(url) renderMsg(me.name, `<iframe width="100%" src="${url.replace('watch?v=', 'embed/')}" frameborder="0"></iframe>`, me.img, true);
    }
    
    function showRoomMenu() {
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold)">إعدادات التحكم</h3>
                <button class="tool-btn" style="background:#333; width:100%; margin-bottom:10px;" onclick="location.reload()">تغيير الهوية</button>
                <button class="tool-btn" style="background:#c0392b; width:100%;" onclick="alert('تم تنظيف الشات')">مسح الرسائل</button>
                <button onclick="closeM()" style="width:100%; margin-top:20px; background:none; border:none; color:red;">إلغاء</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function adminAction(act) { alert(`تم إصدار أمر ملكي بـ: ${act}`); }
    function setRank(rank) { alert(`تم منح العضو رتبة: ${rank}`); closeM(); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function uploadMsgImg(i) { if(i.files[0]) { let r = new FileReader(); r.onload = e => renderMsg(me.name, `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`, me.img, true); r.readAsDataURL(i.files[0]); } }
</script>

</body>
</html>
