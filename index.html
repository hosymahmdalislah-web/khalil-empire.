<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - النظام الملكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); --dark-bg: #000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark-bg); color: #fff; overflow: hidden; transition: 0.5s; }

        /* الهيدر والفوتر */
        .header-bar, .footer-nav { position: fixed; width: 100%; background: rgba(26, 26, 26, 0.95); display: flex; align-items: center; justify-content: space-around; z-index: 1000; border-color: var(--gold); border-style: solid; }
        .header-bar { top: 0; height: 70px; border-bottom-width: 2px; padding-right: 60px; }
        .footer-nav { bottom: 0; height: 65px; border-top-width: 2px; }
        .h-btn, .f-btn { text-align: center; color: #fff; font-size: 10px; cursor: pointer; }
        .h-btn i, .f-btn i { display: block; font-size: 20px; margin-bottom: 2px; }

        /* زر الإعدادات الدائري */
        .room-settings-btn { position: fixed; top: 12px; right: 10px; width: 45px; height: 45px; background: var(--king-grad); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 1100; box-shadow: 0 0 10px var(--gold); }

        /* منطقة الرسائل */
        #chatBox { height: calc(100vh - 195px); overflow-y: auto; padding: 85px 10px 10px; display: flex; flex-direction: column; gap: 20px; background-size: cover; background-position: center; }
        
        /* الرسائل */
        .msg-wrap { display: flex; flex-direction: column; gap: 5px; align-self: flex-start; max-width: 85%; }
        .msg-header { display: flex; align-items: center; gap: 8px; }
        .pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .trophy-icon { color: var(--gold); font-size: 14px; }
        .name-box { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); padding: 2px 10px; border-radius: 8px; color: var(--gold); font-weight: bold; font-size: 11px; }
        .bubble { background: #fff; color: #000; padding: 12px; border-radius: 0 15px 15px 15px; font-size: 14px; position: relative; }
        .msg-time { font-size: 9px; color: #777; margin-top: 4px; display: block; text-align: left; }

        /* المودالات */
        .king-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .king-card { background: #111; width: 92%; max-width: 380px; border: 2px solid var(--gold); border-radius: 25px; overflow-y: auto; max-height: 90vh; position: relative; }
        .cover-img { width: 100%; height: 100px; background: var(--king-grad); object-fit: cover; }
        .profile-pfp { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); margin-top: -40px; background: #000; object-fit: cover; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px; font-size: 11px; }
        .info-item { background: #222; padding: 8px; border-radius: 8px; border-right: 3px solid var(--gold); }
        
        .k-btn { padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px; margin: 4px; transition: 0.2s; }
        .btn-gold { background: var(--king-grad); color: #000; }
        .btn-red { background: #c0392b; color: #fff; }
        .btn-blue { background: #2980b9; color: #fff; }

        .input-section { position: fixed; bottom: 65px; width: 100%; background: #111; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; }
        .chat-input { flex: 1; background: #222; border: 1px solid var(--gold); color: #fff; height: 40px; border-radius: 20px; padding: 0 15px; }
    </style>
</head>
<body>

<div class="room-settings-btn" onclick="showRoomMenu()"><i class="fas fa-bars"></i></div>

<div class="header-bar">
    <div class="h-btn" onclick="alert('حقيبتك الملكية تحتوي على: ' + me.gold + ' ذهبة')"><i class="fas fa-briefcase" style="color:#2ecc71"></i>الأرباح</div>
    <div class="h-btn" onclick="alert('قائمة الكبار والمستشارين')"><i class="fas fa-shield-alt" style="color:#3498db"></i>الكبار</div>
    <div class="h-btn" onclick="alert('قائمة الأثرياء')"><i class="fas fa-crown" style="color:var(--gold)"></i>الأثرياء</div>
    <div class="h-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i>تحديث</div>
</div>

<div id="chatBox"></div>

<div class="input-section">
    <i class="fas fa-camera" style="color:var(--gold); font-size:22px;" onclick="document.getElementById('msgFile').click()"></i>
    <input type="text" id="msgInp" class="chat-input" placeholder="اكتب أمرك يا إمبراطور...">
    <button class="k-btn btn-gold" onclick="sendMsg()" style="width:60px;">نشر</button>
</div>

<div class="footer-nav">
    <div class="f-btn" onclick="alert('الإعدادات العامة')"><i class="fas fa-cog"></i>الإعدادات</div>
    <div class="f-btn" onclick="openYouTube()"><i class="fab fa-youtube" style="color:red"></i>يوتيوب</div>
    <div class="f-btn" onclick="showChoiceModal()"><i class="fas fa-user"></i>بروفايلي</div>
    <div class="f-btn" onclick="alert('المتواجدون: 1')"><i class="fas fa-users"></i>المتصلين</div>
    <div class="f-btn" onclick="alert('زخرفة الأسماء الملكية')"><i class="fas fa-magic"></i>زخرفة</div>
</div>

<div id="modal" class="king-modal"><div class="king-card" id="mContent"></div></div>

<input type="file" id="pfpFile" hidden onchange="updateFile(this, 'img')">
<input type="file" id="coverFile" hidden onchange="updateFile(this, 'cover')">
<input type="file" id="bgFile" hidden onchange="changeRoomBg(this)">
<input type="file" id="msgFile" hidden onchange="uploadMsgImg(this)">

<script>
    let me = JSON.parse(localStorage.getItem('khalil_king_v3')) || {
        name: "خليل إبراهيم",
        img: "https://i.pravatar.cc/150?u=khalil",
        cover: "https://images.unsplash.com/photo-1511367461989-f85a21fda167",
        gold: 10000000,
        status: "إمبراطور المنصة 👑",
        age: 25,
        rank: "المؤسس"
    };

    function save() { localStorage.setItem('khalil_king_v3', JSON.stringify(me)); }

    window.onload = () => {
        renderMsg(me.name, "أهلاً بك يا خليل في إمبراطوريتك. النظام جاهز للعمل.", me.img, true);
    };

    // --- وظائف الغرفة ---
    function showRoomMenu() {
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold); border-bottom:1px solid #333; padding-bottom:10px;">إدارة الغرفة الملكية</h3>
                <button class="k-btn btn-blue" style="width:100%" onclick="let n=prompt('اسم الغرفة الجديد:'); if(n) alert('تم تعديل الاسم')">📝 تعديل اسم الغرفة</button>
                <button class="k-btn btn-blue" style="width:100%" onclick="alert('تم فتح غرفة فرعية جديدة')">➕ إضافة غرفة جديدة</button>
                <button class="k-btn btn-gold" style="width:100%" onclick="document.getElementById('bgFile').click()">🖼️ تغيير خلفية الغرفة</button>
                <button class="k-btn btn-red" style="width:100%" onclick="if(confirm('مسح كافة الرسائل؟')) document.getElementById('chatBox').innerHTML=''">🗑️ مسح الغرفة</button>
                <button class="k-btn btn-red" style="width:100%; margin-top:15px;" onclick="window.close(); alert('تم الخروج')">🚪 خروج من الشات</button>
                <button class="k-btn btn-gold" style="width:100%" onclick="closeM()">إغلاق</button>
            </div>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function changeRoomBg(input) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => {
                document.getElementById('chatBox').style.backgroundImage = `url(${e.target.result})`;
                alert("تم تغيير الخلفية");
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    // --- الرسائل ---
    function sendMsg() {
        let t = document.getElementById('msgInp').value;
        if(t) { renderMsg(me.name, t, me.img, true); document.getElementById('msgInp').value=''; }
    }

    function renderMsg(user, txt, img, isKing) {
        let time = new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        let div = document.createElement('div');
        div.className = 'msg-wrap';
        div.innerHTML = `
            <div class="msg-header">
                <img src="${img}" class="pfp" onclick="viewProfile('${user}', '${img}')">
                ${isKing ? '<i class="fas fa-trophy trophy-icon"></i>' : ''}
                <span class="name-box">${user}</span>
            </div>
            <div class="bubble">${txt} <span class="msg-time">${time}</span></div>
        `;
        let b = document.getElementById('chatBox');
        b.appendChild(div);
        b.scrollTop = b.scrollHeight;
    }

    // --- البروفايل ---
    function showChoiceModal() { viewProfile(me.name, me.img); }

    function viewProfile(name, img) {
        let isMe = (name === me.name);
        let h = `
            <img src="${isMe ? me.cover : 'https://via.placeholder.com/400x100/222/gold'}" class="cover-img">
            <center>
                <img src="${img}" class="profile-pfp">
                <h3 style="color:var(--gold); margin:5px;">${name}</h3>
                <p style="font-size:12px; color:#888;">${isMe ? me.status : 'عضو في الإمبراطورية'}</p>
            </center>
            <div class="info-grid">
                <div class="info-item"><b>العمر:</b> ${isMe ? me.age : 'غير محدد'}</div>
                <div class="info-item"><b>الرتبة:</b> ${isMe ? me.rank : 'عضو'}</div>
                <div class="info-item"><b>النقاط:</b> ${isMe ? me.gold : '500'}</div>
                <div class="info-item"><b>الوقت:</b> ${new Date().toLocaleTimeString('ar-EG')}</div>
            </div>
            <div style="padding:10px; display:flex; flex-wrap:wrap; justify-content:center;">
                <button class="k-btn btn-gold" onclick="alert('تم إرسال طلب الصداقة')">➕ إضافة صديق</button>
                <button class="k-btn btn-blue" onclick="alert('🌹 تم إهداء وردة ملكية')">🌹 إهداء وردة</button>
                <button class="k-btn btn-gold" onclick="giftRank('${name}')">👑 إهداء رتبة</button>
                ${isMe ? `<button class="k-btn btn-blue" onclick="editMyProfile()">⚙️ تعديل بروفايلي</button>` : 
                        `<button class="k-btn btn-red" onclick="editMember('${name}')">⚡ تعديل العضو</button>`}
            </div>
            <button class="k-btn btn-red" style="width:90%; margin:10px 5%;" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function giftRank(target) {
        let r = prompt("اختر رتبة (كينج، برنس، مستشار، كبار الشخصيات):");
        if(r) alert("تم منح " + target + " رتبة: " + r);
    }

    function editMyProfile() {
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold)">إعدادات بروفايلي</h3>
                <button class="k-btn btn-blue" style="width:100%" onclick="document.getElementById('pfpFile').click()">📷 تغيير الصورة</button>
                <button class="k-btn btn-blue" style="width:100%" onclick="document.getElementById('coverFile').click()">🖼️ تغيير الغلاف</button>
                <input type="text" id="eName" class="chat-input" style="width:100%; margin:5px 0" value="${me.name}" placeholder="الاسم">
                <input type="text" id="eStatus" class="chat-input" style="width:100%; margin:5px 0" value="${me.status}" placeholder="الحالة">
                <input type="number" id="eAge" class="chat-input" style="width:100%; margin:5px 0" value="${me.age}" placeholder="العمر">
                <button class="k-btn btn-gold" style="width:100%" onclick="saveMyEdits()">حفظ التغييرات</button>
            </div>
        `;
        document.getElementById('mContent').innerHTML = h;
    }

    function saveMyEdits() {
        me.name = document.getElementById('eName').value;
        me.status = document.getElementById('eStatus').value;
        me.age = document.getElementById('eAge').value;
        save(); alert("تم الحفظ!"); location.reload();
    }

    // تعديل الإمبراطور لأي عضو
    function editMember(target) {
        let action = prompt("ماذا تريد أن تفعل بـ " + target + "؟\n1- حظر\n2- كتم\n3- طرد\n4- تغيير رتبة");
        if(action) alert("تم تنفيذ الأمر بنجاح");
    }

    function updateFile(input, type) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => {
                if(type === 'img') me.img = e.target.result;
                else me.cover = e.target.result;
                save(); alert("تم التحديث"); editMyProfile();
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function openYouTube() {
        let l = prompt("رابط الفيديو:");
        if(l) renderMsg(me.name, `<iframe width="100%" height="150" src="${l.replace('watch?v=','embed/')}" frameborder="0"></iframe>`, me.img, true);
    }

    function uploadMsgImg(input) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => renderMsg(me.name, `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`, me.img, true);
            r.readAsDataURL(input.files[0]);
        }
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
        </html>
