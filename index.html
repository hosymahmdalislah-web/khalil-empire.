<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات الكأس الملكي - GitHub Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffd700; --royal-bg: #2c003e; }
        body { margin: 0; background: var(--royal-bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* واجهة تسجيل الدخول */
        #loginSection { position: fixed; inset: 0; background: var(--royal-bg); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .login-card { background: white; color: #333; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 0 20px var(--gold); }
        .login-card h2 { color: #8e44ad; margin-bottom: 20px; }
        .login-card input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .login-card button { background: #8e44ad; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* الهيدر الملكي */
        .header { background: #4b0082; padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid var(--gold); font-size: 14px; }
        
        /* منطقة الرسائل */
        #chatBox { height: calc(100vh - 140px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; border-right: 4px solid var(--gold); margin-bottom: 5px; }
        .rank-tag { background: var(--gold); color: black; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 5px; }

        /* شريط الإرسال */
        .footer { position: fixed; bottom: 0; width: 100%; background: #4b0082; padding: 10px; display: flex; gap: 8px; box-sizing: border-box; }
        .footer input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; font-size: 16px; }
        .footer button { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="loginSection">
    <div class="login-card">
        <h2>👑 مملكة الكأس 👑</h2>
        <input type="text" id="regName" placeholder="الاسم المستعار">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button onclick="enterKingdom()">دخول الشات</button>
    </div>
</div>

<div class="header">
    <span>💰 الذهب: <span id="goldCount">1000</span></span>
    <span>👑 الرتبة: <span id="userRank">عضو</span></span>
</div>

<div id="chatBox"></div>

<div class="footer">
    <button onclick="alert('🎤 الميكروفون قيد التجهيز...')">🎤</button>
    <input type="text" id="msgContent" placeholder="اكتب رسالتك الملكية...">
    <button onclick="sendMsg()">🚀</button>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyBbUsrOQrQMmeWkRdQwQ33IR8asdY5VpdM",
      authDomain: "khalil-chat.firebaseapp.com",
      databaseURL: "https://khalil-chat-default-rtdb.firebaseio.com",
      projectId: "khalil-chat",
      storageBucket: "khalil-chat.firebasestorage.app",
      messagingSenderId: "684465803980",
      appId: "1:684465803980:web:bcc3b1cf9435958f2c2869"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let currentUser = { name: "", rank: "عضو" };

    function enterKingdom() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        if (!name || !email) return alert("يرجى إدخال البيانات المطلوبة");

        currentUser.name = name;
        if (name === "خليل إبراهيم") {
            currentUser.rank = "الإمبراطور";
        }
        
        document.getElementById('userRank').innerText = currentUser.rank;
        document.getElementById('loginSection').style.display = 'none';
        startChat();
    }

    function sendMsg() {
        const text = document.getElementById('msgContent').value;
        if (!text) return;
        database.ref('messages').push({
            user: currentUser.name,
            rank: currentUser.rank,
            text: text,
            time: Date.now()
        });
        document.getElementById('msgContent').value = "";
    }

    function startChat() {
        database.ref('messages').limitToLast(50).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<div><span class="rank-tag">${data.rank}</span><b style="color:gold">${data.user}</b></div><div>${data.text}</div>`;
            const box = document.getElementById('chatBox');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
  </html>
