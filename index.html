<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات الملكية - النسخة الدائمة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; overflow: hidden; }

        /* Login Overlay */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #444, #000); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 10px; }
        .login-card { background: #fff; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; border: 4px solid var(--gold); text-align: center; box-shadow: 0 0 20px gold; }
        .login-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--king-grad); color: #000; }
        .login-form { display: none; } .login-form.active { display: block; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ccc; text-align: center; }

        /* Main App */
        #chatApp { display: none; height: 100vh; flex-direction: column; background: url('https://wallpaperaccess.com/full/1161063.jpg') center/cover; }
        
        .top-nav { height: 65px; background: rgba(0,0,0,0.85); display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid gold; z-index: 100; }
        .nav-btn { color: gold; text-align: center; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-btn i { display: block; font-size: 20px; margin-bottom: 2px; }

        .mic-section { height: 90px; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; gap: 15px; border-bottom: 1px solid gold; }
        .user-mic { width: 55px; height: 55px; border-radius: 50%; border: 2px solid gold; position: relative; }
        .user-mic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .chat-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-bubble { align-self: flex-start; max-width: 85%; position: relative; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .header-icon { width: 35px; height: 35px; border-radius: 50%; border: 2px solid gold; cursor: pointer; overflow: hidden; }
        .header-icon img { width:100%; height:100%; object-fit:cover; }
        .name-tag { background: #000; color: gold; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; border: 1px solid gold; }

        .msg-text { background: rgba(255,255,255,0.95); padding: 10px 15px; border-radius: 0 15px 15px 15px; font-size: 14px; color: #000; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* Panel Bottom */
        .bottom-panel { background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 10px; gap: 10px; border-top: 2px solid gold; }
        .msg-input { flex: 1; height: 40px; border-radius: 20px; border: 1px solid gold; padding: 0 15px; }
        .icon-btn { font-size: 22px; color: gold; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #fff; width: 90%; max-width: 400px; border-radius: 15px; border: 3px solid gold; overflow: hidden; animation: zoom 0.3s; }
        @keyframes zoom { from {transform: scale(0);} to {transform: scale(1);} }
        .m-header { background: #000; color: gold; padding: 10px; text-align: center; }
        .m-body { padding: 15px; max-height: 60vh; overflow-y: auto; text-align: center; }
        .admin-btn { width: 100%; padding: 10px; margin-top: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #ytPlayer { width: 100%; height: 200px; background: #000; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 40px; color: gold;"></i>
        <h2>إمبراطورية الشات</h2>
        <div class="login-tabs">
            <button class="tab-btn active" onclick="switchTab('visitor', this)">زائر</button>
            <button class="tab-btn" onclick="switchTab('member', this)">عضو</button>
        </div>
        <div id="visitor" class="login-form active">
            <input type="text" id="vName" placeholder="اسمك المستعار">
            <button class="tab-btn active" style="width:100%" onclick="login()">دخول سريع</button>
        </div>
        <div id="member" class="login-form">
            <input type="text" id="mName" placeholder="اسم المستخدم">
            <input type="password" placeholder="كلمة المرور">
            <button class="tab-btn active" style="width:100%" onclick="login()">دخول العضوية</button>
        </div>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-btn" onclick="openProfile()"><i class="fas fa-user-circle"></i>بروفايلي</div>
        <div class="nav-btn" onclick="alert('لا توجد رسائل خاصة')"><i class="fas fa-envelope"></i>الخاص</div>
        <div class="nav-btn" onclick="openCounter()"><i class="fas fa-calculator"></i>العداد</div>
        <div class="nav-btn" onclick="openAdmin()"><i class="fas fa-cog"></i>الإعدادات</div>
        <div class="nav-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i>خروج</div>
    </div>

    <div class="mic-section" id="micList">
        </div>

    <div class="chat-view" id="chatBox"></div>

    <div id="ytArea" style="padding: 0 10px; display:none;">
        <iframe id="ytPlayer" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="bottom-panel">
        <i class="fas fa-plus-circle icon-btn" onclick="document.getElementById('fileInp').click()"></i>
        <input type="file" id="fileInp" hidden onchange="handleFile(this)">
        <i class="fab fa-youtube icon-btn" onclick="openYoutubeSearch()"></i>
        <input type="text" id="msgInput" class="msg-input" placeholder="تحدث يا ملك...">
        <i class="fas fa-paper-plane icon-btn" onclick="sendMsg()"></i>
    </div>
</div>

<div id="globalModal" class="modal">
    <div class="modal-box">
        <div class="m-header" id="modalTitle"></div>
        <div class="m-body" id="modalBody"></div>
        <button onclick="closeModal()" style="width:100%; padding:10px; border:none; background:#eee;">إغلاق</button>
    </div>
</div>

<script>
    // --- البيانات الأساسية ---
    let user = JSON.parse(localStorage.getItem('imp_user')) || null;
    let chatHistory = JSON.parse(localStorage.getItem('imp_msgs')) || [];
    let counter = localStorage.getItem('imp_counter') || 0;

    // --- التشغيل المبدئي ---
    window.onload = () => {
        if (user) {
            startApp();
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
        }
    };

    function startApp() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        renderMics();
        renderChat();
    }

    function login() {
        let name = document.getElementById('vName').value || document.getElementById('mName').value || "عضو مجهول";
        user = {
            name: name,
            avatar: "https://i.pravatar.cc/150?u=" + name,
            level: 1,
            likes: 0,
            status: "أنا ملك الشات الجديد 👑",
            joinDate: new Date().toLocaleDateString('ar-EG'),
            roses: 0
        };
        localStorage.setItem('imp_user', JSON.stringify(user));
        startApp();
    }

    function logout() {
        localStorage.removeItem('imp_user');
        location.reload();
    }

    // --- إدارة الرسائل ---
    function sendMsg() {
        let text = document.getElementById('msgInput').value;
        if(!text) return;
        
        let msg = {
            id: Date.now(),
            sender: user.name,
            avatar: user.avatar,
            text: text,
            time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})
        };
        
        chatHistory.push(msg);
        if(chatHistory.length > 50) chatHistory.shift();
        localStorage.setItem('imp_msgs', JSON.stringify(chatHistory));
        renderMsg(msg);
        document.getElementById('msgInput').value = "";
    }

    function renderChat() {
        const box = document.getElementById('chatBox');
        box.innerHTML = "";
        chatHistory.forEach(renderMsg);
        box.scrollTop = box.scrollHeight;
    }

    function renderMsg(msg) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = 'msg-bubble';
        div.innerHTML = `
            <div class="msg-header">
                <div class="header-icon" onclick="viewOtherProfile('${msg.sender}')"><img src="${msg.avatar}"></div>
                <div class="name-tag">${msg.sender}</div>
                <small style="color:white; font-size:9px;">${msg.time}</small>
            </div>
            <div class="msg-text">${msg.text}</div>
        `;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // --- البروفايل ---
    function openProfile() {
        showModal("تعديل بروفايلي الملكي", `
            <img src="${user.avatar}" style="width:80px; height:80px; border-radius:50%; border:2px solid gold;">
            <br>
            <label>تغيير الصورة (URL):</label>
            <input type="text" id="newAv" value="${user.avatar}" onchange="updateProfile('avatar', this.value)">
            <input type="text" id="newStat" placeholder="حالتك" value="${user.status}" onchange="updateProfile('status', this.value)">
            <div style="background:#f9f9f9; padding:10px; margin-top:10px; border-radius:10px;">
                <p>❤️ اللايكات: ${user.likes}</p>
                <p>🌹 الورود: ${user.roses}</p>
                <p>📅 تاريخ الدخول: ${user.joinDate}</p>
            </div>
        `);
    }

    function updateProfile(key, val) {
        user[key] = val;
        localStorage.setItem('imp_user', JSON.stringify(user));
    }

    function viewOtherProfile(name) {
        showModal("بروفايل " + name, `
            <img src="https://i.pravatar.cc/150?u=${name}" style="width:80px; height:80px; border-radius:50%; border:2px solid gold;">
            <h3>${name}</h3>
            <p>الحالة: متصل الآن 🟢</p>
            <button class="admin-btn" style="background:#ff4757; color:white;" onclick="alert('تم إرسال وردة لـ ${name} 🌹')">إهداء وردة 🌹</button>
            <button class="admin-btn" style="background:#2f3542; color:white;" onclick="alert('تم إرسال طلب صداقة')">إضافة صديق 👥</button>
            <button class="admin-btn" style="background:#ffa502; color:white;" onclick="alert('تم الإعجاب!')">لايك ❤️</button>
        `);
    }

    // --- اليوتيوب ---
    function openYoutubeSearch() {
        let song = prompt("اكتب اسم الأغنية أو الفنان:");
        if(song) {
            let ytArea = document.getElementById('ytArea');
            let player = document.getElementById('ytPlayer');
            ytArea.style.display = 'block';
            // نستخدم بحث يوتيوب المدمج (للتوضيح نستخدم رابط بحث)
            player.src = `https://www.youtube.com/embed?listType=search&list=${song}`;
            sendMsg(`استمعوا معي إلى: ${song} 🎵`);
        }
    }

    // --- العداد ---
    function openCounter() {
        showModal("عداد الإمبراطورية", `
            <h1 id="cVal" style="font-size:50px;">${counter}</h1>
            <button class="admin-btn" style="background:green; color:white;" onclick="changeCounter(1)">+ زِد</button>
            <button class="admin-btn" style="background:red; color:white;" onclick="changeCounter(-1)">- نقص</button>
        `);
    }

    function changeCounter(val) {
        counter = parseInt(counter) + val;
        localStorage.setItem('imp_counter', counter);
        document.getElementById('cVal').innerText = counter;
    }

    // --- لوحة التحكم ---
    function openAdmin() {
        showModal("الإعدادات والخلفية", `
            <button class="admin-btn" onclick="changeBg()">تغيير خلفية الدردشة 🖼️</button>
            <button class="admin-btn" style="background:red; color:white;" onclick="clearMsgs()">مسح كل الرسائل 🧨</button>
        `);
    }

    function changeBg() {
        let url = prompt("أدخل رابط الصورة:");
        if(url) {
            document.getElementById('chatApp').style.backgroundImage = `url('${url}')`;
            localStorage.setItem('imp_bg', url);
        }
    }

    function clearMsgs() {
        if(confirm("هل تريد مسح السجل؟")){
            chatHistory = [];
            localStorage.removeItem('imp_msgs');
            renderChat();
            closeModal();
        }
    }

    // --- أدوات مساعدة ---
    function switchTab(id, btn) {
        document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function showModal(t, c) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = c;
        document.getElementById('globalModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('globalModal').style.display = 'none'; }

    function renderMics() {
        const mics = document.getElementById('micList');
        mics.innerHTML = `<div class="user-mic"><img src="${user.avatar}"><div style="position:absolute; bottom:-15px; width:100%; text-align:center; color:gold; font-size:10px;">أنت</div></div>`;
    }

    function handleFile(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = (e) => {
                sendMsg(`<img src="${e.target.result}" style="max-width:100%; border-radius:10px;">`);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
                                                                                           </html>
