<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - الإصدار المستقر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: #fff; overflow: hidden; }

        /* الشريط العلوي الثابت */
        .top-nav { position: fixed; top: 0; width: 100%; height: 75px; background: #000; display: flex; border-bottom: 2px solid var(--gold); align-items: center; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--gold); font-size: 10px; cursor: pointer; }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 3px; }

        /* منطقة الميكروفونات */
        .mic-section { display: flex; justify-content: space-around; padding: 10px; background: #000; margin-top: 75px; border-bottom: 1px solid #222; }
        .mic-slot { width: 55px; height: 55px; border-radius: 50%; border: 2px dashed var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); cursor: pointer; position: relative; }
        .mic-slot.occupied { border-style: solid; background: var(--king-grad); color: #000; box-shadow: 0 0 10px var(--gold); }

        /* الشات */
        .chat-view { height: calc(100vh - 280px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; background: #000; }
        .msg-box { align-self: flex-start; max-width: 90%; }
        .user-info { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .u-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); }
        .u-name { border: 1px solid var(--gold); padding: 2px 10px; border-radius: 12px; font-size: 12px; }
        .u-text { background: #fff; color: #000; padding: 12px; border-radius: 0 18px 18px 18px; margin-right: 40px; }

        /* الفوتر الثابت */
        .footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--gold); z-index: 1000; }
        .input-bar { display: flex; padding: 10px; gap: 10px; align-items: center; }
        .main-inp { flex: 1; background: #000; border: 1px solid var(--gold); color: #fff; height: 45px; border-radius: 25px; padding: 0 15px; }
        .send-btn { background: var(--king-grad); border: none; padding: 10px 25px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        
        .nav-bottom { height: 65px; display: flex; align-items: center; justify-content: space-around; color: var(--gold); font-size: 10px; }
        .b-btn { text-align: center; cursor: pointer; }
        .b-btn i { display: block; font-size: 20px; }

        /* مودال الخيارات */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .modal-card { background: #111; width: 85%; max-width: 350px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; }
        .action-btn { width: 100%; padding: 12px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-item" onclick="openProfile()"><i class="fas fa-id-card"></i>إعداداتي</div>
    <div class="nav-item"><i class="fas fa-chess-king"></i>الكبار</div>
    <div class="nav-item"><i class="fas fa-gem"></i>الأثرياء</div>
    <div class="nav-item" onclick="showWallet()"><i class="fas fa-wallet"></i>الأرباح</div>
    <div class="nav-item" style="color:red" onclick="logout()"><i class="fas fa-power-off"></i>خروج</div>
</div>

<div class="mic-section">
    <div class="mic-slot" id="mic1" onclick="micMenu(1)"><i class="fas fa-microphone"></i></div>
    <div class="mic-slot" id="mic2" onclick="micMenu(2)"><i class="fas fa-microphone"></i></div>
    <div class="mic-slot" id="mic3" onclick="micMenu(3)"><i class="fas fa-microphone"></i></div>
    <div class="mic-slot" id="mic4" onclick="micMenu(4)"><i class="fas fa-microphone"></i></div>
</div>

<div class="chat-view" id="chatContainer"></div>

<div class="footer">
    <div class="input-bar">
        <i class="fas fa-laugh-beam" style="color:var(--gold); font-size:25px;" onclick="alert('لوحة الإيموجي مفعلة')"></i>
        <input type="text" id="chatInp" class="main-inp" placeholder="تحدث يا إمبراطور...">
        <button class="send-btn" onclick="sendMessage()">نشر</button>
    </div>
    <div class="nav-bottom">
        <div class="b-btn"><i class="fas fa-users"></i>المتواجدون</div>
        <div class="b-btn" onclick="playMusic()"><i class="fab fa-youtube" style="color:red"></i>يوتيوب</div>
        <div class="b-btn"><i class="fas fa-microphone"></i>تسجيل</div>
        <div class="b-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i>تحديث</div>
    </div>
</div>

<div id="modal" class="modal"><div class="modal-card" id="modalContent"></div></div>

<script>
    // الحفاظ على بيانات الحساب الملكي
    let me = JSON.parse(localStorage.getItem('kingAccount')) || {
        name: "خليل ابراهيم",
        img: "https://i.pravatar.cc/150?u=king",
        wallet: 0.00,
        rank: "صاحب الموقع"
    };

    window.onload = () => {
        saveData();
        addMsg("حسين", "مرحباً بك مجدداً يا سيدي! تم تثبيت الأزرار وتفعيل الميكات والأرباح.", "https://cdn-icons-png.flaticon.com/512/4712/4712035.png", false);
    };

    function saveData() { localStorage.setItem('kingAccount', JSON.stringify(me)); }

    function sendMessage() {
        let t = document.getElementById('chatInp').value;
        if(!t) return;
        addMsg(me.name, t, me.img, true);
        document.getElementById('chatInp').value = "";
        me.wallet += 0.01; // زيادة الأرباح مع كل رسالة
        saveData();
    }

    function addMsg(name, text, img, isKing) {
        let div = document.createElement('div');
        div.className = 'msg-box';
        div.innerHTML = `
            <div class="user-info">
                <img src="${img}" class="u-img">
                ${isKing ? '<i class="fas fa-trophy" style="color:gold"></i>' : ''}
                <span class="u-name">${name}</span>
            </div>
            <div class="u-text">${text}</div>
        `;
        document.getElementById('chatContainer').appendChild(div);
        document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
    }

    function micMenu(id) {
        let h = `
            <h3 style="color:gold">الميكروفون ${id}</h3>
            <button class="action-btn" onclick="joinMic(${id})">🎙️ صعود الميك</button>
            <button class="action-btn" onclick="alert('تم الكتم')">🔇 كتم الصوت</button>
            <button class="action-btn" onclick="playMusic()">🎵 تشغيل أغنية</button>
            <button class="action-btn" style="color:red" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('modalContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function joinMic(id) {
        document.getElementById('mic'+id).classList.add('occupied');
        addMsg("النظام", `الإمبراطور ${me.name} اعتلى الميكروفون ${id}`, me.img, true);
        closeM();
    }

    function showWallet() {
        let h = `
            <h3 style="color:gold">محفظة الأرباح</h3>
            <div style="font-size:24px; color:#2ecc71; margin:15px 0;">$${me.wallet.toFixed(2)}</div>
            <button class="action-btn" onclick="alert('جاري معالجة طلب السحب...')">💸 سحب الأرباح الآن</button>
            <button class="action-btn" onclick="closeM()">عودة</button>
        `;
        document.getElementById('modalContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function playMusic() {
        let s = prompt("اسم الأغنية؟");
        if(s) addMsg(me.name, `🎵 جاري تشغيل: ${s}<br><iframe width="100%" height="150" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0"></iframe>`, me.img, true);
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function logout() { location.reload(); }
</script>
</body>
            </html>
