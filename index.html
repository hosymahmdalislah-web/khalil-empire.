<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - النسخة السيادية النهائية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); --dark: #000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: #fff; overflow: hidden; }

        /* شاشة الدخول */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #222, #000); z-index: 100000; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .login-card { background: rgba(255, 255, 255, 0.05); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); backdrop-filter: blur(15px); text-align: center; box-shadow: 0 0 50px var(--gold); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; text-align: center; }
        .btn-king { width: 100%; padding: 14px; background: var(--king-grad); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; }

        /* الهيكل الأساسي */
        #chatApp { display: none; height: 100vh; flex-direction: column; position: relative; }
        
        /* الشريط العلوي */
        .top-nav { position: fixed; top: 0; width: 100%; height: 75px; background: #000; display: flex; border-bottom: 2px solid var(--gold); align-items: center; z-index: 1000; padding: 0 5px; overflow-x: auto; }
        .nav-item { min-width: 70px; text-align: center; color: var(--gold); font-size: 9px; cursor: pointer; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 2px; }

        .chat-view { flex: 1; overflow-y: auto; padding: 85px 10px 145px 10px; display: flex; flex-direction: column; gap: 15px; }

        /* الرسائل */
        .msg-container { align-self: flex-start; max-width: 95%; animation: fadeIn 0.3s ease; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .avatar-box { position: relative; width: 45px; height: 45px; }
        .user-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; }
        .trophy-sep { color: var(--gold); font-size: 18px; filter: drop-shadow(0 0 3px gold); }
        .user-name-wrap { padding: 3px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; border: 1px solid var(--gold); }
        .msg-text { background: #fff; color: #000; padding: 12px 18px; border-radius: 0 18px 18px 18px; font-size: 14px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }

        /* الفوتر */
        .footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); z-index: 1000; }
        .input-area { display: flex; padding: 10px; gap: 8px; align-items: center; }
        .msg-inp { flex: 1; background: #111; border: 1px solid var(--gold); color: #fff; height: 45px; border-radius: 25px; padding: 0 20px; }
        .btn-send { background: var(--king-grad); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; color: #000; }

        .bottom-nav { height: 60px; display: flex; align-items: center; background: #000; border-top: 1px solid #222; }
        .b-nav-item { flex: 1; text-align: center; color: var(--gold); font-size: 10px; cursor: pointer; }

        /* المودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100000; align-items: center; justify-content: center; }
        .modal-content { background: #111; width: 95%; max-width: 400px; border: 2px solid var(--gold); border-radius: 25px; padding: 25px; position: relative; text-align: center; }
        .stat-card { background: #222; padding: 10px; border-radius: 12px; border: 1px solid #333; margin-bottom: 5px; }
        .rank-btn { width: 100%; padding: 10px; margin: 5px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-chess-king" style="font-size: 45px; color: var(--gold); margin-bottom: 15px;"></i>
        <input type="text" id="userName" placeholder="ادخل اسمك الملكي">
        <button class="btn-king" onclick="login()">دخول الإمبراطورية</button>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-item" onclick="openProfile()"><i class="fas fa-user-shield"></i>ملفي</div>
        <div class="nav-item" onclick="addPoints()"><i class="fas fa-piggy-bank"></i>الأرباح</div>
        <div class="nav-item" onclick="clearChat()"><i class="fas fa-broom"></i>مسح الشات</div>
        <div class="nav-item" onclick="createRoom()"><i class="fas fa-plus-circle"></i>إضافة غرفة</div>
        <div class="nav-item" style="color:red" onclick="logout()"><i class="fas fa-power-off"></i>خروج</div>
    </div>

    <div class="chat-view" id="chatBox"></div>

    <div class="footer">
        <div class="input-area">
            <i class="fas fa-camera emoji-btn" style="color:var(--gold); font-size:22px;" onclick="document.getElementById('imgUp').click()"></i>
            <input type="text" id="msgInp" class="msg-inp" placeholder="تحدث مع الرعية...">
            <button class="btn-send" onclick="send()">نشر</button>
        </div>
        <div class="bottom-nav">
            <div class="b-nav-item" onclick="alert('عدد المتصلين الآن: 154')"><i class="fas fa-users"></i>المتواجدون</div>
            <div class="b-nav-item" onclick="alert('فتح الكاميرا الملكية...')"><i class="fas fa-video"></i>كام</div>
            <div class="b-nav-item" onclick="location.reload()"><i class="fas fa-sync-alt"></i>تحديث</div>
        </div>
    </div>
    <input type="file" id="imgUp" hidden onchange="upload(this)">
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeM()" style="position:absolute; top:10px; right:20px; color:red; font-size:30px; cursor:pointer;">×</span>
        <div id="mBody"></div>
    </div>
</div>

<script>
    let me = JSON.parse(localStorage.getItem('impUser')) || null;

    window.onload = () => { if(me) start(); };

    function login() {
        let n = document.getElementById('userName').value || "إمبراطور مجهول";
        me = {
            name: n,
            role: "ملك الموقع",
            points: 5000,
            icon: "https://i.pravatar.cc/150?u="+n,
            color: "gold",
            bg: "#222"
        };
        save();
        start();
    }

    function save() { localStorage.setItem('impUser', JSON.stringify(me)); }

    function start() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        renderMsg("حسين (المساعد)", "أهلاً بك يا سيدي في عرشك. كل الأوامر مفعلة.", "https://cdn-icons-png.flaticon.com/512/4712/4712035.png", "بريمو", "cyan", "#000", false);
    }

    function send() {
        let t = document.getElementById('msgInp').value;
        if(!t) return;
        renderMsg(me.name, t, me.icon, me.role, me.color, me.bg, true);
        document.getElementById('msgInp').value = "";
    }

    function renderMsg(user, text, img, role, rCol, rBg, hasTrophy) {
        let div = document.createElement('div');
        div.className = 'msg-container';
        div.innerHTML = `
            <div class="msg-header">
                <img src="${img}" class="user-img" onclick="viewUser('${user}','${role}','${img}')">
                ${hasTrophy ? '<i class="fas fa-trophy trophy-sep"></i>' : ''}
                <div class="user-name-wrap" style="background:${rBg}; color:${rCol}">${user} [${role}]</div>
            </div>
            <div class="msg-text">${text}</div>
        `;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    function viewUser(name, role, img) {
        let isMe = (name === me.name);
        let html = `
            <img src="${img}" style="width:100px; height:100px; border-radius:50%; border:3px solid gold;">
            <h3 style="color:gold">${name}</h3>
            <div class="stat-card">الرتبة: ${role}</div>
            <div class="stat-card">النقاط الملكية: ${isMe ? me.points : 'مخفية'}</div>
        `;

        if(isMe) {
            html += `
                <input type="text" id="editN" placeholder="تعديل الاسم" value="${me.name}">
                <button class="rank-btn" style="background:blue" onclick="updateName()">حفظ التعديلات</button>
            `;
        } else {
            html += `
                <button class="rank-btn" style="background:red" onclick="alert('تم حظر العضو نهائياً')">حظر (بن)</button>
                <button class="rank-btn" style="background:orange" onclick="alert('تم كتم الصوت')">كتم</button>
                <button class="rank-btn" style="background:purple" onclick="alert('تم إهداء رتبة برنس 👑')">إهداء رتبة ملكية</button>
            `;
        }
        document.getElementById('mBody').innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    }

    function updateName() {
        let newN = document.getElementById('editN').value;
        if(newN) {
            me.name = newN;
            save();
            alert("تم تحديث اسمك الملكي!");
            location.reload();
        }
    }

    function addPoints() {
        me.points += 100;
        save();
        alert("مبروك! تمت إضافة 100 نقطة ذهبية لخزنتك.");
    }

    function clearChat() {
        document.getElementById('chatBox').innerHTML = "";
        alert("تم مسح سجل الدردشة بنجاح.");
    }

    function createRoom() {
        let room = prompt("ادخل اسم الغرفة الجديدة:");
        if(room) alert("تم إنشاء غرفة " + room + " بنجاح!");
    }

    function upload(i) {
        if(i.files[0]) {
            let r = new FileReader();
            r.onload = e => renderMsg(me.name, `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`, me.icon, me.role, me.color, me.bg, true);
            r.readAsDataURL(i.files[0]);
        }
    }

    function logout() { localStorage.removeItem('impUser'); location.reload(); }
    function closeM() { document.getElementById('modal').style.display='none'; }
    function openProfile() { viewUser(me.name, me.role, me.icon); }
</script>
</body>
    </html>
