<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Chat - النسخة النهائية</title>
    <style>
        :root {
            --main-bg: #1a1a1a;
            --panel-bg: #2d2d2d;
            --accent-gold: #ffd700;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--main-bg);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- واجهة الدخول --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(145deg, #121212, #252525);
        }

        .login-box {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #444;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #fff;
            box-sizing: border-box;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- واجهة الشات الرئيسية --- */
        #chat-interface {
            display: none; /* مخفي حتى يتم الدخول */
        }

        .header {
            background: #000;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rank-badge {
            font-size: 20px;
            display: block;
            text-align: center;
            color: var(--accent-gold);
        }

        .name-style {
            background: rgba(45, 45, 45, 0.9);
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #555;
            font-size: 14px;
            font-weight: bold;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #4caf50; /* الدائرة الخضراء كما في الصورة */
        }

        /* --- القائمة الجانبية (الأزرار) --- */
        .side-menu {
            position: fixed;
            left: 0;
            top: 60px;
            width: 250px;
            background: #fff;
            color: #333;
            height: calc(100vh - 120px);
            z-index: 100;
            border-radius: 0 15px 15px 0;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            padding-top: 10px;
        }

        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 14px;
        }

        .menu-item:hover { background: #f9f9f9; }
        .menu-item i { font-size: 18px; color: #555; }
        .text-red { color: #f44336; font-weight: bold; }

        /* --- الشريط السفلي --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #333;
        }

        .nav-btn {
            text-align: center;
            color: #aaa;
            font-size: 11px;
            flex: 1;
        }

        .nav-btn i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-btn.active { color: #fff; }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="tabs">
                <button class="tab-btn" onclick="switchLogin('visitor')">زائر</button>
                <button class="tab-btn active" onclick="switchLogin('member')">عضوية</button>
                <button class="tab-btn" onclick="switchLogin('new')">تسجيل جديد</button>
            </div>
            
            <div id="login-form">
                <div class="input-group">
                    <input type="text" id="user" placeholder="الاسم المستعار أو البريد">
                </div>
                <div class="input-group">
                    <input type="password" id="pass" placeholder="كلمة المرور">
                </div>
                <button class="btn-main" onclick="enterChat()">دخول الآن</button>
            </div>
        </div>
    </div>

    <div id="chat-interface">
        <div class="header">
            <div class="user-info">
                <img src="https://via.placeholder.com/50" class="avatar">
                <div>
                    <span class="rank-badge">🏆 Developer</span>
                    <div class="name-style">⊱ كـ🌹ــارلـوس ⊰</div>
                </div>
            </div>
            <div style="font-size: 20px; gap: 15px; display: flex;">
                <span>🔔</span><span>✉️</span><span>👑</span>
            </div>
        </div>

        <div class="side-menu">
            <div class="menu-item">💠 معلومات المستوى</div>
            <div class="menu-item">💳 محفظة</div>
            <div class="menu-item">🧹 مسح الغرفة</div>
            <div class="menu-item">👤 تحرير الملف الشخصي</div>
            <div class="menu-item">🔄 تبديل نقاط المسابقة</div>
            <div class="menu-item text-red">🔘 الوضع البسيط</div>
            <div class="menu-item">✨ تحديث الشات للجميع</div>
            <div class="menu-item">📢 إرسال إشعار جماعي</div>
            <div class="menu-item">💻 Console</div>
            <div class="menu-item" style="color: #00bcd4;">⚙️ لوحة التحكم</div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn active"><i>⚙️</i>الخيارات</div>
            <div class="nav-btn"><i>👥</i>متواجدين</div>
            <div class="nav-btn"><i>🏠</i>الغرف</div>
            <div class="nav-btn"><i>🎤</i>صوتيات</div>
            <div class="nav-btn"><i>📻</i>الراديو</div>
        </div>
    </div>

    <script>
        function switchLogin(type) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if(type === 'visitor') {
                document.getElementById('pass').style.display = 'none';
            } else {
                document.getElementById('pass').style.display = 'block';
            }
        }

        function enterChat() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'block';
        }
    </script>
</body>
    </html>
