<!DOCTYPE html>
<html lang="ar" dir="rtl" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>شات الإمبراطور الأصلي v5.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap">
    
    <style>
        :root {
            --gold: #f1c40f;
            --dark-gold: #d4ac0d;
            --bg-body: #050505;
            --bg-panel: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; user-select: none; }
        body { background-color: var(--bg-body); display: flex; justify-content: center; align-items: center; height: 100vh; color: var(--text-main); overflow: hidden; }

        .app-container {
            width: 100%; max-width: 450px; height: 100vh; background-color: var(--bg-panel);
            display: flex; flex-direction: column; position: relative; box-shadow: 0 0 40px rgba(0, 0, 0, 1);
        }

        /* بوابة الدخول بـ 3 فروع صريحة */
        .overlay-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 200; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-card { background: #141414; border: 2px solid var(--gold); width: 100%; max-width: 380px; border-radius: 20px; padding: 20px; }
        .auth-branches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .branch-btn { background: #222; border: 1px solid #444; color: var(--text-muted); padding: 8px 2px; font-size: 12px; font-weight: 700; border-radius: 8px; cursor: pointer; }
        .branch-btn.active { background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%); color: #000; font-weight: 900; border-color: var(--gold); }
        .branch-content { display: none; }
        .branch-content.active { display: block; }
        .auth-card input, .auth-card select { width: 100%; background: #000; border: 1px solid #444; padding: 10px; border-radius: 25px; color: #fff; margin-bottom: 12px; outline: none; text-align: center; }
        .auth-card button.btn-action { width: 100%; background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%); border: none; padding: 12px; border-radius: 25px; font-weight: 900; cursor: pointer; color: #000; font-size: 14px; }

        /* القائمة العلوية */
        .top-navigation { background-color: #111111; display: grid; grid-template-columns: repeat(5, 1fr); padding: 10px 0; border-bottom: 2px solid var(--gold); text-align: center; z-index: 5; }
        .nav-tab { color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-tab i { font-size: 18px; color: #fff; }
        .nav-tab span { font-size: 11px; font-weight: 700; color: #aaa; }
        .nav-tab.active i, .nav-tab.active span { color: var(--gold); }

        /* ساحة المحادثات مع التحكم في الخلفية */
        .chat-view-portal { flex: 1; position: relative; overflow: hidden; background-color: #050505; }
        .chat-bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600'); background-size: cover; background-position: center; opacity: 0.25; z-index: 1; pointer-events: none; }
        .messages-list { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; z-index: 2; }

        /* هيكلة هيدر الرسالة الفخمة مثبتة جهة اليمين تماماً كالصورة */
        .msg-block { display: flex; flex-direction: column; width: 100%; align-items: flex-start; }
        .msg-header-identity { display: flex; align-items: center; gap: 8px; width: 100%; justify-content: flex-start; margin-bottom: 6px; cursor: pointer; }
        
        /* إطار الأفاتار الدائري الذهبي */
        .gold-avatar-frame { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--gold); padding: 1px; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .gold-avatar-frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        /* أيقونة الكأس المنفصلة */
        .rank-trophy-icon { color: var(--gold); font-size: 18px; }

        /* إطار الاسم البيضاوي الذهبي */
        .user-oval-badge { background: transparent; border: 1.5px solid var(--gold); padding: 2px 18px; border-radius: 20px; color: #fff; font-size: 13px; font-weight: bold; min-width: 75px; text-align: center; }

        /* فقاعة نص الرسالة البيضاء أسفل البروفايل */
        .text-bubble { 
            background: #ffffff; color: #000000; padding: 12px 20px; 
            border-radius: 16px; border-top-right-radius: 0px; 
            font-size: 14px; font-weight: 500; max-width: 75%; 
            margin-right: 10px; margin-left: 50px; text-align: right; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            line-height: 1.4; align-self: flex-start;
        }

        /* لوحة التحكم السفلي للإرسال */
        .bottom-control-panel { background-color: #0e0e0e; padding: 12px; border-top: 1px solid #1a1a1a; z-index: 10; }
        .action-bar { display: flex; align-items: center; gap: 10px; }
        
        .submit-send-btn { background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%); border: none; color: #000; padding: 10px 20px; border-radius: 20px; font-weight: 900; cursor: pointer; font-size: 14px; }
        .search-input-wrapper { flex: 1; background-color: #000; border: 1.5px solid #333; border-radius: 25px; display: flex; align-items: center; padding: 2px 15px; border-color: var(--dark-gold); }
        .search-input-wrapper input { flex: 1; background: none; border: none; outline: none; color: var(--text-main); padding: 10px 0; font-size: 13px; text-align: right; }
        .image-gallery-trigger { color: var(--gold); font-size: 22px; cursor: pointer; display: flex; align-items: center; }

        /* شريط الخيارات السفلي الأيقوني */
        .footer-tabs-bar { background-color: #0a0a0a; display: grid; grid-template-columns: repeat(5, 1fr); padding: 10px 0; border-top: 1px solid #111; text-align: center; z-index: 5; }
        .footer-item { color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .footer-item i { font-size: 16px; color: #fff; }
        .footer-item span { color: #aaa; }
        .footer-item.active i, .footer-item.active span { color: var(--gold); }

        /* النوافذ الجانبية والمنبثقة */
        .custom-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 150; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #111; border: 2px solid var(--gold); width: 100%; max-width: 380px; border-radius: 15px; padding: 20px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 12px; left: 12px; background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 18px; }

        /* الملف الشخصي المطور داخل المودال */
        .profile-setup-header { width: 100%; height: 90px; background: linear-gradient(45deg, #222, #444); border-radius: 8px; position: relative; margin-bottom: 40px; background-size: cover; background-position: center; }
        .profile-setup-avatar { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); position: absolute; bottom: -30px; right: 15px; background: #000; overflow: hidden; }
        .profile-setup-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .admin-grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="overlay-panel" id="authOverlay">
            <div class="auth-card">
                <h3 style="color:var(--gold); text-align:center; margin-bottom:15px; font-weight:900;">بوابة تسجيل الدخول</h3>
                <div class="auth-branches">
                    <button class="branch-btn active" onclick="switchBranch('loginBranch', this)">عضوية</button>
                    <button class="branch-btn" onclick="switchBranch('registerBranch', this)">تسجيل جديد</button>
                    <button class="branch-btn" onclick="switchBranch('visitorBranch', this)">زائر</button>
                </div>

                <div class="branch-content active" id="loginBranch">
                    <input type="text" id="loginUser" placeholder="اسم الحساب الحشداوي...">
                    <input type="password" id="loginPass" placeholder="كلمة المرور...">
                    <button class="btn-action" onclick="actionLogin()">دخول الحساب</button>
                </div>

                <div class="branch-content" id="registerBranch">
                    <input type="text" id="regUser" placeholder="اسم مستعار جديد...">
                    <input type="password" id="regPass" placeholder="كلمة المرور السرية...">
                    <select id="regGender">
                        <option value="ذكر">ذكر</option>
                        <option value="أنثى">أنثى</option>
                    </select>
                    <button class="btn-action" onclick="actionRegister()">تسجيل ودخول فوري</button>
                </div>

                <div class="branch-content" id="visitorBranch">
                    <p style="color:var(--text-muted); text-align:center; font-size:12px; margin-bottom:15px;">دخول سريع ومؤقت بدون باسورد</p>
                    <button class="btn-action" onclick="actionVisitor()">دخول فوري كزائر</button>
                </div>
            </div>
        </div>

        <div class="custom-modal" id="adminModal">
            <div class="modal-content">
                <button class="close-modal" onclick="closeModal('adminModal')"><i class="fas fa-times-circle"></i></button>
                <h3 style="color:var(--gold); margin-bottom:15px; font-weight:900; text-align:center;">لوحة التحكم المتكاملة</h3>
                
                <button class="btn-action" style="background:#e74c3c; color:#fff; margin-bottom:10px;" onclick="clearRoomMessages()">💥 تنظيف الغرفة ومسح الرسائل</button>
                <button class="btn-action" style="background:#2ecc71; color:#fff; margin-bottom:10px;" onclick="alert('تم إرسال طلب إنشاء غرفة إضافية للمراجعة!')">➕ إنشاء غرفة جديدة</button>
                
                <div style="border-top:1px solid #333; padding-top:10px; margin-top:10px;">
                    <label style="font-size:12px; color:var(--gold);">تغيير خلفية الروم (رابط الصورة):</label>
                    <input type="text" id="bgUrlInput" placeholder="ضع رابط صورة الخلفية الجديدة..." style="width:100%; padding:8px; margin-top:5px; background:#000; border:1.5px solid var(--gold); color:#fff; border-radius:10px;">
                    <button class="btn-action" style="margin-top:5px; padding:6px;" onclick="changeRoomBackground()">تحديث الخلفية فوراً</button>
                </div>

                <button class="btn-action" style="background:#7f8c8d; color:#fff; margin-top:15px;" onclick="location.reload();">🚪 خروج وتسجيل مغادرة</button>
            </div>
        </div>

        <div class="custom-modal" id="profileModal">
            <div class="modal-content">
                <button class="close-modal" onclick="closeModal('profileModal')"><i class="fas fa-times-circle"></i></button>
                <h3 style="color:var(--gold); margin-bottom:15px; font-weight:900; text-align:center;">إعدادات ملفك الشخصي</h3>
                
                <div class="profile-setup-header" id="modalProfileCover">
                    <div class="profile-setup-avatar">
                        <img src="" id="modalProfileImg" alt="Avatar">
                    </div>
                </div>

                <input type="text" id="uInputName" placeholder="تعديل اسمك المستعار...">
                <input type="text" id="uInputImg" placeholder="رابط صورتك الشخصية (الأفاتار)...">
                <input type="text" id="uInputCover" placeholder="رابط صورة غلاف البروفايل...">
                <input type="text" id="uInputStatus" placeholder="اكتب حالتك / الستيتس الحالية...">
                <button class="btn-action" onclick="saveUserProfile()">حفظ وتحديث البروفايل</button>
            </div>
        </div>

        <div class="custom-modal" id="userActionModal">
            <div class="modal-content">
                <button class="close-modal" onclick="closeModal('userActionModal')"><i class="fas fa-times-circle"></i></button>
                <h3 style="color:var(--gold); margin-bottom:10px; font-weight:900; text-align:center;" id="actionModalTargetTitle">التحكم بالعضو</h3>
                <p style="font-size:11px; text-align:center; color:#aaa; margin-bottom:15px;">تطبق الإجراءات حسب مستوى قوتك الإدارية في الروم</p>
                
                <div id="rankManagementSection" style="display:none; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:10px;">
                    <label style="font-size:12px; color:var(--gold);">تعديل رتبة الكأس الإمبراطورية:</label>
                    <select id="rankTrophyStatusSelect" style="width:100%; background:#000; color:#fff; padding:8px; border-radius:10px; margin-top:5px;">
                        <option value="false">سحب الكأس (عضو بدون رتبة)</option>
                        <option value="true">منح الكأس الملكية 🏆</option>
                    </select>
                    <button class="btn-action" style="padding:6px; margin-top:5px;" onclick="applyRankTrophyChange()">حفظ وتعديل رتبة الكأس</button>
                </div>

                <div class="admin-grid-btns">
                    <button class="btn-action" style="background:#e74c3c; color:#fff;" onclick="executePunishment('طرد')">❌ طرد من الشات</button>
                    <button class="btn-action" style="background:#e67e22; color:#fff;" onclick="executePunishment('كتم')">🔇 كتم الحساب</button>
                </div>
                <button class="btn-action" style="background:#962d22; color:#fff; margin-top:10px; width:100%;" onclick="executePunishment('حظر')">🚫 حظر نهائي (باند)</button>
            </div>
        </div>

        <div class="phone-status-bar" style="background:#000; padding:6px 16px; display:flex; justify-content:space-between; font-size:11px; color:#888;">
            <div class="time">10:51 ص</div>
            <div class="icons"><i class="fas fa-wifi"></i> <i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></div>
        </div>

        <nav class="top-navigation">
            <div class="nav-tab"> <i class="fas fa-bell"></i> <span>إشعارات</span> </div>
            <div class="nav-tab"> <i class="fas fa-flag"></i> <span>بلاغات</span> </div>
            <div class="nav-tab active"> <i class="fas fa-comments"></i> <span>الخاص</span> </div>
            <div class="nav-tab"> <i class="fas fa-gem"></i> <span>الأثرياء</span> </div>
            <div class="nav-tab"> <i class="fas fa-crown"></i> <span>الكبار</span> </div>
        </nav>

        <div class="chat-view-portal">
            <div class="chat-bg-layer" id="roomBgLayer"></div>
            <div class="messages-list" id="chatScroller">
                
                <div class="msg-block">
                    <div class="msg-header-identity">
                        <div class="gold-avatar-frame"><img src="https://via.placeholder.com/100/000/fff?text=N" style="filter: invert(1);" alt="System"></div>
                        <div class="user-oval-badge">النظام</div>
                    </div>
                    <div class="text-bubble">تم فك قيود الشبكة.. أهلاً بك يا إمبراطور.</div>
                </div>

            </div>
        </div>

        <footer class="bottom-control-panel">
            <form id="mainChatForm" onsubmit="handleSend(event)">
                <div class="action-bar">
                    <button type="submit" class="submit-send-btn">إرسال</button>
                    <div class="search-input-wrapper">
                        <input type="text" id="chatInputField" placeholder="تحدث يا إمبراطور..." autocomplete="off" required>
                    </div>
                    <div class="image-gallery-trigger" onclick="triggerImageUpload()">
                        <i class="fas fa-image"></i>
                    </div>
                </div>
            </form>
        </footer>

        <div class="footer-tabs-bar">
            <div class="footer-item" onclick="location.reload();"> <i class="fas fa-sync-alt"></i> <span>تحديث</span> </div>
            <div class="footer-item" onclick="alert('محفظة الأرباح جاهزة ومؤمنة.')"> <i class="fas fa-wallet"></i> <span>الأرباح</span> </div>
            <div class="footer-item" onclick="openProfileEditModal()"> <i class="fas fa-cogs"></i> <span>الإعدادات</span> </div>
            <div class="footer-item"> <i class="fab fa-youtube"></i> <span>يوتيوب</span> </div>
            <div class="footer-item active" onclick="openModal('adminModal')"> <i class="fas fa-users"></i> <span>الإدارة</span> </div>
        </div>

    </div>

    <script>
        const chatScroller = document.getElementById('chatScroller');
        const chatInputField = document.getElementById('chatInputField');
        const authOverlay = document.getElementById('authOverlay');
        
        let myProfile = {
            name: "عضو جديد",
            avatar: "https://via.placeholder.com/100/f1c40f/000",
            cover: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600",
            status: "متواجد في الروم الملكي",
            hasTrophy: false,
            powerLevel: 1 // رتبة منخفضة تلقائياً للأعضاء الجدد
        };

        let selectedUserForAction = "";
        let savedMessages = JSON.parse(localStorage.getItem('emp_v5_logs')) || [];

        function switchBranch(branchId, btnElement) {
            document.querySelectorAll('.branch-content').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(branchId).classList.add('active');
            btnElement.classList.add('active');
        }

        function actionRegister() {
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            if(!user || !pass) return alert('الرجاء كتابة البيانات كاملة!');

            myProfile.name = user;
            myProfile.hasTrophy = false; 
            myProfile.powerLevel = 1;

            localStorage.setItem('emp_v5_user_' + user, JSON.stringify({pass: pass, hasTrophy: false, powerLevel: 1, avatar: myProfile.avatar, cover: myProfile.cover, status: myProfile.status}));
            enterChat();
        }

        function actionLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            
            // حساب الإمبراطور المطلق والتحكم الكامل
            if(user === 'حسوني' || user.toLowerCase() === 'admin') {
                myProfile.name = user;
                myProfile.hasTrophy = true;
                myProfile.powerLevel = 100; // القوة العظمى
                myProfile.avatar = "https://i.imgur.com/v8tXg3B.png";
                enterChat();
                return;
            }

            const localAcc = localStorage.getItem('emp_v5_user_' + user);
            if(localAcc) {
                const parsed = JSON.parse(localAcc);
                if(parsed.pass === pass) {
                    myProfile.name = user;
                    myProfile.hasTrophy = parsed.hasTrophy || false;
                    myProfile.powerLevel = parsed.powerLevel || 1;
                    myProfile.avatar = parsed.avatar || myProfile.avatar;
                    myProfile.cover = parsed.cover || myProfile.cover;
                    myProfile.status = parsed.status || myProfile.status;
                    enterChat();
                } else {
                    alert('كلمة المرور خاطئة!');
                }
            } else {
                alert('الحساب غير مسجل، تفضل بفرع تسجيل جديد!');
            }
        }

        function actionVisitor() {
            myProfile.name = "زائر_" + Math.floor(100 + Math.random() * 900);
            myProfile.hasTrophy = false;
            myProfile.powerLevel = 0;
            enterChat();
        }

        function enterChat() {
            authOverlay.style.display = 'none';
            loadChatLogs();
        }

        function handleSend(e) {
            e.preventDefault();
            const text = chatInputField.value.trim();
            if(!text) return;

            const messageData = {
                name: myProfile.name,
                avatar: myProfile.avatar,
                hasTrophy: myProfile.hasTrophy,
                powerLevel: myProfile.powerLevel,
                text: text
            };

            savedMessages.push(messageData);
            localStorage.setItem('emp_v5_logs', JSON.stringify(savedMessages));

            renderMessage(messageData);
            chatInputField.value = '';
            chatScroller.scrollTop = chatScroller.scrollHeight;
        }

        function renderMessage(msg) {
            const block = document.createElement('div');
            block.classList.add('msg-block');

            const trophyHtml = msg.hasTrophy ? `<i class="fas fa-trophy rank-trophy-icon"></i>` : '';

            block.innerHTML = `
                <div class="msg-header-identity" onclick="openUserActionMenu('${msg.name}', ${msg.powerLevel})">
                    <div class="gold-avatar-frame"><img src="${msg.avatar}" alt="Avatar"></div>
                    ${trophyHtml}
                    <div class="user-oval-badge">${msg.name}</div>
                </div>
                <div class="text-bubble">${escapeHtml(msg.text)}</div>
            `;
            chatScroller.appendChild(block);
        }

        function loadChatLogs() {
            chatScroller.innerHTML = `
                <div class="msg-block">
                    <div class="msg-header-identity">
                        <div class="gold-avatar-frame"><img src="https://via.placeholder.com/100/000/fff?text=N" style="filter: invert(1);" alt="System"></div>
                        <div class="user-oval-badge">النظام</div>
                    </div>
                    <div class="text-bubble">تم فك قيود الشبكة.. أهلاً بك يا إمبراطور.</div>
                </div>
            `;
            savedMessages.forEach(msg => renderMessage(msg));
            chatScroller.scrollTop = chatScroller.scrollHeight;
        }

        // فتح لوحة الإجراءات والتحكم بالأعضاء حسب فروقات الرتبة (الأعلى يسيطر على الأدنى)
        function openUserActionMenu(targetUser, targetPower) {
            if(targetUser === myProfile.name) return; // لا يمكن اتخاذ إجراء ضد بروفايلك شخصياً
            
            selectedUserForAction = targetUser;
            document.getElementById('actionModalTargetTitle').innerText = `التحكم بـ ${targetUser}`;
            
            // إظهار تحكم الرتب الفريد وتعديل الكؤوس لحساب حسوني / الأدمن فقط
            if(myProfile.powerLevel >= 100 || myProfile.name === 'حسوني') {
                document.getElementById('rankManagementSection').style.display = 'block';
            } else {
                document.getElementById('rankManagementSection').style.display = 'none';
            }

            // السماح بالتحكم فقط إذا كانت رتبتك أعلى من رتبة المستهدف
            if(myProfile.powerLevel > targetPower || myProfile.name === 'حسوني') {
                openModal('userActionModal');
            } else {
                alert('خطأ: لا يمكنك التحكم أو طرد أو كتم هذا العضو لأن رتبته مساوية أو أعلى منك!');
            }
        }

        function executePunishment(type) {
            alert(`تم تطبيق أمر [ ${type} ] بنجاح ضد العضو المخالف ${selectedUserForAction}!`);
            closeModal('userActionModal');
        }

        function applyRankTrophyChange() {
            const val = document.getElementById('rankTrophyStatusSelect').value === "true";
            
            // تحديث الرسائل المخزنة فوراً
            savedMessages.forEach(m => {
                if(m.name === selectedUserForAction) {
                    m.hasTrophy = val;
                    m.powerLevel = val ? 50 : 1; // ترقية مستوى القوة عند منحه الكأس
                }
            });

            // تحديث قاعدة الحسابات المحلية
            const targetAcc = localStorage.getItem('emp_v5_user_' + selectedUserForAction);
            if(targetAcc) {
                let parsed = JSON.parse(targetAcc);
                parsed.hasTrophy = val;
                parsed.powerLevel = val ? 50 : 1;
                localStorage.setItem('emp_v5_user_' + selectedUserForAction, JSON.stringify(parsed));
            }

            localStorage.setItem('emp_v5_logs', JSON.stringify(savedMessages));
            loadChatLogs();
            alert(`تم تعديل رتبة كأس العضو [ ${selectedUserForAction} ] بنجاح!`);
            closeModal('userActionModal');
        }

        // فتح ومزامنة بيانات تعديل البروفايل لأي عضو
        function openProfileEditModal() {
            document.getElementById('modalProfileImg').src = myProfile.avatar;
            if(myProfile.cover) document.getElementById('modalProfileCover').style.backgroundImage = `url('${myProfile.cover}')`;
            
            document.getElementById('uInputName').value = myProfile.name;
            document.getElementById('uInputImg').value = myProfile.avatar;
            document.getElementById('uInputCover').value = myProfile.cover;
            document.getElementById('uInputStatus').value = myProfile.status;
            openModal('profileModal');
        }

        function saveUserProfile() {
            const name = document.getElementById('uInputName').value.trim();
            const img = document.getElementById('uInputImg').value.trim();
            const cover = document.getElementById('uInputCover').value.trim();
            const status = document.getElementById('uInputStatus').value.trim();

            if(name) myProfile.name = name;
            if(img) myProfile.avatar = img;
            if(cover) myProfile.cover = cover;
            if(status) myProfile.status = status;

            alert('تم حفظ تحديثات ملفك وبروفايلك بنجاح!');
            closeModal('profileModal');
            loadChatLogs();
        }

        // ميزة تغيير خلفية الروم ديناميكياً من لوحة الإدارة
        function changeRoomBackground() {
            const url = document.getElementById('bgUrlInput').value.trim();
            if(url) {
                document.getElementById('roomBgLayer').style.backgroundImage = `url('${url}')`;
                alert('تم تحديث خلفية الروم بنجاح يا إمبراطور!');
                closeModal('adminModal');
            }
        }

        function clearRoomMessages() {
            savedMessages = [];
            localStorage.removeItem('emp_v5_logs');
            loadChatLogs();
            closeModal('adminModal');
        }

        function triggerImageUpload() {
            const imgUrl = prompt("أدخل رابط الصورة لنشرها في الروم الملكي:");
            if(imgUrl) {
                chatInputField.value = imgUrl;
                document.getElementById('mainChatForm').dispatchEvent(new Event('submit'));
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function escapeHtml(text) { return text.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)); }
    </script>
</body>
</html>
