<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات المطورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; position: fixed; }

        /* الشاشة الرئيسية وتنسيق الخلفية */
        #chatApp { 
            height: 100vh; display: none; flex-direction: column; 
            background-size: cover; background-position: center; 
            background-image: url('https://images.unsplash.com/photo-1557683316-973673baf926'); 
        }

        /* شريط الأزرار العلوي - ضمان الظهور الكامل */
        .top-nav { 
            height: 70px; background: rgba(0,0,0,0.9); display: flex; 
            justify-content: space-around; align-items: center; 
            border-bottom: 2px solid gold; z-index: 100;
        }
        .nav-btn { color: gold; text-align: center; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-btn i { display: block; font-size: 24px; margin-bottom: 3px; }

        /* منطقة المايكات مع أرقام الليفل */
        .mic-section { height: 100px; display: flex; justify-content: space-around; align-items: center; background: rgba(0,0,0,0.4); }
        .user-mic { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff; position: relative; }
        .user-mic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .lvl-tag { position: absolute; top: -10px; right: -5px; background: gold; color: #000; font-weight: bold; padding: 2px 6px; border-radius: 5px; font-size: 10px; }

        /* منطقة الرسائل - فصل الكأس عن الاسم */
        .chat-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .trophy-icon { color: gold; font-size: 18px; filter: drop-shadow(0 0 2px black); } /* الكأس منفصل */
        .name-box { background: #000; color: gold; padding: 4px 12px; border-radius: 8px; border: 1px solid gold; font-weight: bold; font-size: 13px; }
        .msg-text { background: #fff; padding: 10px 15px; border-radius: 0 15px 15px 15px; border: 1px solid #ddd; max-width: 85%; color: #333; }

        /* لوحة الكتابة السفلية - علم اليمن */
        .bottom-panel { height: 80px; background: linear-gradient(to bottom, #FF0000 33.3%, #FFFFFF 33.3%, #FFFFFF 66.6%, #000000 66.6%); display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 2px solid gold; }
        .msg-input { flex: 1; height: 45px; border-radius: 25px; border: 2px solid gold; padding: 0 15px; font-weight: bold; }
        .action-icon { font-size: 28px; color: #000; cursor: pointer; }

        /* مودال البروفايل - تعديل كل شيء */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 10px; }
        .modal-box { background: #fff; width: 100%; max-width: 400px; border-radius: 20px; border: 4px solid gold; overflow: hidden; }
        .m-header { background: #000; color: gold; padding: 15px; text-align: center; font-weight: bold; }
        .m-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; max-height: 80vh; overflow-y: auto; }
        .m-body label { font-weight: bold; font-size: 14px; color: #333; }
        .m-body input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; }
        .save-btn { background: var(--king-grad); color: #000; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* شاشة الدخول */
        #loginScreen { position: fixed; inset: 0; background: url('https://images.unsplash.com/photo-1510511459019-5dda7724fd87?auto=format&fit=crop&q=80') center/cover; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.9); padding: 30px; border-radius: 25px; border: 5px solid gold; width: 90%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="margin-bottom:20px;">تسجيل دخول الإمبراطور</h2>
        <input type="text" id="uName" placeholder="اسم المستخدم" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px;">
        <input type="email" id="uEmail" placeholder="البريد الإلكتروني" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px;">
        <input type="password" id="uPass" placeholder="كلمة المرور" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px;">
        <button class="save-btn" style="width:100%;" onclick="startApp()">دخول 👑</button>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-btn" onclick="openProfile()"><i class="fas fa-id-card"></i>بروفايلي</div>
        <div class="nav-btn" onclick="openProfile()"><i class="fas fa-paint-brush"></i>المظهر</div>
        <div class="nav-btn" onclick="showMsg('الغرف مفعمة بالحيوية')"><i class="fas fa-door-open"></i>الغرف</div>
        <div class="nav-btn" onclick="showMsg('قائمة الأثرياء ستظهر هنا')"><i class="fas fa-gem"></i>الأثرياء</div>
        <div class="nav-btn" onclick="showMsg('قائمة الكبار قيد التحديث')"><i class="fas fa-crown"></i>الكبار</div>
        <div class="nav-btn" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>خروج</div>
    </div>

    <div class="mic-section">
        <div class="user-mic"><img src="https://i.pravatar.cc/150?u=1" id="myAv"><span class="lvl-tag">1000</span></div>
        <div class="user-mic"><img src="https://i.pravatar.cc/150?u=2"><span class="lvl-tag">500</span></div>
        <div class="user-mic"><img src="https://i.pravatar.cc/150?u=3"><span class="lvl-tag">220</span></div>
    </div>

    <div class="chat-view" id="chatBox"></div>

    <div class="bottom-panel">
        <input type="file" id="fileInp" hidden onchange="handleFile(this, 'chat')">
        <i class="fas fa-image action-icon" onclick="document.getElementById('fileInp').click()"></i>
        <i class="fab fa-youtube action-icon" style="color:red" onclick="showMsg('أدخل كود اليوتيوب')"></i>
        <input type="text" id="msgInp" class="msg-input" placeholder="اكتب رسالتك الملكية...">
        <i class="fas fa-paper-plane action-icon" style="color:gold" onclick="sendMsg()"></i>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-box">
        <div class="m-header">تعديل البروفايل الملكي</div>
        <div class="m-body">
            <label>تعديل الاسم:</label>
            <input type="text" id="editName">
            
            <label>تغيير الصورة الشخصية من الملفات:</label>
            <input type="file" onchange="handleFile(this, 'avatar')">
            
            <label>تغيير خلفية (صورة الظهر) من الملفات:</label>
            <input type="file" onchange="handleFile(this, 'bg')">
            
            <label>الحالة الشخصية:</label>
            <input type="text" id="editStatus" placeholder="ماذا يدور في ذهنك؟">
            
            <button class="save-btn" onclick="saveProfile()">حفظ التغييرات ✅</button>
        </div>
        <button onclick="closeMod()" style="width:100%; padding:10px; border:none; background:#eee; cursor:pointer;">إلغاء</button>
    </div>
</div>

<script>
    let user = { name: "خليل ابراهيم", avatar: "https://i.pravatar.cc/150?u=me", bg: "" };

    function startApp() {
        const n = document.getElementById('uName').value;
        if(n) user.name = n;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        document.getElementById('editName').value = user.name;
        sendMsg("تم تسجيل الدخول بنجاح عبر البريد والاسم 🛡️");
    }

    function sendMsg(customText = null) {
        const inp = document.getElementById('msgInp');
        const text = customText || inp.value;
        if(!text) return;
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.innerHTML = `
            <div class="msg-header">
                <i class="fas fa-trophy trophy-icon"></i> 
                <div class="name-box">${user.name}</div>
            </div>
            <div class="msg-text">${text}</div>
        `;
        box.appendChild(div);
        inp.value = "";
        box.scrollTop = box.scrollHeight;
    }

    function handleFile(input, target) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if(target === 'chat') sendMsg(`<img src="${e.target.result}" style="max-width:100%; border-radius:10px;">`);
                if(target === 'avatar') {
                    user.avatar = e.target.result;
                    document.getElementById('myAv').src = e.target.result;
                }
                if(target === 'bg') {
                    document.getElementById('chatApp').style.backgroundImage = `url(${e.target.result})`;
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function openProfile() { document.getElementById('profileModal').style.display = 'flex'; }
    function closeMod() { document.getElementById('profileModal').style.display = 'none'; }
    
    function saveProfile() {
        user.name = document.getElementById('editName').value;
        closeMod();
        sendMsg("قمت بتحديث معلوماتي بنجاح ✨");
    }

    function showMsg(m) { alert(m); }
    document.getElementById('msgInp').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
</script>

</body>
            </html>
