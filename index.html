<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الشات - الإصدار الأخير</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --black: #000; --gray: #2c3e50; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--black); overflow: hidden; }

        /* شاشة دخول ملكية */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #333, #000); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; width: 85%; max-width: 400px; padding: 30px; border-radius: 25px; border: 5px solid var(--gold); text-align: center; box-shadow: 0 0 30px var(--gold); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; text-align: center; font-size: 15px; }
        .gold-btn { width: 100%; padding: 15px; background: linear-gradient(180deg, #ffd700, #b8860b); color: #000; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* واجهة الشات */
        #chatApp { display: none; height: 100vh; flex-direction: column; background: #fff; position: relative; }

        /* الشريط العلوي - أيقونات الخلفية */
        .top-nav { background: #333; color: gold; display: flex; justify-content: space-around; padding: 12px 0; border-bottom: 2px solid gold; z-index: 10; }
        .nav-btn { text-align: center; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .nav-btn i { display: block; font-size: 20px; margin-bottom: 3px; }
        .nav-btn:hover { transform: scale(1.1); color: #fff; }

        /* المايكات */
        .mic-grid { background: #cbd4d7; padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid #888; }
        .mic-box { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #fff; position: relative; cursor: pointer; background: #fff; }
        .mic-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .rank-cup { position: absolute; top: -15px; right: -5px; color: gold; font-size: 24px; filter: drop-shadow(1px 1px 2px #000); }

        /* منطقة الرسائل - فصل الرتبة عن خلفية الاسم */
        .chat-area { flex: 1; overflow-y: auto; padding: 10px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; align-items: center; gap: 8px; animation: slide 0.3s ease; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid gold; }
        .cup-icon { color: gold; font-size: 18px; } /* الرتبة منفصلة */
        .name-strip { padding: 4px 15px; border-radius: 20px; color: white; font-weight: bold; font-size: 12px; min-width: 80px; text-align: center; }
        .msg-text { font-size: 14px; color: #333; margin-right: 5px; }

        /* لوحة التحكم الملكية السفلى */
        .king-tools { background: #eee; padding: 10px; display: flex; gap: 10px; overflow-x: auto; border-top: 1px solid #ccc; }
        .tool-btn { background: #fff; border: 1px solid gold; padding: 8px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; white-space: nowrap; }

        /* صندوق الكتابة */
        .write-area { padding: 12px; background: #fff; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .msg-input { flex: 1; background: #f0f0f0; border-radius: 25px; padding: 10px 15px; border: 1px solid #ccc; outline: none; }

        /* مودال تعديل البروفايل الشامل */
        .profile-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100000; align-items: center; justify-content: center; }
        .profile-card { background: #fff; width: 90%; max-width: 380px; border-radius: 25px; border: 3px solid gold; overflow: hidden; }
        .p-header { background: #333; color: gold; padding: 15px; text-align: center; font-weight: bold; }
        .p-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .p-body input, .p-body textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        
        @keyframes slide { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 50px; color: gold; margin-bottom: 15px;"></i>
        <h2>إدارة المملكة</h2>
        <input type="text" id="regName" placeholder="الاسم الملكي">
        <input type="email" placeholder="البريد الإلكتروني">
        <input type="password" placeholder="كلمة المرور">
        <button class="gold-btn" onclick="enterApp()">دخول وسيطرة 🏆</button>
    </div>
</div>

<div id="chatApp">
    <div class="top-nav">
        <div class="nav-btn" onclick="openProfile()"><i class="fas fa-user-edit"></i>بروفايلي</div>
        <div class="nav-btn" onclick="triggerBtn('الرسائل')"><i class="fas fa-envelope"></i>رسائل</div>
        <div class="nav-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i>تحديث</div>
        <div class="nav-btn" onclick="triggerBtn('الأثرياء')"><i class="fas fa-gem"></i>الأثرياء</div>
        <div class="nav-btn" onclick="triggerBtn('الكبار')"><i class="fas fa-user-shield"></i>الكبار</div>
        <div class="nav-btn" onclick="triggerBtn('الإعدادات')"><i class="fas fa-user-cog"></i>إعدادات</div>
    </div>

    <div class="mic-grid">
        <div class="mic-box" onclick="openProfile()">
            <img src="https://i.pravatar.cc/150?u=king" id="dispAv">
            <i class="fas fa-trophy rank-cup"></i>
        </div>
        <div class="mic-box"><img src="https://i.pravatar.cc/150?u=1"></div>
        <div class="mic-box"><img src="https://i.pravatar.cc/150?u=2"></div>
        <div class="mic-box"><img src="https://i.pravatar.cc/150?u=3"></div>
    </div>

    <div class="chat-area" id="chatBox">
        <div class="msg-row">
            <img src="https://i.pravatar.cc/150?u=king" class="user-avatar" id="msgAv">
            <i class="fas fa-trophy cup-icon"></i> <div class="name-strip" id="dispNameStrip" style="background: linear-gradient(45deg, #000, #c0392b);">الملك</div>
            <div class="msg-text">أهلاً بك! تم فصل الرتبة وتفعيل تعديل البروفايل بالكامل.</div>
        </div>
    </div>

    <div class="king-tools">
        <div class="tool-btn" onclick="gift('تاج ذهبي')"><i class="fas fa-crown"></i> إهداء تاج</div>
        <div class="tool-btn" onclick="gift('إشراف')"><i class="fas fa-shield-alt"></i> إهداء إشراف</div>
        <div class="tool-btn" onclick="gift('1000 نقطة')"><i class="fas fa-coins"></i> شحن نقاط</div>
        <div class="tool-btn" onclick="triggerBtn('حظر')"><i class="fas fa-ban"></i> طرد وحظر</div>
    </div>

    <div class="write-area">
        <i class="fas fa-image" style="font-size: 24px; color: #888; cursor: pointer;" onclick="triggerBtn('رفع صور')"></i>
        <input type="text" id="mainInp" class="msg-input" placeholder="اكتب رسالتك الآن...">
        <i class="fas fa-paper-plane" style="font-size: 24px; color: #333; cursor: pointer;" onclick="pushMsg()"></i>
    </div>
</div>

<div id="pModal" class="profile-modal">
    <div class="profile-card">
        <div class="p-header">تعديل الملف الشخصي</div>
        <div class="p-body">
            <label>اسم المستخدم:</label>
            <input type="text" id="newName" placeholder="أدخل اسمك الجديد">
            <label>تغيير لون خلفية الاسم:</label>
            <input type="color" id="nameColor" value="#000000">
            <label>الحالة (Status):</label>
            <input type="text" id="newStatus" placeholder="ماذا يدور في ذهنك؟">
            <label>المعلومات الشخصية:</label>
            <textarea id="newInfo" placeholder="اكتب نبذة عنك..."></textarea>
            <label>رابط الصورة الشخصية:</label>
            <input type="text" id="newAvLink" placeholder="ضع رابط الصورة هنا">
            
            <button class="gold-btn" onclick="saveProfile()">حفظ التعديلات 💾</button>
            <button onclick="closeProfile()" style="margin-top:5px; background:none; border:none; color:red; cursor:pointer;">إلغاء</button>
        </div>
    </div>
</div>

<script>
    let myData = { name: "الملك", color: "linear-gradient(45deg, #000, #c0392b)", avatar: "https://i.pravatar.cc/150?u=king" };

    function enterApp() {
        const n = document.getElementById('regName').value;
        if(n) {
            myData.name = n;
            document.getElementById('dispNameStrip').innerText = n;
        }
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
        pushMsg("دخل الملك الساحة! النسخة النهائية مفعلة 👑");
    }

    function pushMsg(txt = null) {
        const inp = document.getElementById('mainInp');
        const val = txt || inp.value;
        if(!val) return;
        const box = document.getElementById('chatBox');
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.innerHTML = `
            <img src="${myData.avatar}" class="user-avatar">
            <i class="fas fa-trophy cup-icon"></i>
            <div class="name-strip" style="background: ${myData.color}">${myData.name}</div>
            <div class="msg-text">${val}</div>
        `;
        box.appendChild(row);
        inp.value = "";
        box.scrollTop = box.scrollHeight;
    }

    function openProfile() { document.getElementById('pModal').style.display = 'flex'; }
    function closeProfile() { document.getElementById('pModal').style.display = 'none'; }

    function saveProfile() {
        const n = document.getElementById('newName').value;
        const c = document.getElementById('nameColor').value;
        const av = document.getElementById('newAvLink').value;
        
        if(n) { myData.name = n; document.getElementById('dispNameStrip').innerText = n; }
        if(c) { myData.color = c; }
        if(av) { myData.avatar = av; document.getElementById('dispAv').src = av; document.getElementById('msgAv').src = av; }
        
        closeProfile();
        pushMsg("تم تحديث بروفايلي الملكي بنجاح ✅");
    }

    function gift(type) {
        const user = prompt("أدخل اسم العضو المهدى إليه:");
        if(user) pushMsg(`قام الملك بإهداء [${type}] إلى العضو [${user}] 🎁`);
    }

    function triggerBtn(name) {
        alert("تم تفعيل ميزة: " + name + " بنجاح. النظام جاهز لاستقبال الأعضاء.");
    }

    document.getElementById('mainInp').onkeypress = (e) => { if(e.key === 'Enter') pushMsg(); };
</script>

</body>
            </html>
