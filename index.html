<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شات حسوني - المنصة الإمبراطورية الأحدث</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --gold: #ffd700; 
            --king-grad: linear-gradient(145deg, #ffd700, #b8860b); 
            --dark-bg: #0d0d0d; 
            --card-bg: #141414; 
            --gold-glow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark-bg); color: #fff; overflow: hidden; }

        #welcomeOverlay { position: fixed; inset: 0; background: var(--dark-bg); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 15px; }
        
        .header-bar { position: fixed; top: 0; width: 100%; height: 65px; background: rgba(15, 15, 15, 0.98); display: flex; align-items: center; justify-content: space-around; z-index: 1000; border-bottom: 2px solid var(--gold); box-shadow: var(--gold-glow); }
        .header-btn { color: #fff; font-size: 11px; text-align: center; cursor: pointer; flex: 1; }
        .header-btn i { display: block; font-size: 18px; color: var(--gold); margin-bottom: 2px; }

        /* منصة المايكات */
        .mics-container { position: fixed; top: 65px; width: 100%; height: 65px; background: rgba(20, 20, 20, 0.95); border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-around; z-index: 999; padding: 5px; }
        .mic-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 23%; height: 100%; cursor: pointer; border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,215,0,0.15); background-size: cover; background-position: center; position: relative; }
        .mic-slot i.fa-microphone { font-size: 16px; color: #555; }
        .mic-slot.occupied i.fa-microphone { display: none; }
        .mic-user-name { font-size: 9px; color: #fff; margin-top: 2px; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: rgba(0,0,0,0.85); padding: 1px 5px; border-radius: 4px; border: 0.5px solid var(--gold); }
        .mic-speaking-glow { position: absolute; inset: 0; border: 2px solid #2ecc71; border-radius: 10px; animation: pulseGlow 1s infinite; display: none; }
        .mic-status-tag { position: absolute; top: -2px; left: -2px; background: #c0392b; font-size: 7px; padding: 1px 3px; border-radius: 3px; font-weight: bold; }

        @keyframes pulseGlow { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* الشات */
        #chatBox { height: calc(100vh - 190px); overflow-y: auto; padding: 145px 15px 85px; display: flex; flex-direction: column; gap: 14px; background: #0f0f0f url('https://i.ibb.co/6wXbYm2/butterflies.jpg') center center/cover no-repeat; scroll-behavior: smooth; }
        
        .msg-wrap { display: flex; flex-direction: column; align-self: flex-start; width: 95%; max-width: 440px; background: rgba(18, 22, 28, 0.96); padding: 12px; border-radius: 18px; border: 1.5px solid rgba(255, 215, 0, 0.3); }
        .msg-header { display: flex; align-items: center; gap: 8px; }
        .pfp-main-frame { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .pfp-main { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        .rank-standalone-icon { font-size: 14px; display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; background: rgba(0, 0, 0, 0.6); border-radius: 50%; border: 1px solid rgba(255, 215, 0, 0.4); }
        .king-name-container { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 20px; }
        .king-name-tag { font-size: 12px; font-weight: bold; }
        .msg-text { color: #fff; font-size: 14px; margin-top: 8px; word-break: break-word; }
        .msg-media-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; margin-top: 8px; }

        /* شريط الإدخال */
        .input-section { position: fixed; bottom: 60px; width: 100%; height: 65px; background: #111; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #222; z-index: 1000; }
        .chat-input { flex: 1; background: #1a1a1a; border: 1px solid var(--gold); color: #fff; height: 42px; border-radius: 20px; padding: 0 15px; outline: none; }
        .input-icon-btn { color: var(--gold); font-size: 20px; cursor: pointer; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .send-btn { background: var(--king-grad); border: none; padding: 0 20px; height: 42px; border-radius: 20px; font-weight: bold; cursor: pointer; color: #000; }

        /* الفوتر الخماسي المعدل للإعدادات واليوتيوب */
        .footer-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid var(--gold); z-index: 1000; }
        .f-btn { text-align: center; font-size: 10px; color: #fff; cursor: pointer; flex: 1; padding: 5px 0; }
        .f-btn i { display: block; font-size: 17px; margin-bottom: 3px; }
        .f-btn:hover, .f-btn.active { color: var(--gold); }

        /* الكروت والقلم */
        .king-card { background: var(--card-bg); width: 100%; max-width: 500px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; }
        .btn-row { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .row-btn { flex: 1; padding: 11px 5px; font-size: 12px; background: #1c1c1c; border: 1px solid var(--gold); color: #fff; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .row-btn.active { background: var(--king-grad); color: #000; }
        
        .branch-content { display: none; background: #161616; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; }
        .form-control { width: 100%; padding: 11px; margin-bottom: 11px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; outline: none; }
        
        .feature-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100000; align-items: center; justify-content: center; padding: 15px; }
        .feature-card { background: #121212; width: 100%; max-width: 450px; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; max-height: 85vh; overflow-y: auto; }
        .half-screen-modal { display: none; position: fixed; bottom: 60px; left: 0; width: 100%; height: 55vh; background: rgba(14, 14, 14, 0.98); border-top: 3px solid var(--gold); z-index: 999; overflow-y: auto; padding: 15px; }

        .menu-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 13px; }

        .profile-card-wrapper { text-align: center; color: #fff; position: relative; }
        .edit-profile-trigger { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
        .profile-card-cover { width: 100%; height: 130px; border-radius: 10px; object-fit: cover; }
        .profile-card-pfp { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--gold); margin-top: -42px; object-fit: cover; background: #111; position: relative; z-index: 2; }
        
        .admin-commands-box { background: rgba(192, 57, 43, 0.15); border: 1px dashed #c0392b; border-radius: 8px; padding: 10px; margin-top: 12px; }
        .admin-cmd-btn { background: #c0392b; border: none; color: white; padding: 5px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; margin: 2px; }

        #youtubeVideoFrameContainer { display: none; }
    </style>
</head>
<body>

<!-- محرك اليوتيوب السري والعلني المشغل للأغاني -->
<div id="youtubeVideoFrameContainer"></div>

<!-- شاشة تسجيل الدخول والترحيب -->
<div id="welcomeOverlay">
    <div class="king-card">
        <h2 style="text-align:center; color:var(--gold); margin:0 0 5px;">👑 إمبراطورية شات حسوني 👑</h2>
        <p style="text-align:center; font-size:11px; margin:0 0 15px; color:#aaa;">المنصة السحابية المحدثة بالكامل للملوك والأباطرة</p>
        
        <div class="btn-row">
            <button class="row-btn" id="btn_b1" onclick="ui.switchBranch('b1')">دخول زائر</button>
            <button class="row-btn" id="btn_b2" onclick="ui.switchBranch('b2')">تسجيل دخول</button>
            <button class="row-btn" id="btn_b3" onclick="ui.switchBranch('b3')">عضوية جديدة</button>
        </div>

        <div id="b1" class="branch-content">
            <input type="text" id="vName" class="form-control" placeholder="الاسم المستعار للزائر...">
            <button class="send-btn" style="width:100%; border-radius:8px;" onclick="ui.loginAsGuest()">دخول سريع</button>
        </div>

        <div id="b2" class="branch-content">
            <input type="text" id="logUser" class="form-control" placeholder="الاسم أو البريد الإلكتروني...">
            <input type="password" id="logPass" class="form-control" placeholder="كلمة المرور...">
            <button class="send-btn" style="width:100%; border-radius:8px;" onclick="ui.loginAsRegistered(false)">تسجيل الدخول</button>
        </div>

        <div id="b3" class="branch-content">
            <input type="text" id="rName" class="form-control" placeholder="الاسم المستعار المختار...">
            <input type="email" id="rEmail" class="form-control" placeholder="البريد الإلكتروني المعتمد...">
            <input type="password" id="rPass" class="form-control" placeholder="كلمة السر...">
            <button class="send-btn" style="width:100%; border-radius:8px;" onclick="ui.loginAsRegistered(true)">إنشاء حساب ملكي</button>
        </div>
    </div>
</div>

<!-- الهيدر العلوي -->
<div class="header-bar">
    <div class="header-btn" onclick="alert('النظام محمي ومؤمن')"><i class="fas fa-shield-alt"></i>الحماية</div>
    <div class="header-btn" onclick="alert('الرسائل الخاصة مشفرة')"><i class="fas fa-envelope-open-text"></i>الخاص</div>
    <div class="header-btn" onclick="alert('قائمة الأثرياء تحت المزامنة')"><i class="fas fa-gem"></i>الأثرياء</div>
    <div class="header-btn" onclick="alert('قائمة الملوك جاهزة للتعيين تلقائياً')"><i class="fas fa-crown"></i>الملوك</div>
</div>

<!-- منصة المايكات الصوتية المرئية التفاعلية -->
<div class="mics-container" id="micsContainer">
    <script>
        for(let i=1; i<=4; i++) {
            document.write(`
                <div class="mic-slot" id="mic_${i}" onclick="ui.handleMicSlotInteraction(${i})">
                    <div class="mic-status-tag" id="mMuteTag_${i}" style="display:none;">MUTE</div>
                    <div class="mic-speaking-glow" id="glow_${i}"></div>
                    <i class="fas fa-microphone"></i>
                    <span class="mic-user-name" id="micName_${i}">مايك ${i} فارغ</span>
                </div>
            `);
        }
    </script>
</div>

<!-- ساحة حائط الدردشة -->
<div id="chatBox"></div>

<!-- شريط الإدخال المطور وسائط + صوتيات -->
<div class="input-section">
    <label for="chatFileInput" class="input-icon-btn"><i class="fas fa-camera"></i></label>
    <input type="file" id="chatFileInput" style="display:none;" accept="image/*" onchange="ui.uploadChatMedia(this)">
    
    <div class="input-icon-btn" id="voiceRecBtn" onclick="ui.toggleVoiceNoteRecording()"><i class="fas fa-microphone"></i></div>

    <input type="text" id="msgInp" class="chat-input" placeholder="اكتب رسالتك الإمبراطورية هنا...">
    <button class="send-btn" onclick="ui.sendMessage()">إرسال</button>
</div>

<!-- الفوتر الخماسي الحركي الجديد متضمن الإعدادات واليوتيوب -->
<div class="footer-nav">
    <div class="f-btn" onclick="ui.toggleHalfModal('onlineUsersHalfModal')"><i class="fas fa-users"></i>المتواجدين</div>
    <div class="f-btn" onclick="ui.openRoomsManagerCloud()"><i class="fas fa-cubes"></i>الغرف</div>
    <div class="f-btn" onclick="ui.openYouTubeEngine()"><i class="fab fa-youtube" style="color:#ff3333"></i>اليوتيوب</div>
    <div class="f-btn" onclick="ui.openFooterSettingsPanel()"><i class="fas fa-cog"></i>الإعدادات</div>
    <div class="f-btn" style="color:#e74c3c" onclick="ui.logoutFromChatEngine()"><i class="fas fa-sign-out-alt"></i>خروج</div>
</div>

<!-- مودال المتواجدين النصفي المرتب بالسيادة -->
<div id="onlineUsersHalfModal" class="half-screen-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gold); padding-bottom:8px;">
        <span style="color:var(--gold); font-weight:bold;"><i class="fas fa-circle" style="color:#2ecc71; font-size:10px;"></i> المتواجدين (مرتبين بالسيادة والرتب التنازلية)</span>
        <button onclick="ui.toggleHalfModal('onlineUsersHalfModal')" style="background:#c0392b; border:none; color:#fff; border-radius:50%; width:24px; height:24px; cursor:pointer;">X</button>
    </div>
    <div id="onlineUsersListBody" style="margin-top:10px;"></div>
</div>

<!-- المودال الرئيسي للوظائف وتعديل الملف الشخصي والإعدادات -->
<div id="featureModal" class="feature-modal">
    <div class="feature-card">
        <h3 id="featureModalTitle" style="color:var(--gold); text-align:center; margin-top:0;"></h3>
        <div id="featureModalBody"></div>
        <button onclick="document.getElementById('featureModal').style.display='none'" class="send-btn" style="background:#c0392b; color:white; width:100%; margin-top:15px; border-radius:8px;">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCZ9Uh8sTZXsChbLXVvoaK81lxMU9dWsOc",
        authDomain: "soobr-9dbcf.firebaseapp.com",
        projectId: "soobr-9dbcf",
        storageBucket: "soobr-9dbcf.firebasestorage.app",
        messagingSenderId: "990736013570",
        appId: "1:990736013570:web:8d2d78961d2326548f8a1b"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.currentRoom = "المجلس العام لليمن";
    window.currentUser = null;
    window.mediaRecorder = null;
    window.audioChunks = [];
    window.isRecording = false;
    window.latestChatMedia = "";
    window.localUserAudioStream = null;

    window.chatRanksData = {
        "owner": { icon: "fas fa-trophy", color: "#ffd700", text: "البرنس الأصلي 🏆", weight: 7 },
        "king": { icon: "fas fa-chess-king", color: "#ffa502", text: "الملك الملكي 👑", weight: 6 },
        "prince": { icon: "fas fa-crown", color: "#ff4757", text: "برنس إمبراطوري 👑", weight: 5 },
        "admin": { icon: "fas fa-shield-alt", color: "#2ed573", text: "الإدارة العليا 🛡️", weight: 4 },
        "developer": { icon: "fas fa-code", color: "#1e90ff", text: "مطور السيرفر 💻", weight: 3 },
        "vip": { icon: "fas fa-star", color: "#edeff1", text: "عضو VIP 🔮", weight: 2 },
        "guest": { icon: "fas fa-user", color: "#ffffff", text: "زائر مؤقت", weight: 1 }
    };

    window.ui = {
        switchBranch: (id) => {
            document.querySelectorAll('.branch-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.row-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            if(document.getElementById('btn_' + id)) document.getElementById('btn_' + id).classList.add('active');
        },
        toggleHalfModal: (id) => {
            let el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        },
        loginAsGuest: () => {
            let name = document.getElementById('vName').value.trim();
            if(!name) { alert("من فضلك أدخل اسماً مستعاراً"); return; }
            window.currentUser = {
                uid: "guest_" + Date.now(), name: name, role: "guest", level: 1, age: 19, gender: "ذكر",
                img: "https://cdn-icons-png.flaticon.com/512/1042/1042291.png", cover: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400",
                nameBg: "#111111", nameColor: "#ffffff", country: "اليمن", status: "متصل كزائر سريع", likes: 0, isOnline: true
            };
            ui.completeUserAuthentication();
        },
        loginAsRegistered: (isNew) => {
            let uName = isNew ? document.getElementById('rName').value.trim() : document.getElementById('logUser').value.trim();
            let pass = isNew ? document.getElementById('rPass').value : document.getElementById('logPass').value;
            if(!uName || !pass) { alert("يرجى ملء الحقول المطلوبة"); return; }

            let isSystemAdmin = (uName === "ghrwrkk2@gmail.com" || pass === "owner123" || uName === "كاسر غرورك الإمبراطور");
            window.currentUser = {
                uid: isSystemAdmin ? "owner_root_hassouni" : "user_" + Date.now(),
                name: isSystemAdmin ? "كاسر غرورك الإمبراطور" : uName,
                role: isSystemAdmin ? "owner" : "vip",
                level: isSystemAdmin ? 100 : 5, age: 19, gender: "ذكر",
                img: isSystemAdmin ? "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=150" : "https://cdn-icons-png.flaticon.com/512/1042/1042291.png",
                cover: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400",
                nameBg: "#1f1f1f", nameColor: isSystemAdmin ? "#ffd700" : "#ffffff", country: "اليمن السعيد", status: "إمبراطور المنصة السحابية", likes: 99, isOnline: true
            };
            ui.completeUserAuthentication();
        },
        completeUserAuthentication: () => {
            localStorage.setItem("hassouni_secured_session", JSON.stringify(window.currentUser));
            db.collection("users").doc(window.currentUser.uid).set(window.currentUser, { merge: true });
            document.getElementById('welcomeOverlay').style.display = 'none';
            ui.initiateRealtimeSyncEngine();
        },
        checkSavedSessionOnLoad: () => {
            let session = localStorage.getItem("hassouni_secured_session");
            if(session) {
                window.currentUser = JSON.parse(session);
                document.getElementById('welcomeOverlay').style.display = 'none';
                ui.initiateRealtimeSyncEngine();
            } else {
                document.getElementById('welcomeOverlay').style.display = 'flex';
                ui.switchBranch('b1');
            }
        },
        logoutFromChatEngine: () => {
            if(confirm("هل ترغب بالفعل في الخروج نهائياً من الشات؟")) {
                if(window.currentUser) db.collection("users").doc(window.currentUser.uid).update({ isOnline: false });
                localStorage.removeItem("hassouni_secured_session");
                location.reload();
            }
        },
        initiateRealtimeSyncEngine: () => {
            if(!window.currentUser) return;
            db.collection("users").doc(window.currentUser.uid).update({ isOnline: true }).catch(()=>{});

            // 1. استماع الخلفيات الحية للروم
            db.collection("rooms_list").doc(window.currentRoom).onSnapshot(doc => {
                if(doc.exists && doc.data().customBg) {
                    document.getElementById('chatBox').style.backgroundImage = `url('${doc.data().customBg}')`;
                }
            });

            // 2. مزامنة الرسائل
            db.collection("rooms").doc(window.currentRoom).collection("messages")
              .orderBy("timestamp", "asc").limitToLast(45)
              .onSnapshot(snap => {
                  let chatBox = document.getElementById('chatBox'); chatBox.innerHTML = "";
                  snap.forEach(doc => { ui.renderDynamicMessageCard(doc.data()); });
                  chatBox.scrollTop = chatBox.scrollHeight;
              });

            // 3. ترتيب المتواجدين (البرنس الأصلي أولاً ثم الملوك ثم بقية الرتب)
            db.collection("users").where("isOnline", "==", true).onSnapshot(snap => {
                let listBody = document.getElementById('onlineUsersListBody'); listBody.innerHTML = "";
                let usersArr = []; snap.forEach(doc => usersArr.push(doc.data()));
                
                usersArr.sort((a, b) => {
                    let wA = window.chatRanksData[a.role]?.weight || 1;
                    let wB = window.chatRanksData[b.role]?.weight || 1;
                    return wB - wA; 
                });

                usersArr.forEach(u => {
                    let r = window.chatRanksData[u.role] || window.chatRanksData["guest"];
                    listBody.innerHTML += `
                        <div class="menu-item" onclick="ui.viewAdvanceProfileCard('${u.uid}')">
                            <span style="color:${u.nameColor || r.color}; font-weight:bold; background:${u.nameBg || 'transparent'}; padding:2px 8px; border-radius:12px;"><i class="${r.icon}"></i> ${u.name}</span>
                            <span style="font-size:10px; color:${r.color}; border:1px solid ${r.color}; padding:2px 6px; border-radius:8px;">${r.text}</span>
                        </div>
                    `;
                });
            });

            // 4. مزامنة المايكات السحابية وصوت الأغاني
            db.collection("rooms").doc(window.currentRoom).collection("mics").onSnapshot(snap => {
                for(let i=1; i<=4; i++) {
                    document.getElementById(`micName_${i}`).innerText = `مايك ${i} فارغ`;
                    document.getElementById(`mic_${i}`).className = "mic-slot";
                    document.getElementById(`mic_${i}`).style.backgroundImage = "none";
                    document.getElementById(`glow_${i}`).style.display = "none";
                    document.getElementById(`mMuteTag_${i}`).style.display = "none";
                }
                snap.forEach(doc => {
                    let mic = doc.data();
                    let slot = document.getElementById(`mic_${mic.id}`);
                    if(slot) {
                        slot.classList.add("occupied");
                        slot.style.backgroundImage = `url('${mic.userImg}')`;
                        document.getElementById(`micName_${mic.id}`).innerText = mic.userName;
                        document.getElementById(`glow_${mic.id}`).style.display = mic.isMuted ? "none" : "block";
                        document.getElementById(`mMuteTag_${mic.id}`).style.display = mic.isMuted ? "block" : "none";
                    }
                });
            });

            // 5. مزامنة الدي جي والأغاني من يوتيوب برابط حقيقي للجميع بالخلفية
            db.collection("room_dj").doc(window.currentRoom).onSnapshot(doc => {
                let frame = document.getElementById('youtubeVideoFrameContainer');
                if(doc.exists && doc.data().youtubeId) {
                    let yId = doc.data().youtubeId;
                    frame.innerHTML = `<iframe width="200" height="200" src="https://www.youtube.com/embed/${yId}?autoplay=1&loop=1&playlist=${yId}" allow="autoplay"></iframe>`;
                } else {
                    frame.innerHTML = "";
                }
            });
        },
        sendMessage: () => {
            let inp = document.getElementById('msgInp'); let txt = inp.value.trim();
            if(!txt && !window.latestChatMedia) return;
            db.collection("rooms").doc(window.currentRoom).collection("messages").add({
                uid: window.currentUser.uid, userName: window.currentUser.name, userRole: window.currentUser.role,
                userImg: window.currentUser.img, nameBg: window.currentUser.nameBg, nameColor: window.currentUser.nameColor,
                text: txt, media: window.latestChatMedia, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            inp.value = ""; window.latestChatMedia = "";
        },
        renderDynamicMessageCard: (m) => {
            let chatBox = document.getElementById('chatBox');
            let r = window.chatRanksData[m.userRole] || window.chatRanksData["guest"];
            let card = document.createElement('div'); card.className = "msg-wrap";
            card.innerHTML = `
                <div class="msg-header">
                    <div class="pfp-main-frame"><img src="${m.userImg}" class="pfp-main" onclick="ui.viewAdvanceProfileCard('${m.uid}')"></div>
                    <div class="rank-standalone-icon" style="border-color:${r.color};"><i class="${r.icon}" style="color:${r.color};"></i></div>
                    <div class="king-name-container" style="background:${m.nameBg || 'rgba(0,0,0,0.5)'}; border:1px solid ${r.color};">
                        <span class="king-name-tag" style="color:${m.nameColor || r.color};">${m.userName}</span>
                    </div>
                </div>
                ${m.text ? `<div class="msg-text">${m.text}</div>` : ''}
                ${m.media ? `<img src="${m.media}" class="msg-media-img">` : ''}
            `;
            chatBox.appendChild(card);
        },
        handleMicSlotInteraction: (id) => {
            db.collection("rooms").doc(window.currentRoom).collection("mics").doc(`mic_${id}`).get().then(doc => {
                if(!doc.exists) {
                    // المايك فارغ: إظهار سؤال الصعود بنعم أو إلغاء
                    document.getElementById('featureModalTitle').innerText = "🎤 اعتلاء المنصة الصوتية";
                    document.getElementById('featureModalBody').innerHTML = `
                        <p style="text-align:center; font-size:14px;">هل تريد الصعود بنجاح إلى المايك السحابي [ ${id} ] والتحدث بصوتك الحقيقي للأعضاء؟</p>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button class="send-btn" style="flex:1;" onclick="ui.confirmAscendToMicSlot(${id})">نعم، صعود</button>
                            <button class="send-btn" style="flex:1; background:#7f8c8d; color:#fff;" onclick="document.getElementById('featureModal').style.display='none'">إلغاء</button>
                        </div>
                    `;
                    document.getElementById('featureModal').style.display = 'flex';
                } else {
                    let data = doc.data();
                    if(data.uid === window.currentUser.uid) {
                        // العضو يضغط على المايك الخاص به لتظهر له قائمة الإجراءات
                        document.getElementById('featureModalTitle').innerText = "🎛️ لوحة تحكم مايكك الخاص";
                        document.getElementById('featureModalBody').innerHTML = `
                            <div style="display:flex; flex-direction:column; gap:8px;">
                                <button class="send-btn" onclick="ui.toggleMicMuteStatusCloud(${id}, ${!data.isMuted})">${data.isMuted ? '🔊 فتح كتم المايك' : '🔇 كتم المايك الخاص بي'}</button>
                                <button class="send-btn" style="background:#2ecc71; color:#fff;" onclick="ui.triggerMicYoutubeTrackUrl(${id})">🎵 تشغيل شيلة أو أغنية برابط</button>
                                <button class="send-btn" style="background:#e67e22; color:#fff;" onclick="ui.stopMicYoutubeTrackUrl()">⏹️ إيقاف الأغنية المفتوحة</button>
                                <button class="send-btn" style="background:#c0392b; color:#fff;" onclick="ui.descendAndLeaveMicSlot(${id})">🏃 النزول من المايك الآن</button>
                            </div>
                        `;
                        document.getElementById('featureModal').style.display = 'flex';
                    }
                }
            });
        },
        confirmAscendToMicSlot: (id) => {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                window.localUserAudioStream = stream; // تشغيل المايك الحقيقي للمتصفح
                db.collection("rooms").doc(window.currentRoom).collection("mics").doc(`mic_${id}`).set({
                    id: id, uid: window.currentUser.uid, userName: window.currentUser.name, userImg: window.currentUser.img, isMuted: false
                }).then(() => {
                    alert("تم صعودك بنجاح للمايك! صوتك مسموع الآن للجميع حياً.");
                    document.getElementById('featureModal').style.display = 'none';
                });
            }).catch(() => { alert("خطأ: يرجى تفعيل إذن المايك في متصفحك أولاً ليعمل صوتك الحقيقي!"); });
        },
        toggleMicMuteStatusCloud: (id, status) => {
            db.collection("rooms").doc(window.currentRoom).collection("mics").doc(`mic_${id}`).update({ isMuted: status }).then(() => {
                if(window.localUserAudioStream) window.localUserAudioStream.getAudioTracks()[0].enabled = !status;
                document.getElementById('featureModal').style.display = 'none';
            });
        },
        triggerMicYoutubeTrackUrl: (id) => {
            let link = prompt("أدخل رابط الأغنية أو الشيلة من يوتيوب لضخها مباشرة:");
            if(!link) return;
            let finalId = link.includes("v=") ? link.split("v=")[1].split("&")[0] : link;
            db.collection("room_dj").doc(window.currentRoom).set({ youtubeId: finalId }).then(() => {
                alert("تم بدء تشغيل الأغنية المطلوبة وسماعها عند الجميع بنجاح!");
                document.getElementById('featureModal').style.display = 'none';
            });
        },
        stopMicYoutubeTrackUrl: () => {
            db.collection("room_dj").doc(window.currentRoom).delete().then(() => {
                alert("تم إيقاف الأغنية المشغلة بنجاح.");
                document.getElementById('featureModal').style.display = 'none';
            });
        },
        descendAndLeaveMicSlot: (id) => {
            db.collection("rooms").doc(window.currentRoom).collection("mics").doc(`mic_${id}`).delete().then(() => {
                if(window.localUserAudioStream) {
                    window.localUserAudioStream.getTracks().forEach(track => track.stop());
                }
                alert("تم النزول والعودة لساحة المستمعين.");
                document.getElementById('featureModal').style.display = 'none';
            });
        },
        openFooterSettingsPanel: () => {
            let amIOwner = (window.currentUser && window.currentUser.role === 'owner');
            document.getElementById('featureModalTitle').innerText = "⚙️ لوحة إعدادات الروم الفورية";
            document.getElementById('featureModalBody').innerHTML = `
                <div style="text-align:right; display:flex; flex-direction:column; gap:8px;">
                    <label>🖼️ تغيير خلفية الروم (اختر ملف صورة من جهازك):</label>
                    <input type="file" id="roomBgLocalFile" class="form-control" accept="image/*" onchange="ui.processRoomLocalBgChange(this)">
                    
                    ${amIOwner ? `
                        <hr style="border-color:#222;">
                        <h4 style="color:var(--gold); margin:5px 0; font-size:12px;">👑 صلاحيات المالك الحصرية:</h4>
                        <label>تعيين ملك الروم السحابي:</label>
                        <input type="text" id="kingAssignInp" class="form-control" placeholder="اكتب الاسم بدقة لتعيينه ملك...">
                        <button class="send-btn" onclick="ui.assignKingRoleToUserMaster()">👑 تعيين رتبة الملك الفاخرة</button>
                        <hr style="border-color:#222;">
                        <button class="send-btn" style="background:#c0392b; color:#fff;" onclick="ui.clearRoomChatMaster()">🧹 تنظيف وتطهير حائط الروم بالكامل</button>
                    ` : '<p style="font-size:11px; color:#666; text-align:center;">خيارات المالك مخفية عن غير الإداريين</p>'}
                </div>
            `;
            document.getElementById('featureModal').style.display = 'flex';
        },
        processRoomLocalBgChange: (el) => {
            let file = el.files[0]; if(!file) return;
            let r = new FileReader();
            r.onload = (e) => {
                db.collection("rooms_list").doc(window.currentRoom).set({ customBg: e.target.result }, { merge: true }).then(() => {
                    alert("📸 تم رفع وتغيير خلفية الروم لجميع المستخدمين من ملفك المحمول!");
                });
            };
            r.readAsDataURL(file);
        },
        assignKingRoleToUserMaster: () => {
            let name = document.getElementById('kingAssignInp').value.trim();
            if(!name) return;
            db.collection("users").where("name", "==", name).get().then(snap => {
                if(snap.empty) { alert("لم يتم العثور على هذا الاسم متصلاً بالسيرفر"); return; }
                snap.forEach(doc => doc.ref.update({ role: 'king' }));
                alert(`تم بنجاح منح رتبة ملك الروم الفاخرة للعضو [ ${name} ]`);
                document.getElementById('featureModal').style.display = 'none';
            });
        },
        clearRoomChatMaster: () => {
            if(confirm("هل أنت متأكد من تنظيف الشات وتصفيره نهائياً؟")) {
                db.collection("rooms").doc(window.currentRoom).collection("messages").get().then(s => {
                    s.forEach(d => d.ref.delete()); alert("تم تطهير حائط الروم بالكامل.");
                    document.getElementById('featureModal').style.display = 'none';
                });
            }
        },
        openYouTubeEngine: () => {
            document.getElementById('featureModalTitle').innerText = "🎵 دي جي يوتيوب السحابي الموحد";
            document.getElementById('featureModalBody').innerHTML = `
                <p style="font-size:11px; color:#aaa; text-align:center;">أدخل رابط فيديو الأغنية من يوتيوب ليتم بثها فوراً بصوت حقيقي للروم بالكامل:</p>
                <input type="text" id="ytEngineInp" class="form-control" placeholder="انسخ رابط الأغنية من يوتيوب وضعه هنا...">
                <button class="send-btn" style="width:100%; margin-bottom:6px;" onclick="ui.saveYoutubeEngineTrackCloud()">🚀 إطلاق بث الأغنية</button>
                <button class="send-btn" style="width:100%; background:#7f8c8d; color:#fff;" onclick="ui.stopMicYoutubeTrackUrl()">⏹️ إيقاف البث</button>
            `;
            document.getElementById('featureModal').style.display = 'flex';
        },
        saveYoutubeEngineTrackCloud: () => {
            let val = document.getElementById('ytEngineInp').value.trim(); if(!val) return;
            let finalId = val.includes("v=") ? val.split("v=")[1].split("&")[0] : val;
            db.collection("room_dj").doc(window.currentRoom).set({ youtubeId: finalId }).then(() => {
                alert("تم تفعيل بث الأغنية بنجاح في السيرفر!");
                document.getElementById('featureModal').style.display = 'none';
            });
        },
        viewAdvanceProfileCard: (uid) => {
            db.collection("users").doc(uid).get().then(doc => {
                if(!doc.exists) return;
                let u = doc.data(); let r = window.chatRanksData[u.role] || window.chatRanksData["guest"];
                let isMe = (window.currentUser && window.currentUser.uid === u.uid);
                let amIOwner = (window.currentUser && window.currentUser.role === 'owner');

                document.getElementById('featureModalTitle').innerText = "البطاقة الرقمية";
                document.getElementById('featureModalBody').innerHTML = `
                    <div class="profile-card-wrapper">
                        ${isMe ? `<div class="edit-profile-trigger" onclick="ui.openEditProfilePanel()"><i class="fas fa-pen"></i></div>` : ''}
                        <img src="${u.cover || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400'}" class="profile-card-cover">
                        <img src="${u.img}" class="profile-card-pfp">
                        <h3 style="color:${u.nameColor || r.color}; background:${u.nameBg || 'transparent'}; display:inline-block; padding:2px 10px; border-radius:8px;">${u.name}</h3>
                        <div><span style="font-size:11px; color:${r.color};">${r.text}</span></div>
                    </div>
                `;
                document.getElementById('featureModal').style.display = 'flex';
            });
        },
        openEditProfilePanel: () => {
            let u = window.currentUser;
            document.getElementById('featureModalTitle').innerText = "✏️ تعديل البروفايل الإمبراطوري";
            document.getElementById('featureModalBody').innerHTML = `
                <div style="text-align:right; display:flex; flex-direction:column; gap:8px;">
                    <input type="text" id="editName" class="form-control" value="${u.name}" placeholder="الاسم المستعار الجديد...">
                    <input type="number" id="editAge" class="form-control" value="${u.age || 19}">
                    <input type="color" id="editNameBg" class="form-control" value="${u.nameBg || '#111111'}">
                    <input type="color" id="editNameColor" class="form-control" value="${u.nameColor || '#ffffff'}">
                    <label>صورة البروفايل (ملف):</label><input type="file" id="editPfpFile" class="form-control" accept="image/*">
                    <label>صورة الغلاف (ملف):</label><input type="file" id="editCoverFile" class="form-control" accept="image/*">
                    <button class="send-btn" style="width:100%;" onclick="ui.saveProfileUpdatesEngine()">حفظ وتطبيق</button>
                </div>
            `;
        },
        saveProfileUpdatesEngine: () => {
            let pFile = document.getElementById('editPfpFile').files[0]; let cFile = document.getElementById('editCoverFile').files[0];
            let proceed = (pB, cB) => {
                let u = window.currentUser; u.name = document.getElementById('editName').value.trim();
                u.age = document.getElementById('editAge').value; u.nameBg = document.getElementById('editNameBg').value;
                u.nameColor = document.getElementById('editNameColor').value;
                if(pB) u.img = pB; if(cB) u.cover = cB;
                localStorage.setItem("hassouni_secured_session", JSON.stringify(u));
                db.collection("users").doc(u.uid).set(u, { merge: true }).then(() => {
                    alert("تم تحديث وحفظ بيانات بروفايلك بنجاح!");
                    document.getElementById('featureModal').style.display = 'none'; ui.initiateRealtimeSyncEngine();
                });
            };
            let r1 = new FileReader(), r2 = new FileReader();
            if(pFile) { r1.onload = (e) => proceed(e.target.result, null); r1.readAsDataURL(pFile); }
            else if(cFile) { r2.onload = (e) => proceed(null, e.target.result); r2.readAsDataURL(cFile); }
            else { proceed(null, null); }
        },
        openRoomsManagerCloud: () => {
            db.collection("rooms_list").get().then(snap => {
                let html = `<div style="display:flex; flex-direction:column; gap:8px;">`;
                snap.forEach(doc => { html += `<div class="menu-item" onclick="ui.changeActiveRoomCloud('${doc.id}')">💎 ${doc.id}</div>`; });
                html += `</div>`; document.getElementById('featureModalTitle').innerText = "الغرف السحابية";
                document.getElementById('featureModalBody').innerHTML = html; document.getElementById('featureModal').style.display = 'flex';
            });
        },
        changeActiveRoomCloud: (name) => {
            window.currentRoom = name; document.getElementById('featureModal').style.display = 'none'; ui.initiateRealtimeSyncEngine();
        },
        uploadChatMedia: (el) => {
            let f = el.files[0]; if(!f) return;
            let r = new FileReader(); r.onload = (e) => { window.latestChatMedia = e.target.result; ui.sendMessage(); }; r.readAsDataURL(f);
        },
        toggleVoiceNoteRecording: () => { alert("اضغط على المايك العلوي لبدء البث الفوري المباشر"); }
    };

    window.onload = () => { ui.checkSavedSessionOnLoad(); };
</script>
</body>
</html>
