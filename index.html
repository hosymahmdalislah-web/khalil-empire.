<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - ملك الموقع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; overflow: hidden; }

        /* شاشة الدخول */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #444, #000); z-index: 100000; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .login-card { background: #fff; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; border: 4px solid var(--gold); text-align: center; }

        /* التطبيق */
        #chatApp { display: none; height: 100vh; flex-direction: column; background-color: #1a1a1a; }
        
        /* الشريط العلوي */
        .top-navbar { height: 70px; background: #000; display: flex; align-items: center; justify-content: space-around; border-bottom: 1px solid #333; }
        .nav-item { color: #fff; text-align: center; cursor: pointer; flex: 1; font-size: 10px; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; color: var(--gold); }

        /* منطقة الشات */
        .chat-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        
        /* تصميم الرسالة الملكي */
        .msg-bubble { align-self: flex-start; max-width: 90%; display: flex; flex-direction: column; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        
        /* أيقونة الرتبة الدائرية القابلة للتغيير */
        .rank-icon { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; background: #fff; }
        .rank-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .trophy-icon { color: var(--gold); font-size: 18px; filter: drop-shadow(0 0 2px #000); }
        .user-name-box { background: #000; color: var(--gold); padding: 3px 15px; border-radius: 20px; border: 1.5px solid var(--gold); font-weight: bold; font-size: 13px; }
        .site-king-tag { color: #fff; background: red; font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; border: 1px solid #fff; }

        .msg-content { background: #fff; color: #000; padding: 12px; border-radius: 0 15px 15px 15px; box-shadow: 3px 3px 10px rgba(0,0,0,0.3); font-weight: 500; }

        /* الشريط السفلي */
        .bottom-panel { height: 70px; background: #fff; display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 3px solid var(--gold); }
        .msg-input { flex: 1; height: 45px; border-radius: 25px; border: 2px solid var(--gold); padding: 0 15px; font-weight: bold; }

        /* النوافذ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: #fff; width: 90%; max-width: 400px; border-radius: 15px; border: 3px solid var(--gold); overflow: hidden; }
        .m-header { background: #000; color: var(--gold); padding: 10px; text-align: center; }
        .m-body { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-action { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 50px; color: gold;"></i>
        <h2>إمبراطورية الشات</h2>
        <input type="text" id="loginName" placeholder="ادخل اسمك الملكي">
        <button class="btn-action" style="width: 100%;" onclick="startApp()">دخول العرش 👑</button>
    </div>
</div>

<div id="chatApp">
    <div class="top-navbar">
        <div class="nav-item" onclick="openProfile()"><i class="fas fa-user-circle"></i>بروفايلي</div>
        <div class="nav-item"><i class="fas fa-gem"></i>الكبار</div>
        <div class="nav-item"><i class="fas fa-crown"></i>الأثرياء</div>
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-power-off"></i>خروج</div>
    </div>

    <div class="chat-view" id="chatBox"></div>

    <div class="bottom-panel">
        <input type="text" id="msgInp" class="msg-input" placeholder="تحدث يا ملك...">
        <i class="fas fa-paper-plane" style="font-size: 25px; color: var(--gold);" onclick="sendMsg()"></i>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="m-header" id="mTitle">تعديل البروفايل</div>
        <div class="m-body" id="mBody"></div>
        <button onclick="closeMod()" style="width:100%; padding:10px; border:none;">إغلاق</button>
    </div>
</div>

<script>
    let user = {
        name: "خليل",
        rankIcon: "https://i.pravatar.cc/150?u=icon", // أيقونة الرتبة الافتراضية
        avatar: "https://i.pravatar.cc/150?u=khalil"
    };

    function startApp() {
        const n = document.getElementById('loginName').value;
        if(n) user.name = n;
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('chatApp').style.display = 'flex';
    }

    function sendMsg() {
        const inp = document.getElementById('msgInp');
        if(!inp.value) return;

        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = 'msg-bubble';
        div.innerHTML = `
            <div class="msg-header">
                <div class="rank-icon"><img src="${user.rankIcon}"></div>
                <i class="fas fa-trophy trophy-icon"></i>
                <div class="user-name-box">${user.name}</div>
                <span class="site-king-tag">ملك الموقع</span>
            </div>
            <div class="msg-content">${inp.value}</div>
        `;
        box.appendChild(div);
        inp.value = "";
        box.scrollTop = box.scrollHeight;
    }

    function openProfile() {
        const body = document.getElementById('mBody');
        body.innerHTML = `
            <label>تغيير الاسم:</label>
            <input type="text" id="editName" value="${user.name}" style="padding:8px; border:1px solid #ccc; border-radius:5px;">
            
            <label>تغيير أيقونة الرتبة (بجانب الكأس):</label>
            <input type="file" onchange="updateRankImg(this)" style="font-size:12px;">
            
            <button class="btn-action" onclick="saveChanges()">حفظ التعديلات ✅</button>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    function updateRankImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                user.rankIcon = e.target.result;
                alert("تم تحديث أيقونة الرتبة بنجاح!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveChanges() {
        user.name = document.getElementById('editName').value;
        closeMod();
    }

    function closeMod() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
        </html>
