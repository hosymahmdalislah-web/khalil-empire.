<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - النسخة الملكية المطورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --king-grad: linear-gradient(180deg, #ffd700, #b8860b); --dark-bg: #000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark-bg); color: #fff; overflow: hidden; transition: 0.5s; }

        /* الهيدر والفوتر */
        .header-bar, .footer-nav { position: fixed; width: 100%; background: rgba(20, 20, 20, 0.98); display: flex; align-items: center; justify-content: space-around; z-index: 1000; border-color: var(--gold); border-style: solid; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .header-bar { top: 0; height: 75px; border-bottom-width: 2px; padding-right: 50px; }
        .footer-nav { bottom: 0; height: 65px; border-top-width: 2px; }
        
        .h-btn, .f-btn { text-align: center; color: #fff; font-size: 10px; cursor: pointer; transition: 0.3s; position: relative; }
        .h-btn:hover, .f-btn:hover { color: var(--gold); transform: scale(1.1); }
        .h-btn i, .f-btn i { display: block; font-size: 20px; margin-bottom: 3px; }

        .room-settings-btn { position: fixed; top: 15px; right: 10px; width: 45px; height: 45px; background: var(--king-grad); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 1100; box-shadow: 0 0 10px var(--gold); border: none; }

        /* منطقة الشات */
        #chatBox { height: calc(100vh - 140px); overflow-y: auto; padding: 90px 15px 120px; display: flex; flex-direction: column; gap: 20px; background-size: cover; background-position: center; }
        
        .msg-wrap { display: flex; flex-direction: column; gap: 5px; align-self: flex-start; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-header { display: flex; align-items: center; gap: 10px; }
        .pfp { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; }
        .name-box { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); padding: 3px 15px; border-radius: 20px; color: var(--gold); font-weight: bold; font-size: 12px; }
        .rank-icon { font-size: 22px; filter: drop-shadow(0 0 5px gold); } /* أيقونة الكأس منفصلة */
        
        .bubble { background: #fff; color: #000; padding: 12px 18px; border-radius: 0 20px 20px 20px; font-size: 14px; box-shadow: 5px 5px 15px rgba(0,0,0,0.2); position: relative; }
        .msg-time { font-size: 9px; color: #888; margin-top: 5px; display: block; text-align: left; }

        /* المودالات الملكية */
        .king-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .king-card { background: #151515; width: 92%; max-width: 400px; border: 2px solid var(--gold); border-radius: 25px; overflow: hidden; position: relative; }
        
        .k-btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; margin: 5px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-gold { background: var(--king-grad); color: #000; }
        .btn-blue { background: #2980b9; color: #fff; }
        .btn-red { background: #c0392b; color: #fff; }

        .input-section { position: fixed; bottom: 65px; width: 100%; background: #111; padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222; }
        .chat-input { flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff; height: 45px; border-radius: 25px; padding: 0 15px; outline: none; }
        
        /* شاشة الخروج */
        #logoutScreen { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="logoutScreen">
    <i class="fas fa-crown" style="font-size: 80px; color: var(--gold); margin-bottom: 20px;"></i>
    <h2>إمبراطورية خليل تودعك</h2>
    <p>تم حفظ عضويتك بنجاح</p>
    <button class="k-btn btn-gold" onclick="location.reload()">العودة للدردشة</button>
</div>

<button class="room-settings-btn" onclick="showRoomMenu()"><i class="fas fa-sliders"></i></button>

<div class="header-bar">
    <div class="h-btn" onclick="showList('الكبار')"><i class="fas fa-crown" style="color:var(--gold)"></i><i class="fas fa-shield-halved" style="color:#3498db; font-size:10px; position:absolute; top:0; right:0;"></i>الكبار</div>
    <div class="h-btn" onclick="showList('الأثرياء')"><i class="fas fa-gem" style="color:#00eeee"></i>الأثرياء</div>
    <div class="h-btn" onclick="showPrivate()"><i class="fas fa-envelope" style="color:#e74c3c"></i>الخاص</div>
    <div class="h-btn" onclick="showWallet()"><i class="fas fa-wallet" style="color:#2ecc71"></i>الأرباح</div>
</div>

<div id="chatBox"></div>

<div class="input-section">
    <i class="fas fa-image" style="color:var(--gold); font-size:24px; cursor:pointer;" onclick="document.getElementById('msgFile').click()"></i>
    <input type="text" id="msgInp" class="chat-input" placeholder="اكتب رسالتك يا إمبراطور...">
    <button class="k-btn btn-gold" onclick="sendMsg()" style="margin:0; width:60px;">إرسال</button>
</div>

<div class="footer-nav">
    <div class="f-btn" onclick="showChoiceModal()"><i class="fas fa-user-circle"></i>بروفايلي</div>
    <div class="f-btn" onclick="showList('المتصلين')"><i class="fas fa-users"></i>المتصلين</div>
    <div class="f-btn" onclick="openYouTube()"><i class="fab fa-youtube" style="color:red"></i>يوتيوب</div>
    <div class="f-btn" onclick="alert('تم تفعيل الزخرفة الملكية')"><i class="fas fa-wand-magic-sparkles"></i>زخرفة</div>
</div>

<div id="modal" class="king-modal"><div class="king-card" id="mContent"></div></div>

<input type="file" id="pfpFile" hidden onchange="updateFile(this, 'img')">
<input type="file" id="coverFile" hidden onchange="updateFile(this, 'cover')">
<input type="file" id="bgFile" hidden onchange="changeRoomBg(this)">
<input type="file" id="msgFile" hidden onchange="uploadMsgImg(this)">

<script>
    let me = JSON.parse(localStorage.getItem('khalil_king_v4')) || {
        name: "خليل إبراهيم",
        img: "https://i.pravatar.cc/150?u=kh",
        cover: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400",
        gold: 15000000,
        status: "إمبراطور خليل - الحاكم الفعلي للمنصة 🏆",
        age: 25,
        rank: "إمبراطور",
        joinDate: "2026/04/17"
    };

    let currentBg = localStorage.getItem('room_bg') || "";

    function save() { 
        localStorage.setItem('khalil_king_v4', JSON.stringify(me)); 
        localStorage.setItem('room_bg', currentBg);
    }

    window.onload = () => {
        if(currentBg) document.getElementById('chatBox').style.backgroundImage = `url(${currentBg})`;
        renderMsg("النظام", "مرحباً بك يا جلالة الإمبراطور خليل. الأوامر الملكية قيد التنفيذ.", "https://cdn-icons-png.flaticon.com/512/1042/1042291.png", true);
    };

    function sendMsg() {
        let t = document.getElementById('msgInp').value;
        if(t.trim()) { renderMsg(me.name, t, me.img, true); document.getElementById('msgInp').value=''; }
    }

    function renderMsg(user, txt, img, isKing) {
        let time = new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        let div = document.createElement('div');
        div.className = 'msg-wrap';
        div.innerHTML = `
            <div class="msg-header">
                <img src="${img}" class="pfp" onclick="viewProfile('${user}', '${img}')">
                <span class="name-box">${user}</span>
                ${isKing ? '<span class="rank-icon">🏆</span>' : ''}
            </div>
            <div class="bubble">${txt} <span class="msg-time">${time}</span></div>
        `;
        let b = document.getElementById('chatBox');
        b.appendChild(div);
        b.scrollTop = b.scrollHeight;
    }

    function showRoomMenu() {
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold); text-align:center;">إعدادات الإمبراطورية</h3>
                <button class="k-btn btn-blue" style="width:100%" onclick="document.getElementById('bgFile').click()">🖼️ تغيير خلفية الغرفة</button>
                <button class="k-btn btn-red" style="width:100%" onclick="document.getElementById('chatBox').innerHTML=''">🗑️ مسح سجل الشات</button>
                <button class="k-btn btn-red" style="width:100%; border:2px solid gold;" onclick="logout()">🚪 خروج (تسجيل خروج)</button>
                <button class="k-btn btn-gold" style="width:100%" onclick="closeM()">إغلاق</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function logout() {
        if(confirm("هل تود الخروج من الشات؟ عضويتك ستبقى محفوظة.")) {
            document.getElementById('logoutScreen').style.display = 'flex';
            document.getElementById('modal').style.display = 'none';
        }
    }

    function showPrivate() {
        let h = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold)"><i class="fas fa-envelope"></i> الرسائل الخاصة</h3>
                <div style="color:#888; text-align:center; padding:20px;">لا توجد رسائل خاصة جديدة حالياً</div>
                <button class="k-btn btn-gold" style="width:100%" onclick="closeM()">عودة</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function showChoiceModal() { viewProfile(me.name, me.img); }

    function viewProfile(name, img) {
        let isMe = (name === me.name);
        let h = `
            <div style="height:120px; background:url(${isMe ? me.cover : ''}) center/cover; background-color:#222;"></div>
            <center>
                <img src="${img}" style="width:90px; height:90px; border-radius:50%; border:3px solid var(--gold); margin-top:-45px; background:#000;">
                <h3 style="color:var(--gold); margin:10px;">${name} ${isMe ? '🏆' : ''}</h3>
            </center>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:15px;">
                <div style="background:#222; padding:10px; border-radius:10px; font-size:12px;"><b>الرتبة:</b> ${isMe ? me.rank : 'عضو'}</div>
                <div style="background:#222; padding:10px; border-radius:10px; font-size:12px;"><b>الذهب:</b> ${isMe ? me.gold.toLocaleString() : '500'}</div>
            </div>
            <div style="padding:10px; text-align:center;">
                <button class="k-btn btn-blue" onclick="closeM(); showPrivate();"><i class="fas fa-comment"></i> خاص</button>
                <button class="k-btn btn-gold" onclick="alert('تم إرسال وردة 🌹')">🌹 وردة</button>
                ${isMe ? `<button class="k-btn btn-gold" style="width:90%" onclick="editProfile()">تعديل بياناتي</button>` : ''}
                <button class="k-btn btn-red" style="width:90%" onclick="closeM()">إغلاق</button>
            </div>`;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    // ... باقي الوظائف (YouTube, File Uploads) تبقى كما هي برمجياً ...
    function openYouTube() { let l = prompt("رابط الفيديو:"); if(l) renderMsg(me.name, `<iframe width="100%" height="180" src="${l.replace('watch?v=','embed/')}" frameborder="0" allowfullscreen></iframe>`, me.img, true); }
    function changeRoomBg(input) { if(input.files[0]) { let r = new FileReader(); r.onload = e => { currentBg = e.target.result; document.getElementById('chatBox').style.backgroundImage = `url(${currentBg})`; save(); }; r.readAsDataURL(input.files[0]); } }
    function uploadMsgImg(input) { if(input.files[0]) { let r = new FileReader(); r.onload = e => renderMsg(me.name, `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`, me.img, true); r.readAsDataURL(input.files[0]); } }
    function showList(t) { alert("قائمة " + t + " قيد التحديث..."); }
    function showWallet() { alert("محفظتك تحتوي على: " + me.gold.toLocaleString() + " ذهبة"); }
</script>

</body>
</html>
