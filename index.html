<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شات حسوني - النسخة الإمبراطورية المحدثة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- مكتبات Firebase المستقرة والمتوافقة -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --gold: #ffd700; 
            --king-grad: linear-gradient(145deg, #ffd700, #b8860b); 
            --dark-bg: #0a0a0a; 
            --card-bg: #121212; 
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark-bg); color: #fff; overflow: hidden; }

        #welcomeOverlay {
            display: flex; 
            position: fixed; 
            inset: 0; 
            background: #0a0a0a; 
            z-index: 9999999; 
            align-items: center; 
            justify-content: center; 
            padding: 15px;
        }

        .header-bar { position: fixed; top: 0; width: 100%; height: 65px; background: rgba(15, 15, 15, 0.98); display: flex; align-items: center; justify-content: space-around; z-index: 1000; border-bottom: 2px solid var(--gold); }
        .header-btn { color: #fff; font-size: 11px; text-align: center; cursor: pointer; flex: 1; }
        .header-btn i { display: block; font-size: 18px; color: var(--gold); margin-bottom: 2px; }

        .mics-container { position: fixed; top: 65px; width: 100%; height: 60px; background: rgba(20, 20, 20, 0.95); border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-around; z-index: 999; padding: 5px; }
        .mic-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 22%; height: 100%; cursor: pointer; border-radius: 8px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,215,0,0.1); background-size: cover; background-position: center; position: relative; }
        .mic-slot i.fa-heart { font-size: 18px; color: #e74c3c; }
        .mic-slot.occupied i.fa-heart { display: none; }
        .mic-slot .mic-user-name { font-size: 10px; color: #fff; margin-top: 2px; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: rgba(0,0,0,0.7); padding: 1px 4px; border-radius: 4px; }
        .mic-speaking-glow { position: absolute; inset: 0; border: 2px solid #2ecc71; border-radius: 8px; animation: pulseGlow 1s infinite; display: none; }
        .mic-status-badge { position: absolute; top: -2px; left: -2px; background: #e74c3c; font-size: 8px; padding: 1px 3px; border-radius: 4px; display: none; }

        @keyframes pulseGlow { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        #chatBox { height: calc(100vh - 190px); overflow-y: auto; padding: 135px 15px 85px; display: flex; flex-direction: column; gap: 12px; background: #0f0f0f url('https://i.ibb.co/6wXbYm2/butterflies.jpg') center center/cover no-repeat; transition: background 0.3s ease; }
        
        .msg-wrap { display: flex; flex-direction: column; align-self: flex-start; width: 95%; max-width: 420px; background: rgba(18, 22, 28, 0.94); padding: 12px; border-radius: 18px; border: 1.5px solid rgba(255, 215, 0, 0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        .msg-header { display: flex; align-items: center; gap: 10px; width: 100%; position: relative; }
        
        .pfp-main-frame { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 8px var(--gold); display: flex; align-items: center; justify-content: center; background: #000; flex-shrink: 0; }
        .pfp-main { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; cursor: pointer; }
        
        .rank-standalone-icon {
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 0, 0.3);
            flex-shrink: 0;
        }

        .king-name-container {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--gold);
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.2);
            cursor: pointer;
        }
        .king-name-tag { font-size: 13px; font-weight: bold; }
        .msg-time { font-size: 10px; color: #888; margin-right: auto; align-self: center; direction: ltr; }
        .msg-text { font-size: 14px; line-height: 1.5; margin-top: 8px; padding-right: 5px; word-break: break-word; text-align: right; }

        .input-section { position: fixed; bottom: 60px; width: 100%; height: 65px; background: #111; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #222; z-index: 1000; }
        .chat-input { flex: 1; background: #1a1a1a; border: 1px solid var(--gold); color: #fff; height: 42px; border-radius: 20px; padding: 0 15px; outline: none; text-align: right; }
        .send-btn { background: var(--king-grad); border: none; padding: 0 20px; height: 42px; border-radius: 20px; font-weight: bold; cursor: pointer; color: #000; }

        .footer-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid var(--gold); z-index: 1000; }
        .f-btn { text-align: center; font-size: 10px; color: #fff; cursor: pointer; flex: 1; padding: 5px 0; }
        .f-btn i { display: block; font-size: 16px; margin-bottom: 2px; color: #fff; }

        .king-card { background: var(--card-bg); width: 100%; max-width: 520px; max-height: 95vh; border: 3px solid var(--gold); border-radius: 20px; padding: 20px; overflow-y: auto; box-shadow: 0 0 25px rgba(255, 215, 0, 0.3); display: flex; flex-direction: column; }
        .btn-row { display: flex; justify-content: center; gap: 8px; margin: 15px 0; width: 100%; }
        .row-btn { flex: 1; padding: 11px 5px; font-size: 12px; background: #1c1c1c; border: 1px solid var(--gold); color: #fff; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; }
        .row-btn.active { background: var(--king-grad); color: #000; }
        
        .branch-content { display: none; background: #161616; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; }
        .form-control { width: 100%; padding: 11px; margin-bottom: 11px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; outline: none; text-align: right; }
        .form-select { width: 100%; padding: 11px; margin-bottom: 11px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; text-align: right; }
        .file-input-label { display: block; width: 100%; padding: 11px; margin-bottom: 11px; background: #2a2a2a; border: 1px dashed var(--gold); color: var(--gold); border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; }
        .file-input-hidden { display: none; }

        .feature-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100000; align-items: center; justify-content: center; padding: 15px; }
        .feature-card { background: #121212; width: 100%; max-width: 460px; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; max-height: 85vh; overflow-y: auto; position: relative; }
        .half-screen-modal { display: none; position: fixed; bottom: 60px; left: 0; width: 100%; height: 50vh; background: rgba(14, 14, 14, 0.98); border-top: 3px solid var(--gold); z-index: 999; overflow-y: auto; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }

        .menu-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #fff; justify-content: space-between; }
        .menu-item:hover { background: rgba(255,255,255,0.03); }

        .profile-card-wrapper { text-align: center; color: #fff; position: relative; }
        .profile-card-cover { width: 100%; height: 140px; border-radius: 10px; object-fit: cover; border: 1px solid #333; }
        .profile-card-pfp { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); margin-top: -45px; object-fit: cover; background: #111; position: relative; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .profile-edit-pencil { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); border: 1px solid var(--gold); color: var(--gold); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
        .profile-action-bar { display: flex; background: rgba(255,255,255,0.04); border: 1px solid #333; padding: 10px; border-radius: 8px; justify-content: space-around; margin: 15px 0; align-items: center; }
        .profile-bar-btn { text-align: center; color: #fff; cursor: pointer; font-size: 12px; flex: 1; }
        .profile-bar-btn i { display: block; font-size: 16px; color: var(--gold); margin-bottom: 3px; }
        .profile-details-grid { background: #161616; border: 1px solid #222; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 8px; text-align: right; font-size: 13px; }
        .profile-grid-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.02); padding-bottom: 6px; }
        .profile-grid-row span:first-child { color: #aaa; }
        .profile-grid-row span:last-child { font-weight: bold; }
    </style>
</head>
<body>

<div id="welcomeOverlay">
    <div class="king-card">
        <h2 style="text-align:center; color:var(--gold); margin:0 0 5px;">شات حسوني - النسخة الإمبراطورية</h2>
        <p style="text-align:center; font-size:12px; margin:0 0 10px; color:#aaa;">أهلاً وسهلاً بكم في شات عربي دردشة عربية محمية بالكامل</p>
        
        <div class="btn-row">
            <button class="row-btn" id="btn_b1" onclick="ui.switchBranch('b1')">دخول زائر</button>
            <button class="row-btn" id="btn_b2" onclick="ui.switchBranch('b2')">دخول عضوية</button>
            <button class="row-btn" id="btn_b3" onclick="ui.switchBranch('b3')">سجل الآن</button>
        </div>

        <div id="b1" class="branch-content">
            <input type="text" id="vName" class="form-control" placeholder="الاسم المستعار للزائر (مطلوب)...">
            <select id="vAge" class="form-select">
                <option value="">اختر العمر (مطلوب)...</option>
                <script>
                    for(let i=15; i<=100; i++) { document.write(`<option value="${i}">${i}</option>`); }
                </script>
            </select>
            <select id="vGender" class="form-select">
                <option value="">اختر الجنس (مطلوب)...</option>
                <option value="ذكر">ذكر</option>
                <option value="أنثى">أنثى</option>
            </select>
            <button class="send-btn" style="width:100%; border-radius:8px;" onclick="ui.loginAsGuest()">دخول الآن كـ زائر</button>
        </div>

        <div id="b2" class="branch-content">
            <input type="text" id="logUser" class="form-control" placeholder="الاسم المستعار المسجل...">
            <input type="password" id="logPass" class="form-control" placeholder="كلمة المرور الحالية...">
            <button class="send-btn" style="width:100%; border-radius:8px;" onclick="ui.loginAsRegistered(false)">تسجيل الدخول الفوري</button>
        </div>

        <div id="b3" class="branch-content">
            <input type="text" id="rName" class="form-control" placeholder="الاسم المستعار الجديد...">
            <input type="password" id="rPass" class="form-control" placeholder="كلمة المرور السرية...">
            <button class="send-btn" style="width:100%; border-radius:8px;" onclick="ui.loginAsRegistered(true)">إتمام التسجيل ودخول</button>
        </div>
    </div>
</div>

<div class="header-bar">
    <div class="header-btn" onclick="alert('لا توجد إشعارات جديدة')"><i class="fas fa-bell"></i>إشعارات</div>
    <div class="header-btn" onclick="alert('لوحة البلاغات فارغة')"><i class="fas fa-flag"></i>بلاغات</div>
    <div class="header-btn" onclick="alert('الخاص مشفر ومحمي')"><i class="fas fa-comments"></i>الخاص</div>
    <div class="header-btn" onclick="alert('قائمة الأثرياء ممتلئة بالملوك')"><i class="fas fa-gem"></i>الأثرياء</div>
    <div class="header-btn" onclick="alert('لوحة الكبار تحت الصيانة الملكية')"><i class="fas fa-crown"></i>الكبار</div>
</div>

<div class="mics-container" id="micsContainer">
    <div class="mic-slot" id="mic_1" onclick="ui.clickMicSlot(1)"><div class="mic-status-badge" id="mBadge_1">MUTE</div><div class="mic-speaking-glow" id="glow_1"></div><i class="fas fa-heart"></i><span class="mic-user-name" id="micName_1">مايك 1 فارغ</span></div>
    <div class="mic-slot" id="mic_2" onclick="ui.clickMicSlot(2)"><div class="mic-status-badge" id="mBadge_2">MUTE</div><div class="mic-speaking-glow" id="glow_2"></div><i class="fas fa-heart"></i><span class="mic-user-name" id="micName_2">مايك 2 فارغ</span></div>
    <div class="mic-slot" id="mic_3" onclick="ui.clickMicSlot(3)"><div class="mic-status-badge" id="mBadge_3">MUTE</div><div class="mic-speaking-glow" id="glow_3"></div><i class="fas fa-heart"></i><span class="mic-user-name" id="micName_3">مايك 3 فارغ</span></div>
    <div class="mic-slot" id="mic_4" onclick="ui.clickMicSlot(4)"><div class="mic-status-badge" id="mBadge_4">MUTE</div><div class="mic-speaking-glow" id="glow_4"></div><i class="fas fa-heart"></i><span class="mic-user-name" id="micName_4">مايك 4 فارغ</span></div>
</div>

<div id="chatBox"></div>

<div class="input-section">
    <i class="fas fa-image" style="color:var(--gold); font-size:24px; cursor:pointer;" onclick="alert('المعرض آمن وجاهز للرفع')"></i>
    <input type="text" id="msgInp" class="chat-input" placeholder="اكتب رسالتك العامة هنا بكل حرية...">
    <button class="send-btn" onclick="ui.sendMessage()">إرسال</button>
</div>

<div class="footer-nav">
    <div class="f-btn" onclick="ui.toggleOnlineUsers()"><i class="fas fa-users"></i>المتواجدين</div>
    <div class="f-btn" onclick="ui.openRoomsManager()"><i class="fas fa-door-open"></i>الغرف</div>
    <div class="f-btn" onclick="ui.refreshChatWindowOnly()"><i class="fas fa-sync-alt"></i>تحديث</div>
    <div class="f-btn" id="authBtn" onclick="ui.showAuthBranchDirect()"><i class="fas fa-key" style="color:var(--gold)"></i><span>المفتاح الملكي</span></div>
    <div class="f-btn" onclick="ui.openGlobalSettings()"><i class="fas fa-cogs"></i>الإعدادات</div>
</div>

<div id="onlineUsersHalfModal" class="half-screen-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gold); padding-bottom:5px; margin-bottom:10px;">
        <span style="color:var(--gold); font-weight:bold;"><i class="fas fa-users"></i> قائمة المتواجدين حالياً</span>
        <button onclick="ui.toggleOnlineUsers()" style="background:#c0392b; border:none; color:#fff; border-radius:50%; width:28px; height:28px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center;">X</button>
    </div>
    <div id="onlineUsersListBody"></div>
</div>

<div id="featureModal" class="feature-modal">
    <div class="feature-card">
        <h3 id="featureModalTitle" style="color:var(--gold); text-align:center; margin-top:0;"></h3>
        <div id="featureModalBody"></div>
        <button onclick="document.getElementById('featureModal').style.display='none'" class="send-btn" style="background:#c0392b; color:white; width:100%; margin-top:15px; border-radius:8px;">إغلاق النافذة</button>
    </div>
</div>

<script>
    // تكوين قواعد Firebase المستقرة الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyCZ9Uh8sTZXsChbLXVvoaK81lxMU9dWsOc",
        authDomain: "soobr-9dbcf.firebaseapp.com",
        projectId: "soobr-9dbcf",
        storageBucket: "soobr-9dbcf.firebasestorage.app",
        messagingSenderId: "990736013570",
        appId: "1:990736013570:web:8d2d78961d2326548f8a1b",
        measurementId: "G-P13DV56ZFF"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    window.currentRoom = "العام";
    window.roomsList = ["العام"];
    
    window.chatRanksData = {
        "owner": { icon: "fas fa-trophy", color: "#ffd700", text: "البرنس الأصلي" },
        "prince": { icon: "fas fa-trophy", color: "#aa0000", text: "برنس إمبراطوري" },
        "king": { icon: "fas fa-crown", color: "#FF0000", text: "الملك الملكي" },
        "honor": { icon: "fas fa-crown", color: "#0000FF", text: "تاج الشرف" },
        "admin": { icon: "fas fa-star", color: "#FFD700", text: "إدارة العليا" },
        "developer": { icon: "fas fa-code", color: "#00FF00", text: "مطور السيرفر" },
        "senior_mod": { icon: "fas fa-gem", color: "#00FFFF", text: "مشرف أول" },
        "mod": { icon: "fas fa-star", color: "#C0C0C0", text: "مشرف" },
        "vip": { icon: "fas fa-fire", color: "#FF4500", text: "VIP" },
        "diamond": { icon: "fas fa-gem", color: "#8A2BE2", text: "ماسي" },
        "gold_member": { icon: "fas fa-coins", color: "#DAA520", text: "ذهبي" },
        "silver_member": { icon: "fas fa-medal", color: "#A9A9A9", text: "فضي" },
        "distinguished": { icon: "fas fa-bolt", color: "#FF8C00", text: "متميز" },
        "interactive": { icon: "fas fa-bolt", color: "#FFFF00", text: "متفاعل" },
        "active": { icon: "fas fa-heart", color: "#FF69B4", text: "نشط" },
        "new": { icon: "fas fa-seedling", color: "#32CD32", text: "جديد" },
        "guest": { icon: "fas fa-user", color: "#ffffff", text: "زائر" }
    };

    window.rolesOrder = { 
        "owner": 1, "prince": 2, "king": 3, "honor": 4, "admin": 5, 
        "developer": 6, "senior_mod": 7, "mod": 8, "vip": 9, "diamond": 10, 
        "gold_member": 11, "silver_member": 12, "distinguished": 13, "interactive": 14, 
        "active": 15, "new": 16, "guest": 17 
    };

    window.currentUser = null;
    window.listeners = {};

    function formatMessageTime(timestamp) {
        if (!timestamp) return "";
        let date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        let hours = date.getHours();
        let minutes = date.getMinutes();
        let ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return hours + ':' + minutes + ' ' + ampm;
    }

    window.ui = {
        switchBranch: (id) => {
            document.querySelectorAll('.branch-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.row-btn').forEach(b => b.classList.remove('active'));
            let el = document.getElementById(id);
            if(el) el.style.display = 'block';
            let btn = document.getElementById('btn_' + id);
            if(btn) btn.classList.add('active');
        },
        showAuthBranchDirect: () => {
            document.getElementById('featureModalTitle').innerText = "🔑 المفتاح الملكي السريع";
            document.getElementById('featureModalBody').innerHTML = `
                <div style="text-align:right;">
                    <input type="text" id="kName" class="form-control" placeholder="الاسم المستعار المطلوب...">
                    <input type="password" id="kPass" class="form-control" placeholder="كلمة المرور...">
                    <button class="send-btn" style="width:100%; border-radius:8px;" onclick="ui.executeKeyActivation()">تفعيل ودخول تلقائي برتبة ماسي 💎</button>
                </div>
            `;
            document.getElementById('featureModal').style.display = 'flex';
        },
        executeKeyActivation: () => {
            let n = document.getElementById('kName').value.trim();
            let ps = document.getElementById('kPass').value;
            if(!n || !ps) { alert("يرجى إدخال البيانات كاملة."); return; }
            
            let uid = "u_" + n;
            let userObj = { 
                uid: uid, name: n, role: "diamond", level: 50, password: ps,
                img: "https://cdn-icons-png.flaticon.com/512/1042/1042291.png", nameBg: "rgba(255,215,0,0.05)", nameColor: "#8A2BE2",
                cover: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=400",
                likes: 0, age: 20, gender: "ذكر", country: "اليمن", status: "عضو ماسي ملكي ثابت", isMuted: false, isBanned: false, isOnline: true
            };
            ui.saveAndEnter(userObj);
            document.getElementById('featureModal').style.display = 'none';
        },
        loginAsGuest: () => {
            let n = document.getElementById('vName').value.trim();
            let a = document.getElementById('vAge').value;
            let g = document.getElementById('vGender').value;
            if(!n || !a || !g) { alert("يرجى ملء الحقول المطلوبة!"); return; }
            
            let uid = "g_" + Date.now();
            let userObj = { 
                uid: uid, name: n, role: "guest", level: 1, password: "",
                img: "https://cdn-icons-png.flaticon.com/512/1042/1042291.png", nameBg: "transparent", nameColor: "#ffffff",
                cover: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=400",
                likes: 0, age: a, gender: g, country: "اليمن", status: "زائر عابر في شات حسوني", isMuted: false, isBanned: false, isOnline: true
            };
            ui.saveAndEnter(userObj);
        },
        loginAsRegistered: (isNew) => {
            let userInp = isNew ? document.getElementById('rName').value.trim() : document.getElementById('logUser').value.trim();
            let passInp = isNew ? document.getElementById('rPass').value : document.getElementById('logPass').value;

            if(!userInp || !passInp) { alert("البيانات ناقصة."); return; }
            let uid = "u_" + userInp;

            if(isNew) {
                db.collection("users").doc(uid).get().then(doc => {
                    if(doc.exists) {
                        alert("هذا الاسم مسجل بالفعل! اختر اسماً آخر أو ادخل من خانة الدخول.");
                    } else {
                        let userObj = { 
                            uid: uid, name: userInp, role: "new", level: 1, password: passInp,
                            img: "https://cdn-icons-png.flaticon.com/512/1042/1042291.png", nameBg: "rgba(255,215,0,0.05)", nameColor: "#32CD32",
                            cover: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=400",
                            likes: 0, age: 19, gender: "ذكر", country: "اليمن", status: "متواجد في الروم الإمبراطوري", isMuted: false, isBanned: false, isOnline: true
                        };
                        ui.saveAndEnter(userObj);
                    }
                });
            } else {
                db.collection("users").doc(uid).get().then(doc => {
                    if(doc.exists) {
                        let data = doc.data();
                        if(data.password === passInp) {
                            if(data.isBanned) { alert("هذا الحساب محظور نهائياً."); return; }
                            data.isOnline = true;
                            ui.saveAndEnter(data);
                        } else {
                            alert("كلمة المرور خاطئة المحاولة مجدداً.");
                        }
                    } else {
                        alert("الحساب غير موجود، يرجى التسجيل أولاً.");
                    }
                });
            }
        },
        saveAndEnter: (userObj) => {
            localStorage.setItem("hassouni_uid", userObj.uid);
            window.currentUser = userObj;
            db.collection("users").doc(userObj.uid).set(userObj, { merge: true }).then(() => {
                document.getElementById('welcomeOverlay').style.display = 'none';
                ui.startChatSystem();
            });
        },
        checkSession: () => {
            let savedUid = localStorage.getItem("hassouni_uid");
            if(savedUid) {
                db.collection("users").doc(savedUid).get().then(doc => {
                    if(doc.exists && !doc.data().isBanned) {
                        window.currentUser = doc.data();
                        window.currentUser.isOnline = true;
                        db.collection("users").doc(savedUid).update({ isOnline: true });
                        document.getElementById('welcomeOverlay').style.display = 'none';
                        ui.startChatSystem();
                    } else {
                        ui.showWelcome();
                    }
                }).catch(() => ui.showWelcome());
            } else {
                ui.showWelcome();
            }
        },
        showWelcome: () => {
            document.getElementById('welcomeOverlay').style.display = 'flex';
            ui.switchBranch('b1');
        },
        startChatSystem: () => {
            ui.clearAllListeners();
            ui.listenProfileUpdates();
            ui.listenMessages();
            ui.listenMics();
            ui.listenOnlineUsers();
            ui.listenRooms();
            ui.listenRoomSettings();
            
            // إدارة إخفاء وإظهار زر المفتاح الملكي للزوار فقط
            let authBtn = document.getElementById('authBtn');
            if(authBtn) authBtn.style.display = (window.currentUser.role === 'guest') ? 'block' : 'none';
        },
        clearAllListeners: () => {
            Object.keys(window.listeners).forEach(k => { if(window.listeners[k]) window.listeners[k](); });
            window.listeners = {};
        },
        listenProfileUpdates: () => {
            window.listeners.profile = db.collection("users").doc(window.currentUser.uid).onSnapshot(doc => {
                if(doc.exists) {
                    window.currentUser = doc.data();
                    if(window.currentUser.isBanned) {
                        alert("تم حظرك من السيرفر.");
                        ui.logout();
                    }
                }
            });
        },
        listenMessages: () => {
            let box = document.getElementById('chatBox');
            box.innerHTML = `<div class="msg-wrap"><div class="msg-text" style="color:var(--gold); text-align:center;">🏆 مرحباً بك في النسخة المستقرة والمحمية سحابياً...</div></div>`;
            
            window.listeners.messages = db.collection("rooms").doc(window.currentRoom).collection("messages")
                .orderBy("timestamp", "asc").limitToLast(50)
                .onSnapshot(snap => {
                    box.innerHTML = "";
                    snap.forEach(doc => {
                        let m = doc.data();
                        if(m.user) ui.renderMsg(m.user, m.text, m.timestamp);
                    });
                    box.scrollTop = box.scrollHeight;
                });
        },
        sendMessage: () => {
            if(window.currentUser.isMuted) { alert("أنت مكتوم حالياً من الإدارة العامة."); return; }
            let inp = document.getElementById('msgInp');
            let txt = inp.value.trim();
            if(!txt) return;
            inp.value = "";

            db.collection("rooms").doc(window.currentRoom).collection("messages").add({
                text: txt,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                user: {
                    uid: window.currentUser.uid,
                    name: window.currentUser.name,
                    role: window.currentUser.role,
                    img: window.currentUser.img,
                    nameBg: window.currentUser.nameBg || "transparent",
                    nameColor: window.currentUser.nameColor || "#ffffff"
                }
            });
        },
        renderMsg: (user, text, timestamp) => {
            let div = document.createElement('div');
            div.className = 'msg-wrap';
            let r = window.chatRanksData[user.role] || { icon: "fas fa-user", color: "#fff", text: "عضو" };
            let time = timestamp ? formatMessageTime(timestamp) : formatMessageTime(new Date());

            div.innerHTML = `
                <div class="msg-header">
                    <div class="pfp-main-frame"><img src="${user.img}" class="pfp-main" onclick="ui.viewProfileCard('${user.uid}')"></div>
                    <div class="rank-standalone-icon" style="border-color:${r.color};"><i class="${r.icon}" style="color:${r.color};"></i></div>
                    <div class="king-name-container" style="border-color:${user.nameColor || r.color}; background:${user.nameBg};" onclick="ui.quoteText('${user.name}', '${text}')">
                        <span class="king-name-tag" style="color:${user.nameColor || r.color};">${user.name}</span>
                    </div>
                    <span class="msg-time">${time}</span>
                </div>
                <div class="msg-text">${text}</div>
            `;
            document.getElementById('chatBox').appendChild(div);
        },
        quoteText: (name, text) => {
            let inp = document.getElementById('msgInp');
            inp.value = ` ↩️ [ ${name} ]: "${text}" -> `;
            inp.focus();
        },
        listenMics: () => {
            window.listeners.mics = db.collection("rooms").doc(window.currentRoom).collection("mics").onSnapshot(snap => {
                for(let i=1; i<=4; i++) {
                    let slot = document.getElementById(`mic_${i}`);
                    slot.classList.remove('occupied'); slot.style.backgroundImage = 'none';
                    document.getElementById(`micName_${i}`).innerText = `مايك ${i} فارغ`;
                    document.getElementById(`glow_${i}`).style.display = 'none';
                    document.getElementById(`mBadge_${i}`).style.display = 'none';
                }
                snap.forEach(doc => {
                    let mic = doc.data();
                    let slot = document.getElementById(`mic_${mic.micNum}`);
                    if(slot) {
                        slot.classList.add('occupied');
                        slot.style.backgroundImage = `url('${mic.userImg}')`;
                        document.getElementById(`micName_${mic.micNum}`).innerText = mic.userName;
                        document.getElementById(`glow_${mic.micNum}`).style.display = 'block';
                        document.getElementById(`mBadge_${mic.micNum}`).style.display = mic.isMuted ? 'block' : 'none';
                    }
                });
            });
        },
        clickMicSlot: (num) => {
            window.selectedMicNum = num;
            let slot = document.getElementById(`mic_${num}`);
            if(!slot.classList.contains('occupied')) {
                ui.showModal("🎙️ الصعود إلى المصطبة", `
                    <p style="text-align:center;">هل ترغب في حجز المايك رقم [ ${num} ]؟</p>
                    <button class="send-btn" style="width:100%; margin-top:10px;" onclick="ui.actionMic('up')">صعود فوري</button>
                `);
            } else {
                ui.showModal("🎛️ إدارة المايك الشخصي", `
                    <button class="send-btn" style="width:100%; margin-bottom:8px;" onclick="ui.actionMic('mute')">كتم / إلغاء الكتم</button>
                    <button class="send-btn" style="width:100%; background:#c0392b; color:#fff;" onclick="ui.actionMic('down')">نزول من المايك</button>
                `);
            }
        },
        actionMic: (action) => {
            let num = window.selectedMicNum;
            let docRef = db.collection("rooms").doc(window.currentRoom).collection("mics").doc(`mic_${num}`);
            if(action === 'up') {
                docRef.set({ micNum: num, userId: window.currentUser.uid, userName: window.currentUser.name, userImg: window.currentUser.img, isMuted: false });
            } else if(action === 'down') {
                docRef.delete();
            } else if(action === 'mute') {
                docRef.get().then(doc => { if(doc.exists) docRef.update({ isMuted: !doc.data().isMuted }); });
            }
            document.getElementById('featureModal').style.display = 'none';
        },
        listenOnlineUsers: () => {
            window.listeners.online = db.collection("users").where("isOnline", "==", true).onSnapshot(snap => {
                let list = [];
                snap.forEach(doc => list.push(doc.data()));
                list.sort((a,b) => (window.rolesOrder[a.role] || 99) - (window.rolesOrder[b.role] || 99));

                document.getElementById('onlineUsersListBody').innerHTML = list.map(u => {
                    let r = window.chatRanksData[u.role] || { icon: "fas fa-user", color: "#fff", text: "عضو" };
                    return `
                        <div class="menu-item" onclick="ui.viewProfileCard('${u.uid}')">
                            <span style="color:${u.nameColor || r.color}; background:${u.nameBg || 'transparent'}; padding:2px 6px; border-radius:5px;"><i class="${r.icon}"></i> ${u.name}</span>
                            <span style="font-size:11px; border:1px solid ${r.color}; padding:2px 6px; border-radius:10px; color:${r.color};">${r.text}</span>
                        </div>
                    `;
                }).join('');
            });
        },
        toggleOnlineUsers: () => {
            let el = document.getElementById('onlineUsersHalfModal');
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        },
        viewProfileCard: (uid) => {
            db.collection("users").doc(uid).get().then(doc => {
                if(!doc.exists) return;
                let u = doc.data();
                let isMe = (window.currentUser.uid === uid);
                let isOwner = (window.currentUser.role === 'owner');
                let r = window.chatRanksData[u.role] || { icon: "fas fa-user", color: "#fff", text: "عضو" };

                let editBtn = (isMe || isOwner) && (window.currentUser.role !== 'guest') ? `<div class="profile-edit-pencil" onclick="ui.openEditProfile('${uid}')"><i class="fas fa-pencil-alt"></i></div>` : '';
                let adminBtn = isOwner && !isMe ? `<button class="send-btn" style="width:100%; margin-top:10px; background:red; color:#fff;" onclick="ui.openAdminPanel('${uid}')">⚙️ لوحة الإجراءات الإدارية</button>` : '';

                ui.showModal("الملف الشخصي الملكي", `
                    <div class="profile-card-wrapper">
                        ${editBtn}
                        <img src="${u.cover}" class="profile-card-cover">
                        <img src="${u.img}" class="profile-card-pfp">
                        <h2 style="color:${u.nameColor || r.color}; background:${u.nameBg}; padding:2px 10px; border-radius:10px; margin:5px 0;">${u.name}</h2>
                        <p style="color:${r.color}; font-weight:bold; margin:0;"><i class="${r.icon}"></i> ${r.text}</p>
                        <p style="color:#aaa; font-size:12px; margin:5px 0 10px;">${u.status}</p>
                        <div class="profile-details-grid">
                            <div class="profile-grid-row"><span>العمر:</span><span>${u.age}</span></div>
                            <div class="profile-grid-row"><span>الجنس:</span><span>${u.gender}</span></div>
                            <div class="profile-grid-row"><span>البلد:</span><span>${u.country}</span></div>
                            <div class="profile-grid-row"><span>عدد الإعجابات:</span><span>❤️ ${u.likes || 0}</span></div>
                        </div>
                        <button class="send-btn" style="width:100%; margin-top:10px;" onclick="ui.likeProfile('${u.uid}')">إعطاء لايك ❤️</button>
                        ${adminBtn}
                    </div>
                `);
            });
        },
        likeProfile: (uid) => {
            db.collection("users").doc(uid).update({ likes: firebase.firestore.FieldValue.increment(1) }).then(() => {
                alert("تم تسجيل الإعجاب سحابياً!");
                document.getElementById('featureModal').style.display = 'none';
            });
        },
        openEditProfile: (uid) => {
            db.collection("users").doc(uid).get().then(doc => {
                let u = doc.data();
                ui.showModal("تعديل بيانات الحساب", `
                    <div style="text-align:right; max-height:60vh; overflow-y:auto;">
                        <label>رابط الصورة الشخصية:</label><input type="text" id="eImg" class="form-control" value="${u.img}">
                        <label>رابط صورة الغلاف:</label><input type="text" id="eCover" class="form-control" value="${u.cover}">
                        <label>الحالة الشخصية:</label><input type="text" id="eStatus" class="form-control" value="${u.status}">
                        <label>العمر:</label><input type="number" id="eAge" class="form-control" value="${u.age}">
                        <label>البلد:</label><input type="text" id="eCountry" class="form-control" value="${u.country}">
                        <label>لون خط الاسم:</label><input type="color" id="eColor" class="form-control" value="${u.nameColor || '#ffffff'}">
                        <label>خلفية الاسم (CSS):</label><input type="text" id="eBg" class="form-control" value="${u.nameBg || 'transparent'}" placeholder="مثال: rgba(0,0,0,0.5)">
                        <button class="send-btn" style="width:100%;" onclick="ui.saveProfile('${uid}')">حفظ التعديلات وتثبيتها</button>
                    </div>
                `);
            });
        },
        saveProfile: (uid) => {
            let updated = {
                img: document.getElementById('eImg').value,
                cover: document.getElementById('eCover').value,
                status: document.getElementById('eStatus').value,
                age: document.getElementById('eAge').value,
                country: document.getElementById('eCountry').value,
                nameColor: document.getElementById('eColor').value,
                nameBg: document.getElementById('eBg').value
            };
            db.collection("users").doc(uid).update(updated).then(() => {
                alert("تم تحديث وحفظ بياناتك بنجاح دائم! ✨");
                document.getElementById('featureModal').style.display = 'none';
            });
        },
        openAdminPanel: (uid) => {
            db.collection("users").doc(uid).get().then(doc => {
                let u = doc.data();
                ui.showModal(`إدارة العضو: ${u.name}`, `
                    <div style="text-align:right;">
                        <label>الرتبة الإمبراطورية:</label>
                        <select id="aRole" class="form-select" onchange="db.collection('users').doc('${uid}').update({role:this.value})">
                            ${Object.keys(window.chatRanksData).map(k => `<option value="${k}" ${u.role===k?'selected':''}>${window.chatRanksData[k].text}</option>`).join('')}
                        </select>
                        <button class="send-btn" style="width:100%; margin-top:10px; background:#f39c12; color:#fff;" onclick="db.collection('users').doc('${uid}').update({isMuted:${!u.isMuted}}).then(()=>alert('تم تغيير حالة الكتم'))">${u.isMuted?'🔊 إلغاء الكتم':'🔇 كتم العضو'}</button>
                        <button class="send-btn" style="width:100%; margin-top:8px; background:red; color:#fff;" onclick="db.collection('users').doc('${uid}').update({isBanned:${!u.isBanned}, isOnline:false}).then(()=>alert('تم تغيير حالة الطرد'))">${u.isBanned?'✅ إلغاء الحظر':'🚫 طرد نهائي قطعي'}</button>
                    </div>
                `);
            });
        },
        listenRooms: () => {
            window.listeners.rooms = db.collection("rooms_list").onSnapshot(snap => {
                let list = ["العام"];
                snap.forEach(doc => { if(doc.id !== "العام") list.push(doc.id); });
                window.roomsList = list;
            });
        },
        openRoomsManager: () => {
            let isOwner = (window.currentUser.role === 'owner');
            let createBlock = isOwner ? `
                <div style="margin-bottom:10px; border-bottom:1px dashed var(--gold); padding-bottom:10px;">
                    <input type="text" id="rNewName" class="form-control" placeholder="اسم الغرفة الجديدة...">
                    <button class="send-btn" style="width:100%;" onclick="ui.createRoom()">➕ تثبيت الغرفة سحابياً</button>
                </div>
            ` : '';

            ui.showModal("الغرف السحابية المتاحة", `
                ${createBlock}
                <div style="max-height:50vh; overflow-y:auto;">
                    ${window.roomsList.map(r => `<div class="menu-item" onclick="ui.changeRoom('${r}')">${r} ${window.currentRoom===r?'🏆':''}</div>`).join('')}
                </div>
            `);
        },
        createRoom: () => {
            let name = document.getElementById('rNewName').value.trim();
            if(!name) return;
            db.collection("rooms_list").doc(name).set({ created: true }).then(() => {
                alert("تم بناء الغرفة وتثبيتها بنجاح!");
                document.getElementById('featureModal').style.display = 'none';
            });
        },
        changeRoom: (r) => {
            window.currentRoom = r;
            document.getElementById('featureModal').style.display = 'none';
            ui.startChatSystem();
        },
        listenRoomSettings: () => {
            window.listeners.roomSettings = db.collection("room_settings").doc(window.currentRoom).onSnapshot(doc => {
                if(doc.exists && doc.data().bg) {
                    document.getElementById('chatBox').style.backgroundImage = `url('${doc.data().bg}')`;
                } else {
                    document.getElementById('chatBox').style.backgroundImage = "url('https://i.ibb.co/6wXbYm2/butterflies.jpg')";
                }
            });
        },
        openGlobalSettings: () => {
            let isOwner = (window.currentUser.role === 'owner');
            let ownerSettings = isOwner ? `
                <div style="border-top:1px solid var(--gold); padding-top:10px; margin-top:10px;">
                    <input type="text" id="bgUrlInput" class="form-control" placeholder="رابط صورة خلفية الروم المباشر...">
                    <button class="send-btn" style="width:100%; margin-bottom:8px;" onclick="db.collection('room_settings').doc(window.currentRoom).set({bg:document.getElementById('bgUrlInput').value},{merge:true}).then(()=>alert('تم تغيير الخلفية للجميع!'))">تحديث الخلفية للجميع</button>
                    <button class="send-btn" style="width:100%; background:red; color:#fff;" onclick="if(confirm('تنظيف المحادثة؟')){db.collection('rooms').doc(window.currentRoom).collection('messages').get().then(s=>s.forEach(d=>d.ref.delete()))}">🧹 تنظيف محادثات الروم بالكامل</button>
                </div>
            ` : '';

            ui.showModal("الإعدادات العامة للروم", `
                ${ownerSettings}
                <button class="send-btn" style="width:100%; margin-top:10px; background:#c0392b; color:#fff;" onclick="ui.logout()">تسجيل الخروج والعودة للرئيسية</button>
            `);
        },
        refreshChatWindowOnly: () => {
            ui.startChatSystem();
            alert("تمت إعادة المزامنة الشاملة بنجاح كامل وثبات ممتاز 🔮");
        },
        logout: () => {
            if(window.currentUser) {
                db.collection("users").doc(window.currentUser.uid).update({ isOnline: false });
            }
            localStorage.removeItem("hassouni_uid");
            ui.clearAllListeners();
            window.currentUser = null;
            document.getElementById('featureModal').style.display = 'none';
            ui.showWelcome();
        },
        showModal: (title, bodyHtml) => {
            document.getElementById('featureModalTitle').innerText = title;
            document.getElementById('featureModalBody').innerHTML = bodyHtml;
            document.getElementById('featureModal').style.display = 'flex';
        }
    };

    // التشغيل الفوري والتحقق من الجلسات السابقة عند فتح المتصفح
    window.onload = () => { ui.checkSession(); };
</script>
</body>
</html>
