<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية خليل - النسخة الملكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --dark: #000000; --vip: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--dark); color: #fff; overflow: hidden; }

        /* الهيدر */
        .header-bar { position: fixed; top: 0; width: 100%; height: 70px; background: #000; display: flex; border-bottom: 2px solid var(--gold); align-items: center; z-index: 1000; }
        .h-btn { flex: 1; text-align: center; color: var(--gold); font-size: 11px; cursor: pointer; }
        .h-btn i { display: block; font-size: 22px; margin-bottom: 2px; }

        /* الميكات */
        .mics-row { display: flex; justify-content: space-around; padding: 10px; background: #000; margin-top: 72px; border-bottom: 1px solid #222; }
        .mic-unit { width: 45px; height: 45px; border-radius: 50%; border: 2px dashed var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); font-weight: bold; }
        .mic-unit.on { border-style: solid; background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); }

        /* الشات */
        .chat-scroll { height: calc(100vh - 270px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-wrap { align-self: flex-start; max-width: 90%; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
        
        .msg-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); position: relative; overflow: visible; }
        .pfp img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; bottom: 0; right: 0; border: 2px solid #000; background: #2ecc71; }
        
        .name-box { background: #111; border: 1px solid var(--gold); color: #fff; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .bubble { background: #fff; color: #000; padding: 10px 15px; border-radius: 0 15px 15px 15px; font-size: 14px; line-height: 1.4; position: relative; }

        /* الفوتر */
        .footer-fixed { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); z-index: 1000; }
        .input-row { display: flex; padding: 10px; gap: 10px; align-items: center; }
        .chat-input { flex: 1; background: #111; border: 1px solid var(--gold); color: #fff; height: 40px; border-radius: 20px; padding: 0 15px; }
        .send-btn { background: var(--gold); border: none; padding: 8px 18px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        
        .bottom-nav { height: 55px; display: flex; align-items: center; justify-content: space-around; color: var(--gold); font-size: 10px; }

        /* المودال */
        .king-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .king-card { background: #000; width: 85%; max-width: 320px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; position: relative; }
        .k-btn { width: 100%; padding: 10px; margin: 5px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; cursor: pointer; }
        .k-btn:hover { background: var(--gold); color: #000; }
        
        /* قائمة الترتيب */
        .rank-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #222; text-align: right; }
        .rank-num { color: var(--gold); font-weight: bold; width: 25px; }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="h-btn" onclick="openProfile(me)"><i class="fas fa-id-card"></i>إعداداتي</div>
    <div class="h-btn" onclick="openAdmin()"><i class="fas fa-crown"></i>الإدارة</div>
    <div class="h-btn" onclick="showRichList()"><i class="fas fa-gem"></i>الأثرياء</div>
    <div class="h-btn" style="color:red" onclick="location.reload()"><i class="fas fa-power-off"></i>خروج</div>
</div>

<div class="mics-row">
    <div class="mic-unit" id="mic1" onclick="micClick(1)">1</div>
    <div class="mic-unit" id="mic2" onclick="micClick(2)">2</div>
    <div class="mic-unit" id="mic3" onclick="micClick(3)">3</div>
    <div class="mic-unit" id="mic4" onclick="micClick(4)">4</div>
</div>

<div class="chat-scroll" id="box"></div>

<div class="footer-fixed">
    <div class="input-row">
        <i class="fas fa-laugh-beam" style="color:var(--gold); font-size:22px;"></i>
        <input type="text" id="inp" class="chat-input" placeholder="تحدث يا إمبراطور...">
        <button class="send-btn" onclick="send()">نشر</button>
    </div>
    <div class="bottom-nav">
        <div class="b-btn" onclick="showTopUsers()"><i class="fas fa-star"></i>قائمة الكبار</div>
        <div class="b-btn" onclick="alert('قريباً')"><i class="fab fa-youtube" style="color:red"></i>يوتيوب</div>
        <div class="b-btn"><i class="fas fa-microphone"></i>تسجيل</div>
        <div class="b-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i>تحديث</div>
    </div>
</div>

<div id="modal" class="king-modal"><div class="king-card" id="mContent"></div></div>

<script>
    let me = JSON.parse(localStorage.getItem('king_data')) || {
        name: "خليل ابراهيم",
        gold: 5000,
        img: "https://i.pravatar.cc/150?u=khalil",
        level: "إمبراطور"
    };

    // بيانات وهمية للتوضيح
    const fakeUsers = [
        {name: "فهد العتيبي", gold: 12000, img: "https://i.pravatar.cc/150?u=1", level: "كبير الإمبراطورية"},
        {name: "سارة الملكة", gold: 9500, img: "https://i.pravatar.cc/150?u=2", level: "VIP"},
        {name: "حسين المدريد", gold: 7000, img: "https://i.pravatar.cc/150?u=3", level: "مشرف"}
    ];

    window.onload = () => {
        renderMsg("نظام الإمبراطورية", "أهلاً بك يا خليل، تم تفعيل نظام الخاص وقائمة الأثرياء بنجاح!", "https://cdn-icons-png.flaticon.com/512/4712/4712035.png", true);
    };

    function send() {
        let t = document.getElementById('inp').value;
        if(!t) return;
        renderMsg(me.name, t, me.img, true);
        document.getElementById('inp').value = "";
    }

    function renderMsg(name, txt, img, isKing) {
        let div = document.createElement('div');
        div.className = 'msg-wrap';
        div.innerHTML = `
            <div class="msg-top">
                <div class="pfp" onclick="openProfile({name:'${name}', img:'${img}', gold:100, level:'عضو'})">
                    <img src="${img}">
                    <div class="dot"></div>
                </div>
                ${isKing ? '<i class="fas fa-trophy" style="color:gold"></i>' : ''}
                <span class="name-box">${name}</span>
            </div>
            <div class="bubble">${txt}</div>
        `;
        document.getElementById('box').appendChild(div);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    }

    // ميزة الخاص
    function openPrivate(name) {
        let h = `
            <h3 style="color:var(--gold)">💌 محادثة خاصة: ${name}</h3>
            <div style="height:150px; background:#111; margin-bottom:10px; padding:10px; overflow-y:auto; font-size:12px; text-align:right;" id="privChat">
                <div style="color:gray">بدأت المحادثة الآن..</div>
            </div>
            <input type="text" id="pInp" class="chat-input" style="width:100%; margin-bottom:10px;" placeholder="اكتب رسالتك الخاصة...">
            <button class="k-btn" onclick="alert('تم الإرسال بنجاح!')">إرسال خاص</button>
            <button class="k-btn" style="color:red" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    // قائمة الأثرياء
    function showRichList() {
        let listHTML = `<h3 style="color:var(--gold)"><i class="fas fa-gem"></i> قائمة الأثرياء</h3>`;
        let all = [...fakeUsers, me].sort((a,b) => b.gold - a.gold);
        all.forEach((u, i) => {
            listHTML += `
                <div class="rank-item">
                    <span class="rank-num">${i+1}</span>
                    <img src="${u.img}" style="width:30px; height:30px; border-radius:50%;">
                    <div style="flex:1">${u.name}</div>
                    <div style="color:gold">${u.gold} 💰</div>
                </div>
            `;
        });
        listHTML += `<button class="k-btn" onclick="closeM()">إغلاق</button>`;
        document.getElementById('mContent').innerHTML = listHTML;
        document.getElementById('modal').style.display = 'flex';
    }

    // قائمة الكبار
    function showTopUsers() {
        let listHTML = `<h3 style="color:var(--gold)"><i class="fas fa-crown"></i> مجلس الكبار</h3>`;
        fakeUsers.forEach(u => {
            listHTML += `
                <div class="rank-item">
                    <img src="${u.img}" style="width:40px; height:40px; border-radius:50%; border:1px solid red;">
                    <div style="flex:1">
                        <b>${u.name}</b><br>
                        <small style="color:var(--vip)">${u.level}</small>
                    </div>
                    <button onclick="openPrivate('${u.name}')" style="background:none; border:none; color:var(--gold); cursor:pointer;"><i class="fas fa-envelope"></i></button>
                </div>
            `;
        });
        listHTML += `<button class="k-btn" onclick="closeM()">إغلاق</button>`;
        document.getElementById('mContent').innerHTML = listHTML;
        document.getElementById('modal').style.display = 'flex';
    }

    function openProfile(user) {
        let isMe = (user.name === me.name);
        let h = `
            <div style="position:absolute; top:10px; left:10px; color:gold"><i class="fas fa-shield-alt"></i></div>
            <img src="${user.img}" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--gold); margin-bottom:10px;">
            <h3 style="margin:5px 0;">${user.name}</h3>
            <div style="color:var(--gold); margin-bottom:15px;">الرتبة: ${isMe ? me.level : user.level}</div>
            ${!isMe ? `<button class="k-btn" style="background:var(--gold); color:#000;" onclick="openPrivate('${user.name}')">💬 رسالة خاصة</button>` : ''}
            <button class="k-btn" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function openAdmin() {
        let h = `
            <h3 style="color:var(--gold)">لوحة الإدارة</h3>
            <button class="k-btn" onclick="showTopUsers()">⭐ إدارة قائمة الكبار</button>
            <button class="k-btn" onclick="alert('تم الحظر')">🚫 حظر مستخدم</button>
            <button class="k-btn" onclick="alert('تم تصفير الشات')">🧹 تنظيف الشات</button>
            <button class="k-btn" style="color:red" onclick="closeM()">إغلاق</button>
        `;
        document.getElementById('mContent').innerHTML = h;
        document.getElementById('modal').style.display = 'flex';
    }

    function micClick(id) {
        document.querySelectorAll('.mic-unit').forEach(m => m.classList.remove('on'));
        document.getElementById('mic'+id).classList.add('on');
        alert("أنت الآن على الميكروفون رقم " + id);
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
            </html>
