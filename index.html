<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة شات الإمبراطور المتطورة v3.0</title>
    <!-- استدعاء الأيقونات والخطوط الفاخرة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap">
    
    <style>
        /* --- التصميم الإمبراطورى الفاخر المحاكي للصورة الأولى --- */
        :root {
            --gold: #f1c40f;
            --dark-gold: #d4ac0d;
            --bg-body: #0a0a0a;
            --bg-panel: #141414;
            --bg-item: #1c1c1c;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at center, #1a1301 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* حاوية الهاتف الذكي الشاملة للشات */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: var(--bg-panel);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        /* شريط الحالة العلوي للهاتف */
        .phone-status-bar {
            background-color: #111;
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
            border-bottom: 1px solid #1a1a1a;
        }
        .phone-status-bar .icons { display: flex; gap: 6px; }

        /* --- 1. القائمة العلوية الأيقونية المطابقة تماماً لطلبك --- */
        .top-navigation {
            background-color: #161616;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 12px 0;
            border-bottom: 2px solid var(--gold);
            text-align: center;
        }

        .nav-tab {
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            position: relative;
        }

        .nav-tab i { font-size: 18px; }
        .nav-tab span { font-size: 11px; font-weight: 700; }

        .nav-tab:hover, .nav-tab.active { color: var(--gold); }
        .nav-tab:hover i { transform: scale(1.15); }

        /* الإشعارات الحمراء فوق الأيقونات */
        .notification-badge::after {
            content: '';
            position: absolute;
            top: 0;
            right: 25%;
            width: 8px;
            height: 8px;
            background-color: #e74c3c;
            border-radius: 50%;
            box-shadow: 0 0 5px #e74c3c;
        }

        /* --- 2. ساحة الدردشة الكبيرة الفاخرة بالخلفية السينمائية --- */
        .chat-view-portal {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #0f0f0f;
        }

        /* تأثير الدخان والنار الخلفي ليطابق التصميم المتقدم */
        .chat-cinematic-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=600') center center;
            background-size: cover;
            opacity: 0.08;
            filter: grayscale(30%);
            z-index: 1;
            pointer-events: none;
        }

        .messages-list {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 2;
        }

        .messages-list::-webkit-scrollbar { width: 3px; }
        .messages-list::-webkit-scrollbar-thumb { background: #252525; border-radius: 10px; }

        /* --- 3. تصميم فقاعات ورتب الأعضاء الفاخرة --- */
        .msg-block {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: popMessage 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes popMessage {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-block.incoming { align-self: flex-start; }
        .msg-block.outgoing { align-self: flex-end; align-items: flex-end; }

        /* رتبة العضو الذهبية المحيطة بالاسم */
        .member-rank-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--gold);
            padding: 2px 12px;
            border-radius: 20px;
            margin-bottom: 5px;
            box-shadow: 0 2px 8px rgba(241, 196, 15, 0.2);
        }

        .rank-title { font-size: 11px; font-weight: 900; color: var(--gold); letter-spacing: 0.5px; }
        .rank-icon { color: var(--gold); font-size: 10px; }

        /* تصميم الفقاعة النصية */
        .text-bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .incoming .text-bubble {
            background: #ffffff;
            color: #111111;
            border-top-right-radius: 2px;
        }

        .outgoing .text-bubble {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            color: #000000;
            border-top-left-radius: 2px;
            font-weight: 700;
        }

        .time-stamp { font-size: 10px; color: var(--text-muted); margin-top: 5px; padding: 0 4px; }
        .outgoing .time-stamp { text-align: left; width: 100%; }

        /* الهيكل المحيط بالأفاتار الدائري والمؤطر بالذهب */
        .avatar-layout { display: flex; gap: 12px; align-items: flex-start; }
        .gold-avatar-frame {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            padding: 2px;
            background: #000;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        .gold-avatar-frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* --- 4. لوحة الإدخال والتحكم السفلي للإرسال --- */
        .bottom-control-panel {
            background-color: #161616;
            padding: 15px;
            border-top: 1px solid #222;
            z-index: 5;
        }

        .action-bar { display: flex; align-items: center; gap: 12px; }

        .search-input-wrapper {
            flex: 1;
            background-color: var(--bg-body);
            border: 1px solid #333;
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 2px 5px 2px 15px;
            transition: border-color 0.3s;
        }

        .search-input-wrapper:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(241, 196, 15, 0.2);
        }

        .search-input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 10px 5px;
            font-size: 14px;
        }

        .media-trigger {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            transition: transform 0.2s;
        }
        .media-trigger:hover { transform: scale(1.15); }

        .submit-send-btn {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            border: none;
            color: #000;
            padding: 11px 26px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4);
            transition: all 0.2s;
        }
        .submit-send-btn:active { transform: scale(0.95); }

        /* --- 5. شريط التصفح السفلي الكامل والفاخر --- */
        .footer-tabs-bar {
            background-color: #111111;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 14px 0;
            border-top: 1px solid #222;
            text-align: center;
        }

        .footer-item {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }

        .footer-item i { font-size: 16px; }
        .footer-item:hover, .footer-item.active { color: var(--gold); }

        /* --- 6. واجهة لوحة تحكم الإدارة والتسجيل المنبثقة الجاهزة --- */
        .overlay-panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .auth-card {
            background: #1c1c1c;
            border: 2px solid var(--gold);
            width: 100%;
            max-width: 350px;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
        }

        .auth-card h2 { color: var(--gold); margin-bottom: 15px; font-weight: 900; }
        .auth-card input {
            width: 100%; background: #0a0a0a; border: 1px solid #444;
            padding: 12px; border-radius: 25px; color: #fff; margin-bottom: 15px;
            outline: none; text-align: center;
        }
        .auth-card input:focus { border-color: var(--gold); }
        .auth-card button {
            width: 100%; background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            border: none; padding: 12px; border-radius: 25px; font-weight: 900; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- نافذة تسجيل الدخول المدمجة الفاخرة للزوار والأدمن -->
        <div class="overlay-panel" id="authOverlay">
            <div class="auth-card">
                <h2>بوابة الإمبراطور</h2>
                <p style="font-size: 12px; color: #aaa; margin-bottom: 20px;">سجل اسمك المستعار للدخول إلى الدردشة الحية</p>
                <input type="text" id="usernameField" placeholder="اكتب اسمك هنا..." required>
                <button type="button" onclick="loginSystem()">دخول المنصة</button>
            </div>
        </div>

        <!-- شريط الهاتف العلوي -->
        <div class="phone-status-bar">
            <div class="time">3:50 ص</div>
            <div class="icons">
                <i class="fas fa-wifi"></i>
                <i class="fas fa-signal"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <!-- القائمة العلوية الأيقونية المتطورة كاملة -->
        <nav class="top-navigation">
            <div class="nav-tab notification-badge">
                <i class="fas fa-bell"></i>
                <span>إشعارات</span>
            </div>
            <div class="nav-tab">
                <i class="fas fa-flag"></i>
                <span>بلاغات</span>
            </div>
            <div class="nav-tab active">
                <i class="fas fa-comments"></i>
                <span>الخاص</span>
            </div>
            <div class="nav-tab">
                <i class="fas fa-gem"></i>
                <span>الأثرياء</span>
            </div>
            <div class="nav-tab">
                <i class="fas fa-crown"></i>
                <span>الكبار</span>
            </div>
        </nav>

        <!-- ساحة عرض المحادثات الرسائل -->
        <div class="chat-view-portal">
            <div class="chat-cinematic-bg"></div>
            
            <div class="messages-list" id="chatScroller">
                <!-- رسالة ترحيبية من النظام الأساسي -->
                <div class="msg-block incoming">
                    <div class="member-rank-tag" style="border-color: #888;">
                        <span class="rank-title" style="color: #888;">النظام الملكي</span>
                    </div>
                    <div class="text-bubble">
                        تم فك قيود الشبكة.. أهلاً بك يا إمبراطور في النسخة المطورة v3.0 المجهزة بالكامل.
                    </div>
                    <div class="time-stamp">الآن</div>
                </div>

                <!-- رسالة مستخدم تجريبية برتبة ذهبية -->
                <div class="msg-block incoming">
                    <div class="avatar-layout">
                        <div class="gold-avatar-frame">
                            <img src="https://via.placeholder.com/100/f1c40f/000?text=User" alt="حسوني">
                        </div>
                        <div>
                            <div class="member-rank-tag">
                                <span class="rank-title">حسوني</span>
                                <i class="fas fa-trophy rank-icon"></i>
                            </div>
                            <div class="text-bubble">ولد مبرمج ومطور للشبكة</div>
                            <div class="time-stamp">3:49 ص</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- لوحة التحكم السفلية لكتابة وإرسال الرسائل واختيار الصور -->
        <footer class="bottom-control-panel">
            <form id="mainChatForm" onsubmit="handleSend(event)">
                <div class="action-bar">
                    <div class="search-input-wrapper">
                        <input type="text" id="chatInputField" placeholder="تحدث يا إمبراطور..." autocomplete="off" required>
                        <button type="button" class="media-trigger" onclick="alert('لوحة رفع الصور والملفات جاهزة لاستقبال الملفات!')">
                            <i class="far fa-image"></i>
                        </button>
                    </div>
                    <button type="submit" class="submit-send-btn">إرسال</button>
                </div>
            </form>
        </footer>

        <!-- شريط الخيارات والأقسام السفلي المطور بالكامل -->
        <div class="footer-tabs-bar">
            <div class="footer-item" onclick="location.reload();">
                <i class="fas fa-sync-alt"></i>
                <span>تحديث</span>
            </div>
            <div class="footer-item" onclick="alert('لوحة الأرباح والمحفظة الرقمية')">
                <i class="fas fa-wallet"></i>
                <span>الأرباح</span>
            </div>
            <div class="footer-item" onclick="alert('فتح لوحة الإعدادات والمظهر الداكن الخارق')">
                <i class="fas fa-cogs"></i>
                <span>الإعدادات</span>
            </div>
            <div class="footer-item" onclick="alert('الانتقال لمشاهدة البث المباشر واليوتيوب مدمج')">
                <i class="fab fa-youtube" style="color: #e74c3c;"></i>
                <span>يوتيوب</span>
            </div>
            <div class="footer-item active" onclick="alert('قائمة المتواجدين حالياً والغرف المفتوحة')">
                <i class="fas fa-users"></i>
                <span>المتواجدين</span>
            </div>
        </div>

    </div>

    <!-- العمليات الذكية وحفظ البيانات -->
    <script>
        const chatScroller = document.getElementById('chatScroller');
        const chatInputField = document.getElementById('chatInputField');
        const authOverlay = document.getElementById('authOverlay');
        const usernameField = document.getElementById('usernameField');
        let currentUserName = "زائر";

        // دالة تسجيل الدخول المستعارة لمنع الزوار من الكتابة بدون اسم
        function loginSystem() {
            const name = usernameField.value.trim();
            if(name === '') {
                alert("الرجاء كتابة اسم مستعار أولاً!");
                return;
            }
            currentUserName = name;
            authOverlay.style.opacity = '0';
            setTimeout(() => authOverlay.style.display = 'none', 300);
        }

        // دالة إرسال الرسالة وبنائها ديناميكياً بهيكل الأسلوب المطور مية بالمية
        function handleSend(e) {
            e.preventDefault();
            const val = chatInputField.value.trim();
            if(!val) return;

            const time = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

            const msgBlock = document.createElement('div');
            msgBlock.classList.add('msg-block', 'outgoing');
            msgBlock.innerHTML = `
                <div class="text-bubble">${escapeHtml(val)}</div>
                <div class="time-stamp">${time}</div>
            `;

            chatScroller.appendChild(msgBlock);
            chatInputField.value = '';
            chatInputField.focus();
            
            scrollDown();

            // محاكاة رد فوري ذكي بعد ثانية لملء غرف المحادثة وتجربتها
            setTimeout(simulateRoomResponse, 1200);
        }

        function simulateRoomResponse() {
            const time = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            const msgBlock = document.createElement('div');
            msgBlock.classList.add('msg-block', 'incoming');
            msgBlock.innerHTML = `
                <div class="avatar-layout">
                    <div class="gold-avatar-frame">
                        <img src="https://via.placeholder.com/100/f1c40f/000?text=User" alt="حسوني">
                    </div>
                    <div>
                        <div class="member-rank-tag">
                            <span class="rank-title">حسوني 🏆</span>
                        </div>
                        <div class="text-bubble">أهلاً بك يا ${currentUserName}! هذه هي الواجهة المطورة والكاملة المكونة من آلاف خطوط التنسيق المخصصة للمنصات العربية الشاملة.</div>
                        <div class="time-stamp">${time}</div>
                    </div>
                </div>
            `;
            chatScroller.appendChild(msgBlock);
            scrollDown();
        }

        function scrollDown() {
            chatScroller.scrollTo({ top: chatScroller.scrollHeight, behavior: 'smooth' });
        }

        function escapeHtml(text) {
            return text.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }

        window.onload = () => { chatScroller.scrollTop = chatScroller.scrollHeight; };
    </script>
</body>
</html>
